<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="VOIDRUN — A 20,000+ line HTML5 bullet heaven game. Run the void. Survive the storm. Built by Nix Labs.">
<meta name="theme-color" content="#0a0a1a">
<meta name="author" content="Nix Labs">
<title>VOIDRUN — by Nix Labs</title>
<style>
  /* ================================================================
     VOIDRUN - Global Styles
     ================================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  :root {
    --bg-deep: #0a0a14;
    --bg-panel: #12122a;
    --text-primary: #e0e0ff;
    --text-secondary: #8888cc;
    --accent-cyan: #00e5ff;
    --accent-magenta: #ff00e5;
    --accent-gold: #ffaa00;
    --accent-green: #00ff88;
    --accent-red: #ff3355;
    --glow-cyan: 0 0 15px rgba(0, 229, 255, 0.6);
    --glow-magenta: 0 0 15px rgba(255, 0, 229, 0.6);
    --glow-gold: 0 0 15px rgba(255, 170, 0, 0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050510;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Rajdhani', 'Orbitron', sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 1200px;
    max-height: 900px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas {
    display: block;
    border: 1px solid rgba(0, 229, 255, 0.15);
    border-radius: 4px;
    box-shadow:
      0 0 30px rgba(0, 229, 255, 0.1),
      0 0 60px rgba(255, 0, 229, 0.05),
      inset 0 0 30px rgba(0, 229, 255, 0.02);
    cursor: none;
  }

  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Start Screen */
  #start-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at center, rgba(10,10,30,0.85) 0%, rgba(5,5,16,0.95) 100%);
    z-index: 100;
    pointer-events: all;
  }
  #start-screen.hidden { display: none; }

  #start-screen h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    color: var(--accent-cyan);
    text-shadow: 0 0 30px rgba(0,229,255,0.8), 0 0 60px rgba(0,229,255,0.4), 0 0 100px rgba(0,229,255,0.2);
    letter-spacing: 0.15em;
    margin-bottom: 0.3em;
    animation: titlePulse 2s ease-in-out infinite;
  }
  #start-screen .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem;
    font-weight: 300;
    color: var(--accent-magenta);
    letter-spacing: 0.3em;
    text-shadow: 0 0 10px rgba(255,0,229,0.5);
    margin-bottom: 2em;
  }

  @keyframes titlePulse {
    0%, 100% { opacity: 1; text-shadow: 0 0 30px rgba(0,229,255,0.8), 0 0 60px rgba(0,229,255,0.4); }
    50% { opacity: 0.85; text-shadow: 0 0 50px rgba(0,229,255,1), 0 0 100px rgba(0,229,255,0.6); }
  }

  #start-screen .controls-info {
    display: flex;
    gap: 2em;
    margin-bottom: 2.5em;
    flex-wrap: wrap;
    justify-content: center;
  }
  .control-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3em;
  }
  .control-key {
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 8px;
    padding: 0.4em 0.8em;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    color: var(--accent-cyan);
    text-shadow: 0 0 8px rgba(0,229,255,0.5);
    min-width: 50px;
    text-align: center;
  }
  .control-label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  .btn-start {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    padding: 0.8em 2.5em;
    background: transparent;
    border: 2px solid var(--accent-cyan);
    color: var(--accent-cyan);
    cursor: pointer;
    letter-spacing: 0.2em;
    border-radius: 4px;
    transition: all 0.3s ease;
    text-shadow: 0 0 10px rgba(0,229,255,0.5);
    box-shadow: 0 0 20px rgba(0,229,255,0.1), inset 0 0 20px rgba(0,229,255,0.05);
    pointer-events: all;
  }
  .btn-start:hover {
    background: rgba(0,229,255,0.1);
    box-shadow: 0 0 40px rgba(0,229,255,0.3), inset 0 0 30px rgba(0,229,255,0.1);
    transform: scale(1.05);
  }

  /* Game Over Screen */
  #gameover-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at center, rgba(20,5,5,0.85) 0%, rgba(5,5,16,0.95) 100%);
    z-index: 100;
    pointer-events: all;
  }
  #gameover-screen.hidden { display: none; }

  #gameover-screen h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--accent-red);
    text-shadow: 0 0 30px rgba(255,51,85,0.8), 0 0 60px rgba(255,51,85,0.4);
    margin-bottom: 0.5em;
  }
  #gameover-screen .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8em 2em;
    margin-bottom: 2em;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    color: var(--text-secondary);
  }
  .stat-label { color: var(--text-secondary); text-align: right; }
  .stat-value { color: var(--accent-cyan); font-weight: 600; text-align: left; }
  #gameover-screen .btn-restart {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    padding: 0.6em 2em;
    background: transparent;
    border: 2px solid var(--accent-red);
    color: var(--accent-red);
    cursor: pointer;
    letter-spacing: 0.15em;
    border-radius: 4px;
    transition: all 0.3s ease;
    pointer-events: all;
  }
  #gameover-screen .btn-restart:hover {
    background: rgba(255,51,85,0.15);
    box-shadow: 0 0 30px rgba(255,51,85,0.2);
  }

  /* Pause overlay */
  #pause-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(5,5,16,0.7);
    z-index: 50;
    pointer-events: all;
  }
  #pause-overlay.hidden { display: none; }
  #pause-overlay span {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    color: var(--accent-cyan);
    text-shadow: 0 0 20px rgba(0,229,255,0.6);
    letter-spacing: 0.3em;
    animation: titlePulse 1.5s ease-in-out infinite;
  }

  /* Level Up Overlay */
  #levelup-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(5,5,16,0.85);
    z-index: 80;
    pointer-events: all;
  }
  #levelup-overlay.active { display: flex; }

  #levelup-overlay h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    color: var(--accent-gold);
    text-shadow: 0 0 20px rgba(255,170,0,0.6);
    letter-spacing: 0.2em;
    margin-bottom: 1.5em;
    animation: titlePulse 1s ease-in-out infinite;
  }

  .upgrade-choices {
    display: flex;
    gap: 1em;
    flex-wrap: wrap;
    justify-content: center;
  }

  .upgrade-card {
    background: rgba(18,18,42,0.9);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 8px;
    padding: 1.2em;
    width: 200px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    pointer-events: all;
  }
  .upgrade-card:hover {
    border-color: var(--accent-gold);
    box-shadow: 0 0 20px rgba(255,170,0,0.3);
    transform: translateY(-4px);
  }
  .upgrade-card .card-icon {
    font-size: 2rem;
    margin-bottom: 0.5em;
  }
  .upgrade-card .card-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    color: var(--text-primary);
    letter-spacing: 0.05em;
    margin-bottom: 0.3em;
  }
  .upgrade-card .card-desc {
    font-size: 0.75rem;
    color: var(--text-secondary);
    line-height: 1.3;
  }
  .upgrade-card .card-rarity {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    margin-top: 0.5em;
    padding: 0.2em 0.5em;
    border-radius: 3px;
    display: inline-block;
  }
  .rarity-common { color: #aaa; border: 1px solid #555; }
  .rarity-uncommon { color: var(--accent-green); border: 1px solid var(--accent-green); }
  .rarity-rare { color: var(--accent-cyan); border: 1px solid var(--accent-cyan); }
  .rarity-epic { color: var(--accent-magenta); border: 1px solid var(--accent-magenta); }
  .rarity-legendary { color: var(--accent-gold); border: 1px solid var(--accent-gold); text-shadow: 0 0 8px rgba(255,170,0,0.5); }

  /* Nix Brand Animations */
  @keyframes nixPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.75; transform: scale(1.03); }
  }
  @keyframes nixGlowPulse {
    0%, 100% { text-shadow: 0 0 10px rgba(0,229,255,0.4), 0 0 20px rgba(0,229,255,0.1); }
    50% { text-shadow: 0 0 25px rgba(0,229,255,0.8), 0 0 50px rgba(255,0,229,0.4), 0 0 75px rgba(0,229,255,0.2); }
  }
  @keyframes nixFadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes nixSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Nix-branded elements */
  body.nix-branded {
    background: #050510;
  }
  .nix-brand-wordmark {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    letter-spacing: 0.3em;
    animation: nixGlowPulse 3s ease-in-out infinite;
  }
  .nix-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #00e5ff, #ff00e5, transparent);
    margin: 1em 0;
  }
  .nix-brand-footer {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.6rem;
    color: #555;
    text-align: center;
    padding: 0.5em;
    opacity: 0.6;
    transition: opacity 0.3s;
  }
  .nix-brand-footer:hover { opacity: 1; }

  /* Mobile touch controls hint */
  @media (max-width: 768px) {
    #start-screen h1 { font-size: 1.8rem; }
    .upgrade-card { width: 150px; padding: 0.8em; }
    .controls-info { gap: 1em; }
  }

  /* --- Shop Screen --- */
  #shop-screen {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: none; flex-direction: column; align-items: center;
    background: radial-gradient(ellipse at center, rgba(10,10,30,0.92) 0%, rgba(5,5,16,0.97) 100%);
    z-index: 100; pointer-events: all; overflow-y: auto; padding: 2em 1em;
  }
  #shop-screen.active { display: flex; }
  #shop-screen h2 {
    font-family: 'Orbitron', sans-serif; font-size: 1.6rem; color: var(--accent-gold);
    text-shadow: 0 0 20px rgba(255,170,0,0.5); margin-bottom: 0.3em;
  }
  #shop-screen .shop-gold {
    font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; color: var(--accent-gold);
    margin-bottom: 1.5em; display: flex; align-items: center; gap: 0.4em;
  }
  .shop-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.8em; max-width: 750px; width: 100%; margin-bottom: 1.5em;
  }
  .shop-card {
    background: rgba(18,18,42,0.9); border: 1px solid rgba(0,229,255,0.15);
    border-radius: 8px; padding: 0.8em 1em; transition: all 0.2s ease;
    cursor: pointer; display: flex; flex-direction: column; gap: 0.3em;
  }
  .shop-card:hover { border-color: var(--accent-gold); box-shadow: 0 0 15px rgba(255,170,0,0.2); transform: translateY(-2px); }
  .shop-card.owned { opacity: 0.5; pointer-events: none; border-color: rgba(0,255,100,0.3); }
  .shop-card .sc-header { display: flex; align-items: center; gap: 0.4em; }
  .shop-card .sc-icon { font-size: 1.2rem; }
  .shop-card .sc-name { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--text-primary); }
  .shop-card .sc-level { font-size: 0.65rem; color: var(--accent-cyan); }
  .shop-card .sc-desc { font-size: 0.7rem; color: var(--text-secondary); line-height: 1.3; }
  .shop-card .sc-cost {
    font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--accent-gold);
    margin-top: 0.3em; align-self: flex-end;
  }

  .btn-shop-action {
    font-family: 'Orbitron', sans-serif; font-size: 0.9rem; padding: 0.5em 1.5em;
    background: transparent; border: 2px solid var(--accent-cyan); color: var(--accent-cyan);
    cursor: pointer; letter-spacing: 0.1em; border-radius: 4px; transition: all 0.3s ease;
    margin: 0 0.5em;
  }
  .btn-shop-action:hover { background: rgba(0,229,255,0.1); box-shadow: 0 0 20px rgba(0,229,255,0.2); }
  .btn-shop-action.play { border-color: var(--accent-green); color: var(--accent-green); }
  .btn-shop-action.play:hover { background: rgba(0,255,136,0.1); box-shadow: 0 0 20px rgba(0,255,136,0.2); }

  /* --- Class Selection --- */
  #class-screen {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(10,10,30,0.92) 0%, rgba(5,5,16,0.97) 100%);
    z-index: 95; pointer-events: all; padding: 2em;
  }
  #class-screen.active { display: flex; }
  #class-screen h2 {
    font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--accent-cyan);
    text-shadow: 0 0 15px rgba(0,229,255,0.4); margin-bottom: 0.3em;
  }
  #class-screen .class-subtitle {
    font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1.2em;
  }
  .class-grid {
    display: flex; gap: 0.8em; flex-wrap: wrap; justify-content: center; max-width: 850px;
  }
  .class-card {
    background: rgba(18,18,42,0.9); border: 1px solid rgba(0,229,255,0.15);
    border-radius: 10px; padding: 1em; width: 155px; cursor: pointer;
    transition: all 0.25s ease; text-align: center;
  }
  .class-card:hover { border-color: var(--accent-gold); box-shadow: 0 0 20px rgba(255,170,0,0.25); transform: translateY(-4px); }
  .class-card .cc-icon { font-size: 2rem; margin-bottom: 0.3em; }
  .class-card .cc-name { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--text-primary); margin-bottom: 0.3em; }
  .class-card .cc-desc { font-size: 0.68rem; color: var(--text-secondary); line-height: 1.3; }

  /* --- Mode Selection --- */
  #mode-screen {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(10,10,30,0.92) 0%, rgba(5,5,16,0.97) 100%);
    z-index: 96; pointer-events: all; padding: 2em;
  }
  #mode-screen.active { display: flex; }
  #mode-screen h2 {
    font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--accent-magenta);
    text-shadow: 0 0 15px rgba(255,0,229,0.4); margin-bottom: 1.2em;
  }
  .mode-grid { display: flex; gap: 0.8em; flex-wrap: wrap; justify-content: center; max-width: 850px; }
  .mode-card {
    background: rgba(18,18,42,0.9); border: 1px solid rgba(255,0,229,0.15);
    border-radius: 10px; padding: 1em; width: 155px; cursor: pointer;
    transition: all 0.25s ease; text-align: center;
  }
  .mode-card:hover { border-color: var(--accent-magenta); box-shadow: 0 0 20px rgba(255,0,229,0.25); transform: translateY(-4px); }
  .mode-card .mc-icon { font-size: 2rem; margin-bottom: 0.3em; }
  .mode-card .mc-name { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--text-primary); margin-bottom: 0.3em; }
  .mode-card .mc-desc { font-size: 0.68rem; color: var(--text-secondary); line-height: 1.3; }

  /* --- Bestiary Screen --- */
  #bestiary-screen {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: none; flex-direction: column; align-items: center;
    background: radial-gradient(ellipse at center, rgba(10,10,30,0.92) 0%, rgba(5,5,16,0.97) 100%);
    z-index: 100; pointer-events: all; overflow-y: auto; padding: 2em 1em;
  }
  #bestiary-screen.active { display: flex; }
  #bestiary-screen h2 {
    font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--accent-purple, #aa44ff);
    text-shadow: 0 0 15px rgba(170,68,255,0.4); margin-bottom: 1em;
  }
  .bestiary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.6em; max-width: 700px; width: 100%; }
  .bestiary-entry {
    background: rgba(18,18,42,0.8); border: 1px solid rgba(170,68,255,0.15);
    border-radius: 6px; padding: 0.6em 0.8em; display: flex; align-items: center; gap: 0.5em;
  }
  .bestiary-entry.locked { opacity: 0.35; }
  .bestiary-entry .be-color { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .bestiary-entry .be-info { flex: 1; }
  .bestiary-entry .be-name { font-size: 0.8rem; color: var(--text-primary); font-weight: 600; }
  .bestiary-entry .be-stats { font-size: 0.65rem; color: var(--text-secondary); }

  .shop-actions { display: flex; gap: 1em; margin-top: 0.5em; }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- Start Screen -->
  <div id="start-screen">
    <h1>VOIDRUN</h1>
    <p class="subtitle">RUN THE VOID</p>
    <div class="controls-info">
      <div class="control-item">
        <span class="control-key">W A S D</span>
        <span class="control-label">Move</span>
      </div>
      <div class="control-item">
        <span class="control-key">⏸ ESC</span>
        <span class="control-label">Pause</span>
      </div>
      <div class="control-item">
        <span class="control-key">🖱 Click</span>
        <span class="control-label">Select Upgrades</span>
      </div>
    </div>
    <button class="btn-start" id="btnStart">▶ ENTER VOID</button>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover-screen" class="hidden">
    <h2>VOID CONSUMED</h2>
    <div class="stats" id="stats-container"></div>
    <button class="btn-restart" id="btnRestart">◀ RETURN</button>
  </div>

  <!-- Pause Overlay -->
  <div id="pause-overlay" class="hidden">
    <span>⏸ PAUSED</span>
  </div>

  <!-- Level Up Overlay -->
  <div id="levelup-overlay">
    <h3>⚡ ASCEND ⚡</h3>
    <div class="upgrade-choices" id="upgrade-choices"></div>
  </div>
</div>

<script>
// ====================================================================
//  VOIDRUN - NEON VOID
//  A Vampire Survivors-style bullet heaven game
//  ~5500+ lines of handcrafted game code
// ====================================================================

// ====================================================================
//  SECTION 1: CONSTANTS & CONFIGURATION
// ====================================================================

const CONFIG = {
  // Canvas
  WIDTH: 1024,
  HEIGHT: 768,

  // Game feel
  TARGET_FPS: 60,
  FRAME_TIME: 1000 / 60,
  SCREEN_SHAKE_DECAY: 0.9,
  SCREEN_SHAKE_THRESHOLD: 0.5,

  // Player defaults
  PLAYER: {
    SPEED: 3.5,
    MAX_HP: 100,
    SIZE: 12,
    INVINCIBILITY_MS: 1500,
    MAGNET_RANGE: 80,
    XP_MULTIPLIER: 1.0,
    ARMOR: 0,
    HP_REGEN: 0,
    LUCK: 0,
    CRIT_CHANCE: 0.05,
    CRIT_MULTIPLIER: 2.0,
    REVIVALS: 0,
  },

  // Wave system
  WAVE_DURATION_SEC: 25,
  ENEMY_CAP_BASE: 80,
  ENEMY_CAP_PER_WAVE: 15,
  BOSS_WAVE_INTERVAL: 5,

  // XP
  XP_BASE_REQUIREMENT: 8,
  XP_GROWTH_FACTOR: 1.15,
  XP_GEM_LIFETIME: 15000,

  // Colors
  COLORS: {
    CYAN: '#00e5ff',
    MAGENTA: '#ff00e5',
    GOLD: '#ffaa00',
    GREEN: '#00ff88',
    RED: '#ff3355',
    PURPLE: '#aa44ff',
    BLUE: '#4488ff',

//  SECTION 2: UTILITY FUNCTIONS
// ====================================================================

/**
 * Clamp a value between min and max.
 * @param {number} val - Input value
 * @param {number} min - Minimum bound
 * @param {number} max - Maximum bound
 * @returns {number} Clamped value
 */
function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

/**
 * Linear interpolation between two values.
 * @param {number} a - Start value
 * @param {number} b - End value
 * @param {number} t - Interpolation factor (0-1)
 * @returns {number} Interpolated value
 */
function lerp(a, b, t) {
  return a + (b - a) * t;
}

/**
 * Calculate distance between two points.
 * @param {number} x1 - First point x
 * @param {number} y1 - First point y
 * @param {number} x2 - Second point x
 * @param {number} y2 - Second point y
 * @returns {number} Euclidean distance
 */
function distance(x1, y1, x2, y2) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  return Math.sqrt(dx * dx + dy * dy);
}

/**
 * Calculate angle between two points in radians.
 * @param {number} x1 - Source x
 * @param {number} y1 - Source y
 * @param {number} x2 - Target x
 * @param {number} y2 - Target y
 * @returns {number} Angle in radians
 */
function angleTo(x1, y1, x2, y2) {
  return Math.atan2(y2 - y1, x2 - x1);
}

/**
 * Generate a random float between min and max.
 * @param {number} min - Minimum value
 * @param {number} max - Maximum value
 * @returns {number} Random float
 */
function rand(min, max) {
  return Math.random() * (max - min) + min;
}

/**
 * Generate a random integer between min and max (inclusive).
 * @param {number} min - Minimum value
 * @param {number} max - Maximum value
 * @returns {number} Random integer
 */
function randInt(min, max) {
  return Math.floor(rand(min, max + 1));
}

/**
 * Pick a random element from an array.
 * @param {Array} arr - Input array
 * @returns {*} Random element
 */
function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/**
 * Check if a point is within the game bounds.
 * @param {number} x - X coordinate
 * @param {number} y - Y coordinate
 * @param {number} margin - Margin from edge
 * @returns {boolean} In bounds
 */
function inBounds(x, y, margin = 0) {
  return x >= margin && x <= CONFIG.WIDTH - margin &&
         y >= margin && y <= CONFIG.HEIGHT - margin;
}

/**
 * Normalize a 2D vector to unit length.
 * @param {number} dx - X component
 * @param {number} dy - Y component
 * @returns {{x: number, y: number}} Normalized vector
 */
function normalize(dx, dy) {
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len === 0) return { x: 0, y: 0 };
  return { x: dx / len, y: dy / len };
}

/**
 * Convert hex color to rgba string.
 * @param {string} hex - Hex color (#RRGGBB)
 * @param {number} alpha - Alpha (0-1)
 * @returns {string} RGBA string
 */
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

/**
 * Resize canvas to fit the screen while maintaining aspect ratio.
 * Updates CONFIG.WIDTH and CONFIG.HEIGHT accordingly.
 */
function resizeCanvas() {
  const wrapper = document.getElementById('game-wrapper');
  const maxW = wrapper.clientWidth;
  const maxH = wrapper.clientHeight;
  const aspect = 1024 / 768;

  let w, h;
  if (maxW / maxH > aspect) {
    h = Math.min(maxH, 900);
    w = h * aspect;
  } else {
    w = Math.min(maxW, 1200);
    h = w / aspect;
  }

  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = CONFIG.WIDTH;
  canvas.height = CONFIG.HEIGHT;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

/**
 * InputHandler - Manages keyboard input state.
 * Tracks which keys are currently pressed.
 */
class InputHandler {
  constructor() {
    /** @type {Set<string>} Currently pressed keys */
    this.keys = new Set();
    /** @type {boolean} Mouse button held */
    this.mouseDown = false;
    /** @type {{x: number, y: number}} Mouse position in canvas coords */
    this.mouse = { x: 0, y: 0 };

    this._onKeyDown = this._onKeyDown.bind(this);
    this._onKeyUp = this._onKeyUp.bind(this);
    this._onMouseMove = this._onMouseMove.bind(this);
    this._onMouseDown = this._onMouseDown.bind(this);
    this._onMouseUp = this._onMouseUp.bind(this);

    window.addEventListener('keydown', this._onKeyDown);
    window.addEventListener('keyup', this._onKeyUp);
    canvas.addEventListener('mousemove', this._onMouseMove);
    canvas.addEventListener('mousedown', this._onMouseDown);
    canvas.addEventListener('mouseup', this._onMouseUp);
  }

  /** @private Handle keydown events */
  _onKeyDown(e) {
    this.keys.add(e.key.toLowerCase());
    if (e.key === 'Escape' || e.key === 'p') {
      e.preventDefault();
      game.togglePause();
    }
  }

  /** @private Handle keyup events */
  _onKeyUp(e) {
    this.keys.delete(e.key.toLowerCase());
  }

  /** @private Track mouse movement relative to canvas */
  _onMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CONFIG.WIDTH / rect.width;
    const scaleY = CONFIG.HEIGHT / rect.height;
    this.mouse.x = (e.clientX - rect.left) * scaleX;
    this.mouse.y = (e.clientY - rect.top) * scaleY;
  }

  /** @private Handle mouse down */
  _onMouseDown(e) {
    this.mouseDown = true;
  }

  /** @private Handle mouse up */
  _onMouseUp(e) {
    this.mouseDown = false;
  }

  /**
   * Check if a key is currently held down.
   * @param {string} key - Key name (lowercase)
   * @returns {boolean} True if key is pressed
   */
  isDown(key) {
    return this.keys.has(key.toLowerCase());
  }

  /**
   * Get movement direction vector from WASD/arrow input.
   * @returns {{x: number, y: number}} Normalized direction vector
   */
  getMovement() {
    let dx = 0, dy = 0;
    if (this.isDown('w') || this.isDown('arrowup')) dy -= 1;
    if (this.isDown('s') || this.isDown('arrowdown')) dy += 1;
    if (this.isDown('a') || this.isDown('arrowleft')) dx -= 1;
    if (this.isDown('d') || this.isDown('arrowright')) dx += 1;
    return normalize(dx, dy);
  }

  /** Clean up event listeners */
  destroy() {
    window.removeEventListener('keydown', this._onKeyDown);
    window.removeEventListener('keyup', this._onKeyUp);
    canvas.removeEventListener('mousemove', this._onMouseMove);
    canvas.removeEventListener('mousedown', this._onMouseDown);
    canvas.removeEventListener('mouseup', this._onMouseUp);
  }
}

/**
 * Particle - A single visual particle with position, velocity, color, and lifetime.
 */
class Particle {
  /**
   * @param {number} x - Start x
   * @param {number} y - Start y
   * @param {number} vx - Velocity x
   * @param {number} vy - Velocity y
   * @param {string} color - Hex color
   * @param {number} life - Lifetime in ms
   * @param {number} size - Base particle size
   * @param {boolean} glow - Whether to add glow effect
   */
  constructor(x, y, vx, vy, color, life, size = 2, glow = true) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.size = size;
    this.glow = glow;
    this.alive = true;
  }

  /**
   * Update particle state - move and decay.
   * @param {number} dt - Delta time in ms
   */
  update(dt) {
    this.x += this.vx * (dt / 16);
    this.y += this.vy * (dt / 16);
    this.life -= dt;
    if (this.life <= 0) {
      this.alive = false;
    }
    // Slow down over time
    this.vx *= 0.98;
    this.vy *= 0.98;
  }

  /**
   * Get current opacity based on remaining life.
   * @returns {number} Alpha value (0-1)
   */
  getAlpha() {
    return clamp(this.life / this.maxLife, 0, 1);
  }

  /**
   * Render the particle to canvas.
   * @param {CanvasRenderingContext2D} ctx - Canvas context
   */
  render(ctx) {
    const alpha = this.getAlpha();
    const currentSize = this.size * alpha;

    if (this.glow && alpha > 0.2) {
      ctx.save();
      ctx.globalAlpha = alpha * 0.3;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = currentSize * 4;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, currentSize * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

/**
 * ParticleSystem - Manages a pool of particles for visual effects.
 * Handles creation, updating, and rendering of all particles.
 */
class ParticleSystem {
  constructor() {
    /** @type {Particle[]} Active particles */
    this.particles = [];
  }

  /**
   * Emit a burst of particles from a point.
   * @param {number} x - Origin x
   * @param {number} y - Origin y
   * @param {string} color - Particle color
   * @param {number} count - Number of particles
   * @param {number} speed - Base speed
   * @param {number} life - Lifetime in ms
   * @param {number} size - Particle size
   * @param {number} spread - Angular spread
   */
  emit(x, y, color, count, speed, life, size = 2, spread = Math.PI * 2) {
    for (let i = 0; i < count; i++) {
      const angle = rand(-spread / 2, spread / 2) + (spread < Math.PI * 2 ? Math.random() * Math.PI * 2 : 0);
      const spd = rand(speed * 0.5, speed);
      const vx = Math.cos(angle) * spd;
      const vy = Math.sin(angle) * spd;
      const p = new Particle(x, y, vx, vy, color, rand(life * 0.5, life), size);
      this.particles.push(p);
    }
  }

  /**
   * Emit a directional burst (e.g., from a projectile hit).
   * @param {number} x - Origin x
   * @param {number} y - Origin y
   * @param {number} angle - Direction in radians
   * @param {string} color - Particle color
   * @param {number} count - Number of particles
   * @param {number} speed - Speed
   * @param {number} life - Lifetime
   * @param {number} spread - Angular spread
   */
  emitDirectional(x, y, angle, color, count, speed, life, spread = Math.PI / 2) {
    for (let i = 0; i < count; i++) {
      const a = angle + rand(-spread, spread);
      const spd = rand(speed * 0.4, speed);
      const vx = Math.cos(a) * spd;
      const vy = Math.sin(a) * spd;
      const p = new Particle(x, y, vx, vy, color, rand(life * 0.6, life), rand(1.5, 3));
      this.particles.push(p);
    }
  }

  /**
   * Create a trail particle behind a moving entity.
   * @param {number} x - Position x
   * @param {number} y - Position y
   * @param {string} color - Color
   * @param {number} size - Particle size
   */
  trail(x, y, color, size = 1.5) {
    const p = new Particle(
      x + rand(-3, 3), y + rand(-3, 3),
      rand(-0.5, 0.5), rand(-0.5, 0.5),
      color, rand(200, 500), size, true
    );
    p.vx *= 0.3;
    p.vy *= 0.3;
    this.particles.push(p);
  }

  /**
   * Update all particles, removing dead ones.
   * @param {number} dt - Delta time
   */
  update(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this.particles[i].update(dt);
      if (!this.particles[i].alive) {
        this.particles.splice(i, 1);
      }
    }
    // Cap total particles to prevent performance issues
    if (this.particles.length > CONFIG.MAX_PARTICLES) {
      this.particles.splice(0, this.particles.length - CONFIG.MAX_PARTICLES);
    }
  }

  /**
   * Render all particles.
   * @param {CanvasRenderingContext2D} ctx - Canvas context
   */
  render(ctx) {
    for (const p of this.particles) {
      p.render(ctx);
    }
  }

  /** Remove all particles */
  clear() {
    this.particles.length = 0;
  }
}

/**
 * FloatingText - A damage number or text that floats upward and fades.
 */
class FloatingText {
  /**
   * @param {number} x - Start x
   * @param {number} y - Start y
   * @param {string} text - Text to display
   * @param {string} color - Text color
   * @param {number} life - Lifetime in ms
   */
  constructor(x, y, text, color, life = 1000) {
    this.x = x;
    this.y = y;
    this.text = text;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.alive = true;
    this.fontSize = 14;
  }

  /**
   * Update floating text position and lifetime.
   * @param {number} dt - Delta time
   */
  update(dt) {
    this.y -= 1.2 * (dt / 16);
    this.life -= dt;
    if (this.life <= 0) this.alive = false;
  }

  /**
   * Get current opacity.
   * @returns {number} Alpha value
   */
  getAlpha() {
    const t = this.life / this.maxLife;
    return clamp(t * 2, 0, 1);
  }

  /**
   * Render floating text.
   * @param {CanvasRenderingContext2D} ctx - Canvas context
   */
  render(ctx) {
    const alpha = this.getAlpha();
    if (alpha <= 0.01) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.font = `bold ${this.fontSize}px 'Rajdhani', sans-serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    ctx.fillText(this.text, this.x, this.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

/**
 * FloatingTextManager - Manages all floating damage numbers and messages.
 */
class FloatingTextManager {
  constructor() {
    /** @type {FloatingText[]} Active texts */
    this.texts = [];
  }

  /**
   * Add a floating text.
   * @param {number} x - Position x
   * @param {number} y - Position y
   * @param {string} text - Text content
   * @param {string} color - Text color
   */
  add(x, y, text, color) {
    this.texts.push(new FloatingText(x, y, text, color));
  }

  /**
   * Add a damage number with appropriate formatting.
   * @param {number} x - Position x
   * @param {number} y - Position y
   * @param {number} dmg - Damage amount
   * @param {boolean} isCrit - Whether this is a critical hit
   */
  addDamage(x, y, dmg, isCrit = false) {
    const text = Math.round(dmg).toString();
    const color = isCrit ? CONFIG.COLORS.GOLD : CONFIG.COLORS.WHITE;
    this.texts.push(new FloatingText(x + rand(-8, 8), y + rand(-4, 4), text, color));
    if (isCrit) {
      this.texts.push(new FloatingText(x, y - 12, 'CRIT!', CONFIG.COLORS.GOLD, 800));
    }
  }

  /**
   * Update all floating texts.
   * @param {number} dt - Delta time
   */
  update(dt) {
    for (let i = this.texts.length - 1; i >= 0; i--) {
      this.texts[i].update(dt);
      if (!this.texts[i].alive) {
        this.texts.splice(i, 1);
      }
    }
  }

  /**
   * Render all floating texts.
   * @param {CanvasRenderingContext2D} ctx - Canvas context
   */
  render(ctx) {
    for (const t of this.texts) {
      t.render(ctx);
    }
  }

  /** Clear all floating texts */
  clear() {
    this.texts.length = 0;
  }
}

/**
 * Entity - Base class for all game entities (Player, Enemy, Projectile, Gem).
 * Provides position, size, alive state, and render hooks.
 */
class Entity {
  /**
   * @param {number} x - Initial x position
   * @param {number} y - Initial y position
   * @param {number} size - Radius/size of entity
   */
  constructor(x, y, size = 10) {
    this.x = x;
    this.y = y;
    this.size = size;
    this.alive = true;
    this.vx = 0;
    this.vy = 0;
  }

  /**
   * Update entity state. Override in subclasses.
   * @param {number} dt - Delta time in ms
   */
  update(dt) {}

  /**
   * Render entity. Override in subclasses.
   * @param {CanvasRenderingContext2D} ctx - Canvas context
   */
  render(ctx) {}

  /**
   * Check collision with another entity (circle-circle).
   * @param {Entity} other - Other entity
   * @returns {boolean} True if colliding
   */
  collidesWith(other) {
    const d = distance(this.x, this.y, other.x, other.y);
    return d < this.size + other.size;
  }
}
