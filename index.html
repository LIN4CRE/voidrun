/**
 * Elite affixes that can be applied to enemies for variety.
 * Elites have additional abilities and drop better rewards.
 */
const ELITE_AFFIXES = [
  {
    name: 'Vampiric',
    color: '#ff4466',
    hpMult: 1.5,
    sizeMult: 1.3,
    speedMult: 1.1,
    xpMult: 3,
    effect: (enemy, dt) => {
      // Heals over time
      if (enemy._eliteTimer === undefined) enemy._eliteTimer = 0;
      enemy._eliteTimer += dt;
      if (enemy._eliteTimer > 3000) {
        enemy._eliteTimer = 0;
        enemy.hp = Math.min(enemy.maxHp, enemy.hp + enemy.maxHp * 0.05);
      }
    },
  },
  {
    name: 'Frenzied',
    color: '#ff8800',
    hpMult: 0.8,
    sizeMult: 1.1,
    speedMult: 2.2,
    xpMult: 2.5,
    effect: (enemy, dt) => {
      // Speed pulses
      if (!enemy._eliteTimer) enemy._eliteTimer = 0;
      enemy._eliteTimer += dt;
      const pulse = 1 + Math.sin(enemy._eliteTimer * 0.003) * 0.3;
      enemy.speed = enemy._baseSpeed * enemy.speedMult * pulse;
    },
  },
  {
    name: 'Armored',
    color: '#8888cc',
    hpMult: 3.0,
    sizeMult: 1.4,
    speedMult: 0.7,
    xpMult: 4,
    effect: (enemy, dt) => {
      // Damage reduction (visual only, handled in damage calc)
      enemy.armor = 5;
    },
  },
  {
    name: 'Explosive',
    color: '#ff4444',
    hpMult: 1.0,
    sizeMult: 1.2,
    speedMult: 1.2,
    xpMult: 3,
    effect: (enemy, dt) => {},
    onDeath: (enemy, game) => {
      // Explodes on death, damaging nearby enemies doesn't affect player
      game.particles.emit(enemy.x, enemy.y, '#ff4400', 20, 5, 500, 3);
      game.addScreenShake(3);
    },
  },
  {
    name: 'Spectral',
    color: '#44ddff',
    hpMult: 0.6,
    sizeMult: 0.9,
    speedMult: 1.5,
    xpMult: 2,
    effect: (enemy, dt) => {
      // Phases in and out - becomes transparent/dodges
      if (!enemy._eliteTimer) enemy._eliteTimer = Math.random() * 2000;
      enemy._eliteTimer += dt;
      enemy._phasing = Math.sin(enemy._eliteTimer * 0.004) > 0.3;
    },
  },
];

/**
 * Check if an enemy should spawn as elite.
 * @param {number} wave - Current wave
 * @returns {boolean} True if this enemy should be elite
 */
function shouldBeElite(wave) {
  const chance = Math.min(0.25, 0.02 + wave * 0.015);
  return Math.random() < chance;
}

/**
 * Apply a random elite affix to an enemy.
 * @param {Enemy} enemy - The enemy to upgrade
 * @param {number} wave - Current wave
 * @returns {Object} The applied affix
 */
function applyEliteAffix(enemy, wave) {
  // Weight affixes - some only appear at higher waves
  const available = ELITE_AFFIXES.filter((_, i) => i <= Math.min(wave, ELITE_AFFIXES.length - 1));
  const affix = pick(available);

  enemy.isElite = true;
  enemy.eliteAffix = affix;
  enemy.maxHp = Math.round(enemy.maxHp * affix.hpMult);
  enemy.hp = enemy.maxHp;
  enemy.size = Math.round(enemy.size * affix.sizeMult);
  enemy._baseSpeed = enemy.speed;
  enemy.speed = enemy.speed * affix.speedMult;
  enemy.xpDrop = Math.round(enemy.xpDrop * affix.xpMult);
  enemy.eliteColor = affix.color;
  enemy.name = affix.name + ' ' + enemy.name;

  return affix;
}

// ====================================================================
//  SECTION 21: EXTENDED GAME CLASS ADDITIONS
// ====================================================================
// These methods and properties are added to the Game class via monkey-patching
// in the init function after Game is fully defined.

/**
 * Apply extended features to the Game prototype.
 * Called once during initialization to add new systems.
 */
function extendGameWithFeatures(GameClass) {
  // Add audio system
  const origStartGame = GameClass.prototype.startGame;
  GameClass.prototype.startGame = function() {
    origStartGame.call(this);

    // Initialize subsystems
    if (!this.sound) this.sound = new SoundSystem();
    this.sound.init();

    if (!this.achievements) this.achievements = new AchievementManager();
    this.achievements.resetSession();

    if (!this.combo) this.combo = new ComboSystem();
    this.combo.reset();

    if (!this.minimap) this.minimap = new Minimap();

    // Tracking variables
    this._bossesKilled = 0;
    this._totalHealed = 0;
    this._critStreak = 0;
    this._lastCritTime = 0;

    // Start background music
    this.sound.startMusic();
  };

  // Extend update to include new systems
  const origUpdate = GameClass.prototype.update;
  let _lastWave = 0;
  GameClass.prototype.update = function(dt) {
    if (this.state !== 'playing') return;

    origUpdate.call(this, dt);
    if (this.state !== 'playing') return;

    // Wave advance sound
    if (this.wave > _lastWave) {
      _lastWave = this.wave;
      if (this.sound) this.sound.sfxNewWave();
    }

    // Update combo system
    if (this.combo) this.combo.update(dt);

    // Update elite enemy effects
    for (const enemy of this.enemies) {
      if (!enemy.alive || !enemy.isElite) continue;
      if (enemy.eliteAffix && enemy.eliteAffix.effect) {
        enemy.eliteAffix.effect(enemy, dt);
      }
    }

    // Check achievements periodically
    if (this.achievements && Math.floor(this.gameTime / 2000) !== Math.floor((this.gameTime - dt) / 2000)) {
      this.achievements.check(this);
    }

    // Track crit streak
    if (this._lastCritTime > 0 && this.gameTime - this._lastCritTime > 500) {
      this._critStreak = 0;
    }
  };

  // Extend render to include new systems
  const origRender = GameClass.prototype._render;
  GameClass.prototype._render = function() {
    origRender.call(this);

    // Render combo display
    if (this.combo) this.combo.render(ctx);

    // Render minimap
    if (this.minimap) this.minimap.render(ctx, this);

    // Render achievement notifications
    if (this.achievements) this.achievements.render(ctx, this.gameTime);
  };

  // Extend weapon firing to include sound
  const origProcessWeaponResult = GameClass.prototype._processWeaponResult;
  GameClass.prototype._processWeaponResult = function(result) {
    origProcessWeaponResult.call(this, result);
    if (this.sound && result.weaponId) {
      this.sound.sfxWeaponFire(result.weaponId);
    }
  };

  // Extend enemy kill handling
  const origOnEnemyKilled = GameClass.prototype._onEnemyKilled;
  GameClass.prototype._onEnemyKilled = function(enemy) {
    origOnEnemyKilled.call(this, enemy);

    // Sound effects
    if (this.sound) {
      if (enemy.behavior === 'boss') {
        this.sound.sfxBossKill();
        this._bossesKilled++;
      } else {
        this.sound.sfxEnemyKill();
      }
    }

    // Combo
    if (this.combo) this.combo.onKill(this);

    // Elite on-death effects
    if (enemy.isElite && enemy.eliteAffix && enemy.eliteAffix.onDeath) {
      enemy.eliteAffix.onDeath(enemy, this);
    }
  };

  // Extend damage handling for crit tracking
  const origTakeDamage = Enemy.prototype.takeDamage;
  Enemy.prototype.takeDamage = function(amount, isCrit) {
    const died = origTakeDamage.call(this, amount, isCrit);
    if (game && game._critStreak !== undefined) {
      if (isCrit) {
        game._critStreak++;
        game._lastCritTime = game.gameTime;
      } else {
        game._critStreak = 0;
      }
    }
    return died;
  };

  // Extend player takeDamage for sound
  const origPlayerTakeDamage = Player.prototype.takeDamage;
  Player.prototype.takeDamage = function(amount) {
    const result = origPlayerTakeDamage.call(this, amount);
    if (game && game.sound && result) {
      game.sound.sfxPlayerHit();
    }
    return result;
  };

  // Extend player heal tracking
  const origHeal = Player.prototype.heal;
  Player.prototype.heal = function(amount) {
    origHeal.call(this, amount);
    if (game) game._totalHealed = (game._totalHealed || 0) + amount;
  };

  // Extend gem pickup for sound
  const origHandlePickups = GameClass.prototype._handlePickups;
  GameClass.prototype._handlePickups = function() {
    const gemCountBefore = this.gems.filter(g => g.alive).length;
    origHandlePickups.call(this);
    const gemCountAfter = this.gems.filter(g => g.alive).length;
    if (gemCountAfter < gemCountBefore && this.sound) {
      this.sound.sfxGemPickup();
    }
  };

  // Extend triggerLevelUp for sound and achievements
  const origTriggerLevelUp = GameClass.prototype.triggerLevelUp;
  GameClass.prototype.triggerLevelUp = function() {
    origTriggerLevelUp.call(this);
    if (this.sound) this.sound.sfxLevelUp();
  };

  // Extend game over cleanup
  const origGameOver = GameClass.prototype._gameOver;
  GameClass.prototype._gameOver = function() {
    if (this.sound) this.sound.stopMusic();
    origGameOver.call(this);
  };

  // Extend spawn enemies to support elites
  const origSpawnOneEnemy = GameClass.prototype._spawnOneEnemy;
  GameClass.prototype._spawnOneEnemy = function() {
    origSpawnOneEnemy.call(this);
    // Apply elite to the most recently spawned enemy
    const enemy = this.enemies[this.enemies.length - 1];
    if (enemy && shouldBeElite(this.wave) && enemy.behavior !== 'boss') {
      applyEliteAffix(enemy, this.wave);
    }
  };

  // Extend game over UI for extended stats
  const origShowGameOverUI = GameClass.prototype._showGameOverUI;
  GameClass.prototype._showGameOverUI = function() {
    const surviveMinutes = Math.floor(this.gameTime / 60000);
    const surviveSeconds = Math.floor((this.gameTime % 60000) / 1000);
    const screen = document.getElementById('gameover-screen');
    screen.classList.remove('hidden');

    const statsContainer = document.getElementById('stats-container');
    statsContainer.innerHTML = `
      <span class="stat-label">Time Survived</span>
      <span class="stat-value">${surviveMinutes}m ${surviveSeconds}s</span>
      <span class="stat-label">Level Reached</span>
      <span class="stat-value">${this.player.highestLevel}</span>
      <span class="stat-label">Enemies Killed</span>
      <span class="stat-value">${this.player.totalKills}</span>
      <span class="stat-label">Wave</span>
      <span class="stat-value">${this.wave}</span>
      <span class="stat-label">Weapons Unlocked</span>
      <span class="stat-value">${this.player.ownedWeapons.size}</span>
      <span class="stat-label">Max Combo</span>
      <span class="stat-value">${this.combo ? this.combo.maxCombo : 0}x</span>
      <span class="stat-label">Bosses Slain</span>
      <span class="stat-value">${this._bossesKilled || 0}</span>
      <span class="stat-label">HP Regenerated</span>
      <span class="stat-value">${Math.round(this._totalHealed || 0)}</span>
      <span class="stat-label">Achievements</span>
      <span class="stat-value">${this.achievements ? this.achievements.unlocked.size : 0}/${ACHIEVEMENTS.length}</span>
    `;
  };
}

/**
 * Master extension function - wires meta-progression, items, classes,
 * modes, bestiary, synergies, obstacles, biomes, difficulty, and tutorial
 * into the Game class and Player class.
 */
function extendGameAllSystems(GameClass) {

  // ── Add new weapon upgrade pool ──
  NEW_WEAPON_UPGRADES.forEach(u => UPGRADE_POOL.push(u));

  // ── NEW WEAPON PROCESSING (extend _processWeaponResult) ──
  const origProcessWeapon = GameClass.prototype._processWeaponResult;
  GameClass.prototype._processWeaponResult = function(result) {
    origProcessWeapon.call(this, result);
    if (result.type === 'sweep') this._handleSweep(result);
    else if (result.type === 'meteor') this._handleMeteor(result);
    else if (result.type === 'poisonCloud') this._handlePoisonCloudSpawn(result);
    else if (result.type === 'clone') this._handleCloneSpawn(result);
    else if (result.type === 'chainStorm') this._handleChainStorm(result);
    else if (result.type === 'plasmaBall') this._handlePlasmaBall(result);
  };

  // ── SWEEP ATTACK ──
  GameClass.prototype._handleSweep = function(result) {
    const def = this.player.getWeaponDef('shadowScythe');
    if (!def) return;
    const state = this.player.weaponState.shadowScythe || {};
    const arc = def.sweepAngle * (state.arcMult || 1);
    const radius = def.sweepRadius * (state.radiusMult || 1);
    // Determine sweep direction (alternating)
    const dir = (this._sweepDir = !this._sweepDir) ? 1 : -1;
    // Find nearest enemy to aim toward
    let aimAngle = 0;
    let nearest = null, minD = Infinity;
    for (const e of this.enemies) {
      if (!e.alive) continue;
      const d = distance(this.player.x, this.player.y, e.x, e.y);
      if (d < minD) { minD = d; nearest = e; }
    }
    if (nearest) aimAngle = angleTo(this.player.x, this.player.y, nearest.x, nearest.y);
    const startAngle = aimAngle - arc / 2 * dir;
    const endAngle = aimAngle + arc / 2 * dir;
    // Damage enemies in the arc
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;
      const d = distance(this.player.x, this.player.y, enemy.x, enemy.y);
      if (d > radius) continue;
      const a = angleTo(this.player.x, this.player.y, enemy.x, enemy.y);
      // Check if angle is within sweep arc
      let aDiff = a - startAngle;
      while (aDiff < 0) aDiff += Math.PI * 2;
      while (aDiff > Math.PI * 2) aDiff -= Math.PI * 2;
      const sweepEnd = endAngle - startAngle;
      const normalizedEnd = sweepEnd < 0 ? sweepEnd + Math.PI * 2 : sweepEnd;
      if (aDiff <= normalizedEnd + 0.3) {
        const died = enemy.takeDamage(def.damage * (this.player._dmgBoost || 1));
        this.floatingTexts.addDamage(enemy.x, enemy.y, def.damage, false);
        this.particles.emit(enemy.x, enemy.y, def.color, 3, 2, 150, 1.5);
        if (died) this._onEnemyKilled(enemy);
      }
    }
    // Visual sweep arc
    this._sweepArcs = this._sweepArcs || [];
    this._sweepArcs.push({ x: this.player.x, y: this.player.y, radius, startAngle, endAngle, color: def.color, life: 200 });
    this.particles.emitDirectional(this.player.x, this.player.y, aimAngle, def.color, 8, 2, 250, arc / 2);
  };

  // ── METEOR STRIKE ──
  GameClass.prototype._handleMeteor = function(result) {
    const def = this.player.getWeaponDef('meteor');
    if (!def) return;
    const state = this.player.weaponState.meteor || {};
    const radius = def.strikeRadius * (state.radiusMult || 1);
    const count = def.strikeCount + (state.countBonus || 0);
    // Target random enemies or random positions
    for (let i = 0; i < count; i++) {
      let tx, ty;
      const alive = this.enemies.filter(e => e.alive);
      if (alive.length > 0 && Math.random() < 0.8) {
        const target = alive[Math.floor(Math.random() * alive.length)];
        tx = target.x + rand(-20, 20);
        ty = target.y + rand(-20, 20);
      } else {
        tx = this.player.x + rand(-150, 150);
        ty = this.player.y + rand(-150, 150);
      }
      tx = clamp(tx, 20, CONFIG.WIDTH - 20);
      ty = clamp(ty, 20, CONFIG.HEIGHT - 20);
      // Telegraph
      this._meteorTelegraphs = this._meteorTelegraphs || [];
      this._meteorTelegraphs.push({ x: tx, y: ty, radius, life: 500, color: def.color });
      // Damage after delay
      const dmg = def.damage * (this.player._dmgBoost || 1);
      const trap = { x: tx, y: ty, radius, damage: dmg, color: def.color, life: 500, gameRef: this };
      this._meteorTelegraphs.push(trap);
      // After telegraph, apply damage
      const gameRef = this;
      setTimeout(() => {
        if (!gameRef || gameRef.state !== 'playing') return;
        for (const enemy of gameRef.enemies) {
          if (!enemy.alive) continue;
          if (distance(tx, ty, enemy.x, enemy.y) < radius) {
            const died = enemy.takeDamage(dmg);
            gameRef.floatingTexts.addDamage(enemy.x, enemy.y, dmg, false);
            if (died) gameRef._onEnemyKilled(enemy);
          }
        }
        gameRef.particles.emit(tx, ty, def.color, 15, 4, 400, 2.5);
        gameRef.addScreenShake(2);
        // Remove telegraph
        const idx = gameRef._meteorTelegraphs.indexOf(trap);
        if (idx !== -1) gameRef._meteorTelegraphs.splice(idx, 1);
      }, 500);
    }
  };

  // ── POISON CLOUD ──
  GameClass.prototype._handlePoisonCloudSpawn = function(result) {
    const def = this.player.getWeaponDef('poisonCloud');
    if (!def) return;
    const state = this.player.weaponState.poisonCloud || {};
    const radius = def.cloudRadius * (state.radiusMult || 1);
    const duration = def.cloudDuration * (state.durationMult || 1);
    const tickRate = def.cloudTickRate * (state.tickMult || 1);
    const dmg = def.damage * (this.player._dmgBoost || 1);
    const count = def.count;
    // Spawn clouds near random enemies or around player
    for (let i = 0; i < count; i++) {
      let cx, cy;
      const alive = this.enemies.filter(e => e.alive);
      if (alive.length > 0 && Math.random() < 0.7) {
        const t = alive[Math.floor(Math.random() * alive.length)];
        cx = t.x + rand(-30, 30); cy = t.y + rand(-30, 30);
      } else {
        cx = this.player.x + rand(-60, 60); cy = this.player.y + rand(-60, 60);
      }
      this._poisonClouds = this._poisonClouds || [];
      this._poisonClouds.push({
        x: cx, y: cy, radius, life: duration, tickRate, lastTick: 0,
        damage: dmg, color: def.color, slowAmount: def.slowAmount, slowDuration: def.slowDuration,
      });
    }
  };

  // ── MIRROR IMAGE / CLONES ──
  GameClass.prototype._handleCloneSpawn = function(result) {
    const def = this.player.getWeaponDef('mirrorImage');
    if (!def) return;
    const state = this.player.weaponState.mirrorImage || {};
    const count = def.cloneCount + (state.countBonus || 0);
    const life = def.cloneLifetime * (state.lifeMult || 1);
    const dmgRatio = def.cloneDamage + (state.dmgMult || 0);
    this._clones = this._clones || [];
    // Remove old clones
    this._clones = this._clones.filter(c => c.life > 0);
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + (this.gameTime * 0.001);
      const dist = 50;
      this._clones.push({
        x: this.player.x + Math.cos(angle) * dist,
        y: this.player.y + Math.sin(angle) * dist,
        life, maxLife: life, damageRatio: dmgRatio,
      });
    }
    this.particles.emit(this.player.x, this.player.y, def.color, 8, 2, 300, 2);
  };

  // ── CHAIN STORM ──
  GameClass.prototype._handleChainStorm = function(result) {
    const def = this.player.getWeaponDef('chainStorm');
    if (!def) return;
    const state = this.player.weaponState.chainStorm || {};
    const strikes = def.strikeCount + (state.strikeBonus || 0);
    const chains = def.chainCount + (state.chainBonus || 0);
    const range = def.chainRange * (state.rangeMult || 1);
    const dmg = def.damage * (this.player._dmgBoost || 1);
    for (let s = 0; s < strikes; s++) {
      // Pick a random enemy as the strike origin
      const alive = this.enemies.filter(e => e.alive);
      if (alive.length === 0) break;
      const first = alive[Math.floor(Math.random() * alive.length)];
      // Chain from first enemy
      let current = first;
      let chainDmg = dmg;
      const hit = new Set();
      for (let c = 0; c < chains; c++) {
        if (!current || !current.alive || hit.has(current)) break;
        const died = current.takeDamage(chainDmg);
        this.floatingTexts.addDamage(current.x, current.y, chainDmg, false);
        this.particles.emit(current.x, current.y, def.color, 4, 2, 200, 2);
        if (died) this._onEnemyKilled(current);
        hit.add(current);
        chainDmg *= def.chainDamageFalloff;
        // Find next target
        let next = null, minD = range;
        for (const e of this.enemies) {
          if (!e.alive || hit.has(e)) continue;
          const d = distance(current.x, current.y, e.x, e.y);
          if (d < minD) { minD = d; next = e; }
        }
        if (next) {
          this._lightningArcs = this._lightningArcs || [];
          this._lightningArcs.push({ x1: current.x, y1: current.y, x2: next.x, y2: next.y, color: def.color, life: 200 });
        }
        current = next;
      }
    }
  };

  // ── PLASMA BALL ──
  GameClass.prototype._handlePlasmaBall = function(result) {
    // Spawn as regular projectile but with bounce tracking
    const proj = new Projectile(result);
    proj._bouncesLeft = (WEAPON_DEFS.plasmaBall.bounceCount || 3) + (this.player.weaponState.plasmaBall.bounceBonus || 0);
    proj._bounceRange = WEAPON_DEFS.plasmaBall.bounceRange || 120;
    proj._bounceHit = new Set();
    this.projectiles.push(proj);
    this.particles.emit(result.x, result.y, result.color, 3, 1.5, 200, 2);
  };

  // ── Plasma ball bounce logic in projectile update ──
  const origProjUpdate = Projectile.prototype.update;
  Projectile.prototype.update = function(dt, enemies) {
    origProjUpdate.call(this, dt, enemies);
    if (!this.alive || !this._bouncesLeft || this._bouncesLeft <= 0) return;
    // Check for bounce targets
    for (const e of enemies) {
      if (!e.alive || this._bounceHit.has(e)) continue;
      const d = distance(this.x, this.y, e.x, e.y);
      if (d < this._bounceRange && !this._bounceHit.has(e)) {
        this._bounceHit.add(e);
        const targetAngle = angleTo(this.x, this.y, e.x, e.y);
        this.angle = targetAngle;
        this.vx = Math.cos(this.angle) * this.speed;
        this.vy = Math.sin(this.angle) * this.speed;
        this._bouncesLeft--;
        this.life += 500; // Extend life on bounce
        break;
      }
    }
  };

  // ── EXTEND PLAYER FIREWEAPON FOR NEW WEAPON TYPES ──
  const origFireWeapon = Player.prototype.fireWeapon;
  Player.prototype.fireWeapon = function(weaponId, enemies) {
    const origResults = origFireWeapon.call(this, weaponId, enemies);
    if (!origResults || origResults.length === 0) {
      // Check for new weapon types
      if (weaponId === 'shadowScythe' || weaponId === 'meteor' || weaponId === 'poisonCloud' ||
          weaponId === 'mirrorImage' || weaponId === 'chainStorm' || weaponId === 'plasmaBall') {
        if (this.weaponCooldowns[weaponId] > 0 || !this.ownedWeapons.has(weaponId)) return [];
        const def = this.getWeaponDef(weaponId);
        if (!def) return [];
        this.weaponCooldowns[weaponId] = def.cooldown * (this._cdBoost ? 0.4 : 1) * (this._cdPermBoost || 1);
        const results = [];
        if (def.isSweep) results.push({ type: 'sweep', weaponId });
        else if (def.isMeteor) results.push({ type: 'meteor', weaponId });
        else if (def.isCloud) results.push({ type: 'poisonCloud', weaponId });
        else if (def.isClone) results.push({ type: 'clone', weaponId });
        else if (def.isChainStorm) results.push({ type: 'chainStorm', weaponId });
        else if (def.bounceCount) results.push({
          type: 'projectile', weaponId, x: this.x, y: this.y,
          angle: enemies.length > 0 ? angleTo(this.x, this.y, enemies[0].x, enemies[0].y) : 0,
          speed: def.projectileSpeed, damage: def.damage * (this.isCriticalHit() ? this.critMult : 1) * (this._dmgBoost || 1),
          size: def.projectileSize, life: def.projectileLife, color: def.color,
          pierce: (def.pierce || 0) + ((this.weaponState[weaponId] || {}).pierceBonus || 0),
          homing: def.homing || 0, knockback: def.knockback || 0,
          explosive: def.explosive || false, explosionRadius: def.explosionRadius || 0, explosionDamage: def.explosionDamage || 0,
        });
        return results;
      }
      return [];
    }
    return origResults;
  };

  // ── Adjust player weapon def getter for new weapons ──
  const origGetWeaponDef = Player.prototype.getWeaponDef;
  Player.prototype.getWeaponDef = function(weaponId) {
    const base = origGetWeaponDef.call(this, weaponId);
    if (!base) return null;
    const state = this.weaponState[weaponId] || {};
    if (weaponId === 'shadowScythe') {
      if (state.arcMult) base.sweepAngle = WEAPON_DEFS.shadowScythe.sweepAngle * state.arcMult;
      if (state.radiusMult) base.sweepRadius = WEAPON_DEFS.shadowScythe.sweepRadius * state.radiusMult;
    }
    if (weaponId === 'chainStorm') {
      if (state.strikeBonus) base.strikeCount = WEAPON_DEFS.chainStorm.strikeCount + state.strikeBonus;
    }
    return base;
  };

  // ── META-PROGRESSION & GOLD ──
  GameClass.prototype._meta = null;
  GameClass.prototype._selectedClass = 'voidMage';
  GameClass.prototype._selectedMode = 'endless';
  GameClass.prototype._itemManager = null;
  GameClass.prototype._bestiary = null;
  GameClass.prototype._tutorial = null;
  GameClass.prototype._difficulty = null;
  GameClass.prototype._dailySeed = null;
  GameClass.prototype._currentBiome = null;
  GameClass.prototype._obstacles = [];

  // ── ENHANCED START GAME ──
  const origStartGame2 = GameClass.prototype.startGame;
  GameClass.prototype.startGame = function() {
    if (!this._meta) this._meta = new MetaProgression();
    if (!this._bestiary) this._bestiary = new Bestiary();
    if (!this._tutorial) this._tutorial = new TutorialSystem();
    if (!this._difficulty) this._difficulty = new DifficultyScaler();
    origStartGame2.call(this);

    // Apply permanent upgrades
    applyPermanentUpgrades(this.player, this._meta);

    // Apply character class
    const cls = CHARACTER_CLASSES[this._selectedClass];
    if (cls) {
      this.player.ownedWeapons = new Set(cls.startWeapons);
      cls.startBonuses(this.player);
    }

    // Apply game mode
    const mode = GAME_MODES[this._selectedMode];
    if (mode) {
      CONFIG.WAVE_DURATION_SEC = mode.waveDuration;
      this.player.xpMult *= mode.xpMult;
      if (mode.noWeapons) this.player.ownedWeapons.clear();
      if (mode.bossOnly) { /* handled in spawn logic */ }
    }

    // Extra weapons from meta
    const extraWeps = this._meta.getLevel('extraWeapon');
    const allWeps = Object.keys(WEAPON_DEFS).filter(w => !this.player.ownedWeapons.has(w));
    for (let i = 0; i < extraWeps && allWeps.length > 0; i++) {
      const idx = Math.floor(Math.random() * allWeps.length);
      this.player.ownedWeapons.add(allWeps[idx]);
      allWeps.splice(idx, 1);
    }

    // Init item manager
    this._itemManager = new ItemManager();

    // Pick biome
    const biomeKeys = Object.keys(BIOMES);
    this._currentBiome = BIOMES[biomeKeys[Math.floor(Math.random() * biomeKeys.length)]];

    // Spawn obstacles (depends on wave)
    this._obstacles = [];

    // Check synergies
    checkSynergies(this.player);

    // Daily seed
    this._dailySeed = new DailySeed();

    // Gold mult
    this._goldMult = (mode ? mode.goldMult : 1) * (1 + this._meta.getLevel('goldGain') * 0.1);

    // Init mode-specific state
    this._modeTimeLimit = mode ? mode.timeLimit : 0;
    this._modeStartTime = this.gameTime;

    // Enemy speed mult from mode
    this._modeEnemySpeedMult = mode && mode.enemySpeedMult ? mode.enemySpeedMult : 1;

    // Update difficulty
    this._difficulty.update(this.wave, this.gameTime);
  };

  // ── ENHANCED ENEMY SPAWNING (with mode/boss only) ──
  const origPickEnemyType = GameClass.prototype._pickEnemyType;
  GameClass.prototype._pickEnemyType = function() {
    const mode = GAME_MODES[this._selectedMode];
    if (mode && mode.bossOnly) {
      if (Math.random() < 0.15) return 'boss';
      // Pick from elite-capable types
      const elitePool = ['golem', 'wraith', 'sentinel', 'titan'];
      if (this.wave >= 7) return pick(['boss', 'titan', 'wraith', 'sentinel']);
      if (this.wave >= 4) return pick(['boss', 'golem', 'sentinel']);
      return pick(['boss', 'skeleton']);
    }
    // Add new enemy types to pool
    const result = origPickEnemyType.call(this);
    return result;
  };

  // ── ENHANCED SPAWN ONE ENEMY (with new types + bestiary) ──
  const origSpawnOneEnemy2 = GameClass.prototype._spawnOneEnemy;
  GameClass.prototype._spawnOneEnemy = function() {
    origSpawnOneEnemy2.call(this);
    const enemy = this.enemies[this.enemies.length - 1];
    if (!enemy) return;
    // Bestiary encounter
    if (this._bestiary) this._bestiary.encounter(enemy.typeKey);
    // Mode enemy speed
    if (this._modeEnemySpeedMult !== 1) enemy.speed *= this._modeEnemySpeedMult;
    // Player enemy slow (from items)
    if (this.player._enemySlow) enemy.speed *= (1 - this.player._enemySlow);
    // Apply difficulty scaling
    if (this._difficulty) {
      enemy.maxHp = Math.round(enemy.maxHp * this._difficulty.enemyHpMult);
      enemy.hp = enemy.maxHp;
      enemy.speed *= this._difficulty.enemySpeedMult;
      enemy.damage = Math.round(enemy.damage * this._difficulty.enemyDamageMult);
    }
    // Elite check
    if (shouldBeElite(this.wave)) applyEliteAffix(enemy, this.wave);
  };

  // ── ENHANCED ON ENEMY KILLED (gold, bestiary) ──
  const origOnKilled2 = GameClass.prototype._onEnemyKilled;
  GameClass.prototype._onEnemyKilled = function(enemy) {
    origOnKilled2.call(this, enemy);
    // Bestiary kill tracking
    if (this._bestiary) this._bestiary.kill(enemy.typeKey);
    // Gold drop (1-3 per enemy)
    const goldAmount = Math.max(1, Math.floor(enemy.xpDrop * 0.5 * this._goldMult));
    if (this._meta) this._meta.addGold(goldAmount);
    // Double XP chance (from Soul Gem item)
    if (this.player._doubleXpChance && Math.random() < this.player._doubleXpChance) {
      const extraGems = enemy.xpDrop;
      for (let i = 0; i < extraGems; i++) {
        this.gems.push(new XPGem(enemy.x + rand(-10, 10), enemy.y + rand(-10, 10), 1));
      }
    }
    // Lifesteal (from Vampiric Fang)
    if (this.player._lifestealRate) {
      this.player._lifestealKills = (this.player._lifestealKills || 0) + 1;
      if (this.player._lifestealKills >= this.player._lifestealRate) {
        this.player._lifestealKills = 0;
        this.player.heal(1);
      }
    }
    // Tutorial triggers
    if (this._tutorial) {
      if (this.player.totalKills === 1) this._tutorial.trigger('firstKill', this);
    }
  };

  // ── EXTEND ENEMY UPDATE FOR NEW BEHAVIORS ──
  const origEnemyUpdate = Enemy.prototype.update;
  Enemy.prototype.update = function(dt, player) {
    origEnemyUpdate.call(this, dt, player);
    // Handle new behavior types
    if (this.behavior === 'split' && this.alive && this.hp < this.maxHp * 0.5 && !this._hasSplit) {
      this._hasSplit = true;
      const splitCount = this.splitCount || 2;
      for (let i = 0; i < splitCount; i++) {
        const ang = (Math.PI * 2 / splitCount) * i;
        const child = new Enemy('slime', this.x + Math.cos(ang) * 15, this.y + Math.sin(ang) * 15, 1);
        child.size = this.size * 0.6;
        child.maxHp = Math.round(this.maxHp * 0.3);
        child.hp = child.maxHp;
        if (window.game && window.game.enemies) window.game.enemies.push(child);
      }
    }
    if (this.behavior === 'orbit') {
      // Orbit around player at distance
      if (!this._orbitAngle) this._orbitAngle = Math.random() * Math.PI * 2;
      this._orbitAngle += (this.orbitSpeed || 0.015) * (dt / 16);
      const od = this.orbitDistance || 80;
      const tx = player.x + Math.cos(this._orbitAngle) * od;
      const ty = player.y + Math.sin(this._orbitAngle) * od;
      this.vx = (tx - this.x) * 0.1;
      this.vy = (ty - this.y) * 0.1;
    }
    if (this.behavior === 'fade') {
      if (!this._fadeTimer) this._fadeTimer = 0;
      this._fadeTimer += dt;
      if (this._fadeTimer > (this.fadeInterval || 2000)) {
        this._fadeTimer = 0;
        this._isFaded = !this._isFaded;
      }
      if (!this._isFaded) {
        // Normal movement when visible
      } else {
        this.vx *= 0.3; this.vy *= 0.3;
      }
    }
    if (this.behavior === 'swarm') {
      // Move faster when near other swarm enemies
      const nearbySwarm = window.game && window.game.enemies
        ? window.game.enemies.filter(e => e !== this && e.alive && e.behavior === 'swarm' && distance(this.x, this.y, e.x, e.y) < 60).length
        : 0;
      this.speed = ENEMY_TYPES.larva.speed * (1 + nearbySwarm * (this.swarmBonus || 0.15));
    }
    if (this.behavior === 'miniboss') {
      // Like boss-lite: slow approach with occasional damage pulse
      if (!this._miniPulseTimer) this._miniPulseTimer = 0;
      this._miniPulseTimer += dt;
      if (this._miniPulseTimer > 3000) {
        this._miniPulseTimer = 0;
        if (window.game && distance(this.x, this.y, player.x, player.y) < 100) {
          player.takeDamage(this.damage * 0.3);
        }
      }
    }
  };

  // ── ENHANCED UPDATE (biomes, poison clouds, clones, obstacles, tutorial, difficulty, void pulse) ──
  const origUpdate2 = GameClass.prototype.update;
  GameClass.prototype.update = function(dt) {
    if (this.state !== 'playing') { origUpdate2.call(this, dt); return; }

    origUpdate2.call(this, dt);
    if (this.state !== 'playing') return;

    // Update poison clouds
    if (this._poisonClouds) {
      for (let i = this._poisonClouds.length - 1; i >= 0; i--) {
        const pc = this._poisonClouds[i];
        pc.life -= dt;
        if (pc.life <= 0) { this._poisonClouds.splice(i, 1); continue; }
        pc.lastTick += dt;
        if (pc.lastTick >= pc.tickRate) {
          pc.lastTick = 0;
          for (const enemy of this.enemies) {
            if (!enemy.alive) continue;
            if (distance(pc.x, pc.y, enemy.x, enemy.y) < pc.radius) {
              enemy.takeDamage(pc.damage);
              enemy.applySlow(pc.slowAmount, pc.slowDuration);
            }
          }
        }
      }
    }

    // Update clones
    if (this._clones) {
      for (let i = this._clones.length - 1; i >= 0; i--) {
        this._clones[i].life -= dt;
        if (this._clones[i].life <= 0) { this._clones.splice(i, 1); continue; }
        // Clones orbit and fire weak projectiles
        const c = this._clones[i];
        const angle = angleTo(c.x, c.y, this.player.x, this.player.y);
        c.x += Math.cos(angle + Math.PI / 2) * 0.8 * (dt / 16);
        c.y += Math.sin(angle + Math.PI / 2) * 0.8 * (dt / 16);
        // Clones fire magic bolt occasionally
        if (!c._cloneFireTimer) c._cloneFireTimer = 0;
        c._cloneFireTimer += dt;
        if (c._cloneFireTimer > 1500) {
          c._cloneFireTimer = 0;
          const nearest = this.enemies.find(e => e.alive && distance(c.x, c.y, e.x, e.y) < 300);
          if (nearest) {
            const a = angleTo(c.x, c.y, nearest.x, nearest.y);
            const dmg = 12 * c.damageRatio * (this.player._dmgBoost || 1);
            const proj = new Projectile({ x: c.x, y: c.y, angle: a, speed: 4, damage: dmg, color: '#88ccff', size: 3, life: 1200, pierce: 0, homing: 0.02, knockback: 0 });
            this.projectiles.push(proj);
          }
        }
      }
    }

    // Update meteor telegraphs
    if (this._meteorTelegraphs) {
      for (let i = this._meteorTelegraphs.length - 1; i >= 0; i--) {
        this._meteorTelegraphs[i].life -= dt;
        if (this._meteorTelegraphs[i].life <= 0) this._meteorTelegraphs.splice(i, 1);
      }
    }

    // Update sweep arcs
    if (this._sweepArcs) {
      for (let i = this._sweepArcs.length - 1; i >= 0; i--) {
        this._sweepArcs[i].life -= dt;
        if (this._sweepArcs[i].life <= 0) this._sweepArcs.splice(i, 1);
      }
    }

    // Passive XP for pacifist mode
    if (GAME_MODES[this._selectedMode] && GAME_MODES[this._selectedMode].passiveXp) {
      if (!this._passiveXpTimer) this._passiveXpTimer = 0;
      this._passiveXpTimer += dt;
      if (this._passiveXpTimer > 3000) {
        this._passiveXpTimer = 0;
        this.player.xp += 2;
      }
    }

    // Timed mode check
    if (this._modeTimeLimit > 0 && this.gameTime - this._modeStartTime >= this._modeTimeLimit) {
      this._gameOver();
      return;
    }

    // Berserk item effect
    if (this.player._berserk) {
      const hpRatio = this.player.hp / this.player.maxHp;
      const berserkMult = 1 + (1 - hpRatio) * 0.4;
      this.player._dmgBoost = (this.player._dmgBoost || 1) * berserkMult / (1 + (1 - Math.max(0.01, hpRatio - 0.001)) * 0.4);
    }

    // Void pulse (legendary item)
    if (this.player._voidPulse) {
      this.player._voidPulseTimer += dt;
      if (this.player._voidPulseTimer >= 30000) {
        this.player._voidPulseTimer = 0;
        for (const enemy of this.enemies) {
          if (!enemy.alive) continue;
          enemy.hp = Math.max(1, Math.floor(enemy.hp * 0.5));
        }
        this.particles.emit(this.player.x, this.player.y, '#aa44ff', 50, 6, 800, 3);
        this.addScreenShake(8);
        this.floatingTexts.add(CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, 'VOID PULSE!', '#aa44ff');
      }
    }

    // Difficulty scaling
    if (this._difficulty) this._difficulty.update(this.wave, this.gameTime);
    if (this._difficulty) {
      this.enemyCap = Math.floor(CONFIG.ENEMY_CAP_BASE * this._difficulty.enemyCountMult);
    }

    // Tutorial update
    if (this._tutorial) this._tutorial.update(this);

    // Dodge check for shadow cloak
    if (this.player._dodgeChance) {
      this.player._hasDodge = true;
    }

    // Handle obstacles collision
    for (const obs of this._obstacles) {
      if (obs.collidesWith(this.player)) {
        this.player.takeDamage(obs.damage);
      }
      for (const enemy of this.enemies) {
        if (!enemy.alive) continue;
        if (obs.collidesWith(enemy)) {
          enemy.takeDamage(obs.damage * 0.3);
        }
      }
    }

    // Spawn obstacles at certain waves
    if (this.wave % 3 === 0 && this._obstacles.length < 5) {
      const ox = rand(100, CONFIG.WIDTH - 100);
      const oy = rand(100, CONFIG.HEIGHT - 100);
      if (distance(ox, oy, this.player.x, this.player.y) > 100) {
        this._obstacles.push(new Obstacle(ox, oy, rand(25, 40), Math.random() < 0.6 ? 'crystal' : 'rift'));
      }
    }
  };

  // ── EXTEND RENDER (poison clouds, clones, sweep arcs, meteor telegraphs, obstacles) ──
  const origRender2 = GameClass.prototype._render;
  GameClass.prototype._render = function() {
    origRender2.call(this);

    // Obstacles
    for (const obs of this._obstacles) {
      obs.render(ctx, this.gameTime);
    }

    // Poison clouds
    if (this._poisonClouds) {
      for (const pc of this._poisonClouds) {
        const alpha = Math.min(1, pc.life / 500);
        ctx.save();
        ctx.globalAlpha = alpha * 0.25;
        const grad = ctx.createRadialGradient(pc.x, pc.y, 0, pc.x, pc.y, pc.radius);
        grad.addColorStop(0, pc.color);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(pc.x, pc.y, pc.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = hexToRgba(pc.color, 0.4);
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }
    }

    // Clones
    if (this._clones) {
      for (const c of this._clones) {
        const alpha = Math.min(1, c.life / 500);
        ctx.save();
        ctx.globalAlpha = alpha * 0.6;
        ctx.fillStyle = '#88ccff';
        ctx.shadowColor = '#88ccff';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(c.x, c.y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(c.x, c.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Sweep arcs
    if (this._sweepArcs) {
      for (const arc of this._sweepArcs) {
        const alpha = Math.min(1, arc.life / 100);
        ctx.save();
        ctx.globalAlpha = alpha * 0.35;
        ctx.strokeStyle = arc.color;
        ctx.lineWidth = 4;
        ctx.shadowColor = arc.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(arc.x, arc.y, arc.radius, arc.startAngle, arc.endAngle);
        ctx.stroke();
        ctx.restore();
      }
    }

    // Meteor telegraphs
    if (this._meteorTelegraphs) {
      for (const mt of this._meteorTelegraphs) {
        if (!mt.life) continue;
        const alpha = Math.min(1, mt.life / 300);
        ctx.save();
        ctx.globalAlpha = alpha * 0.4;
        ctx.strokeStyle = mt.color;
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 2]);
        ctx.beginPath();
        ctx.arc(mt.x, mt.y, mt.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#ff8844';
        ctx.font = "bold 14px sans-serif";
        ctx.textAlign = 'center';
        ctx.fillText('☄️', mt.x, mt.y - mt.radius - 6);
        ctx.restore();
      }
    }

    // Tutorial tooltip
    if (this._tutorial) this._tutorial.render(ctx);
  };

  // ── EXTEND PLAYER TAKE DAMAGE (dodge) ──
  const origPlayerTD2 = Player.prototype.takeDamage;
  Player.prototype.takeDamage = function(amount) {
    if (this._dodgeChance && Math.random() < this._dodgeChance) {
      if (window.game) {
        window.game.floatingTexts.add(this.x, this.y - 10, 'DODGE!', '#88ccff');
        window.game.particles.emit(this.x, this.y, '#88ccff', 5, 2, 200, 1.5);
      }
      return false;
    }
    return origPlayerTD2.call(this, amount);
  };

  // ── ENHANCED GAME OVER ──
  const origGameOver2 = GameClass.prototype._gameOver;
  GameClass.prototype._gameOver = function() {
    origGameOver2.call(this);
    // Record run
    if (this._meta) this._meta.recordRun(this.gameTime, this.player.totalKills, this.wave);
    // Cleanup
    this._poisonClouds = [];
    this._clones = [];
    this._sweepArcs = [];
    this._meteorTelegraphs = [];
    this._obstacles = [];
  };

  // ── ENHANCED GAME OVER UI ──
  const origShowUI2 = GameClass.prototype._showGameOverUI;
  GameClass.prototype._showGameOverUI = function() {
    origShowUI2.call(this);
    // Update shop gold display
    if (this._meta) {
      document.getElementById('shop-gold-amount').textContent = this._meta.totalGold;
    }
  };

  // ── ENHANCED XP / LEVEL UP (tutorial trigger) ──
  const origTriggerLU = GameClass.prototype.triggerLevelUp;
  GameClass.prototype.triggerLevelUp = function() {
    origTriggerLU.call(this);
    if (this._tutorial) this._tutorial.trigger('levelUp', this);
  };
}

//  SECTION 17y: SHOP / UI MANAGEMENT

/**
 * UIManager - Manages shop, class selection, mode selection, and bestiary screens.
 */
class UIManager {
  constructor(game) {
    this.game = game;
    this._setupShop();
    this._setupClassSelection();
    this._setupModeSelection();
    this._setupBestiary();
  }

  /** Show the shop screen after a run */
  showShop() {
    this._updateShopDisplay();
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('gameover-screen').classList.add('hidden');
    document.getElementById('shop-screen').classList.add('active');
    document.getElementById('gold-display') || this._addGoldDisplay();
  }

  /** Setup shop with upgrade cards */
  _setupShop() {
    const grid = document.getElementById('shop-grid');
    grid.innerHTML = '';
    for (const [id, upg] of Object.entries(PERMANENT_UPGRADES)) {
      const card = document.createElement('div');
      card.className = 'shop-card';
      card.id = `shop-${id}`;
      card.innerHTML = `
        <div class="sc-header">
          <span class="sc-icon">${upg.icon}</span>
          <span class="sc-name">${upg.name}</span>
          <span class="sc-level" id="shop-${id}-level"></span>
        </div>
        <div class="sc-desc">${upg.description}</div>
        <span class="sc-cost" id="shop-${id}-cost"></span>
      `;
      card.addEventListener('click', () => this._purchase(id));
      grid.appendChild(card);
    }

    document.getElementById('btnShopPlay').addEventListener('click', () => this._onPlay());
    document.getElementById('btnShopBestiary').addEventListener('click', () => this.showBestiary());
    document.getElementById('btnShopReset') && document.getElementById('btnShopReset').addEventListener('click', () => this._resetProgress());
  }

  /** Update shop display with current levels/costs */
  _updateShopDisplay() {
    document.getElementById('shop-gold-amount').textContent = this.game._meta.totalGold;
    for (const [id, upg] of Object.entries(PERMANENT_UPGRADES)) {
      const lvl = this.game._meta.getLevel(id);
      const cost = getUpgradeCost(id, this.game._meta);
      const lvlEl = document.getElementById(`shop-${id}-level`);
      const costEl = document.getElementById(`shop-${id}-cost`);
      const card = document.getElementById(`shop-${id}`);

  }

  /** Purchase an upgrade */
  _purchase(upgradeId) {
    const cost = getUpgradeCost(upgradeId, this.game._meta);
    if (this.game._meta.purchase(upgradeId, cost)) {
      this._updateShopDisplay();
      // Small flash effect
      const card = document.getElementById(`shop-${upgradeId}`);
      if (card) {
        card.style.borderColor = '#ffaa00';
        setTimeout(() => { card.style.borderColor = ''; }, 300);
      }

  /** Setup class selection screen */
  _setupClassSelection() {
    const grid = document.getElementById('class-grid');

    for (const [id, cls] of Object.entries(CHARACTER_CLASSES)) {
      const card = document.createElement('div');
      card.className = 'class-card';
      card.innerHTML = `
        <div class="cc-icon">${cls.emoji}</div>
        <div class="cc-name">${cls.name}</div>
        <div class="cc-desc">${cls.description}</div>

      card.addEventListener('click', () => {
        this.game._selectedClass = id;
        document.getElementById('class-screen').classList.remove('active');
        this._showModeSelection();
      });
      grid.appendChild(card);
    }
    document.getElementById('btnClassBack') && document.getElementById('btnClassBack').addEventListener('click', () => {
      document.getElementById('class-screen').classList.remove('active');
      this.showShop();
    });
  }

  /** Setup mode selection screen */
  _setupModeSelection() {
    const grid = document.getElementById('mode-grid');
    grid.innerHTML = '';
    for (const [id, mode] of Object.entries(GAME_MODES)) {
      const card = document.createElement('div');
      card.className = 'mode-card';
      card.innerHTML = `
        <div class="mc-icon">${mode.icon}</div>
        <div class="mc-name">${mode.name}</div>
        <div class="mc-desc">${mode.description}</div>

      card.addEventListener('click', () => {
        this.game._selectedMode = id;
        document.getElementById('mode-screen').classList.remove('active');
        document.getElementById('shop-screen').classList.remove('active');
        this.game.startGame();
      });
      grid.appendChild(card);
    }
    document.getElementById('btnModeBack') && document.getElementById('btnModeBack').addEventListener('click', () => {
      document.getElementById('mode-screen').classList.remove('active');
      this._showClassSelection();
    });
  }

  /** Show class selection */
  _showClassSelection() {
    document.getElementById('shop-screen').classList.remove('active');
    document.getElementById('class-screen').classList.add('active');
  }

  /** Show mode selection */
  _showModeSelection() {
    document.getElementById('mode-screen').classList.add('active');
  }

  /** Play button handler */
  _onPlay() {
    document.getElementById('shop-screen').classList.remove('active');
    this._showClassSelection();
  }

  /** Setup bestiary screen */
  _setupBestiary() {
    document.getElementById('btnBestiaryBack') && document.getElementById('btnBestiaryBack').addEventListener('click', () => {
      document.getElementById('bestiary-screen').classList.remove('active');
      this.showShop();
    });
  }

  /** Show bestiary */
  showBestiary() {
    document.getElementById('shop-screen').classList.remove('active');
    document.getElementById('bestiary-screen').classList.add('active');
    const grid = document.getElementById('bestiary-grid');
    if (!grid) return;
    grid.innerHTML = '';
    const entries = this.game._bestiary.getEntries();
    const totalKills = this.game._bestiary.getTotalKills();
    for (const entry of entries) {
      const div = document.createElement('div');
      div.className = 'bestiary-entry' + (entry.firstSeen === null ? ' locked' : '');
      div.innerHTML = `
        <div class="be-color" style="background:${entry.type.color}"></div>
        <div class="be-info">
          <div class="be-name">${entry.firstSeen === null ? '???' : entry.type.name}</div>
          <div class="be-stats">Kills: ${entry.kills} | Encounters: ${entry.encounters}</div>
        </div>
      `;
      grid.appendChild(div);
    }

    const totalDiv = document.createElement('div');
    totalDiv.style.cssText = 'text-align:center;margin-top:1em;color:#aaa;font-size:0.8rem;grid-column:1/-1';
    totalDiv.textContent = `Total Kills: ${totalKills}`;
    grid.appendChild(totalDiv);
  }

  _addGoldDisplay() {
    // No-op: gold is shown in shop
  }

  _resetProgress() {
    if (confirm('Reset ALL progress? This cannot be undone.')) {
      localStorage.removeItem('voidrun_meta');
      localStorage.removeItem('voidrun_bestiary');
      localStorage.removeItem('voidrun_tutorial');
      this.game._meta = new MetaProgression();
      this.game._bestiary = new Bestiary();
      this.game._tutorial = new TutorialSystem();
      this._updateShopDisplay();
    }
  }
}

// Add render methods for new enemy types onto Enemy prototype
Enemy.prototype._renderVoidSpider = function(ctx, s, pulse, flashColor, time) {
  const legCount = 8; const legPhase = time * 0.005 + this.animOffset;
  ctx.save(); ctx.shadowColor = flashColor; ctx.shadowBlur = s;
  // Body
  const bodyGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 0.7);
  bodyGrad.addColorStop(0, '#aa88cc'); bodyGrad.addColorStop(0.6, flashColor); bodyGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bodyGrad; ctx.beginPath(); ctx.arc(this.x, this.y, s * 0.7, 0, Math.PI * 2); ctx.fill();
  // Legs
  ctx.strokeStyle = hexToRgba(flashColor, 0.7); ctx.lineWidth = 1.5;
  for (let i = 0; i < legCount; i++) {
    const a = (Math.PI * 2 / legCount) * i + Math.sin(legPhase + i) * 0.3;
    const r1 = s * 0.8; const r2 = s * 1.5;
    ctx.beginPath();
    ctx.moveTo(this.x + Math.cos(a) * r1, this.y + Math.sin(a) * r1);
    ctx.lineTo(this.x + Math.cos(a) * r2, this.y + Math.sin(a) * r2);
    ctx.stroke();
  }
  // Eyes (multiple)
  for (let e = -1; e <= 1; e += 2) {
    ctx.fillStyle = '#ff0000'; ctx.beginPath();
    ctx.arc(this.x + e * s * 0.2, this.y - s * 0.1, s * 0.12, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
};

Enemy.prototype._renderPlasmaJelly = function(ctx, s, pulse, flashColor, time) {
  ctx.save(); ctx.shadowColor = flashColor; ctx.shadowBlur = s * 2;
  const wobble = Math.sin(time * 0.006 + this.animOffset) * 0.15;
  ctx.fillStyle = hexToRgba(flashColor, 0.6);
  ctx.beginPath(); ctx.ellipse(this.x, this.y, s * (1 + wobble), s * (0.7 - wobble), 0, 0, Math.PI * 2); ctx.fill();
  // Inner glow
  const innerGrad = ctx.createRadialGradient(this.x, this.y - s * 0.2, 0, this.x, this.y, s * 0.7);
  innerGrad.addColorStop(0, '#ffffff'); innerGrad.addColorStop(0.5, flashColor); innerGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = innerGrad; ctx.beginPath(); ctx.arc(this.x, this.y - s * 0.2, s * 0.7, 0, Math.PI * 2); ctx.fill();
  // Nucleus
  ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(this.x, this.y - s * 0.3, s * 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
};

Enemy.prototype._renderSentinel = function(ctx, s, pulse, flashColor, time) {
  ctx.save(); ctx.shadowColor = flashColor; ctx.shadowBlur = s * 1.5;
  const rot = time * 0.001;
  // Octagonal body
  ctx.fillStyle = hexToRgba(flashColor, 0.7);
  ctx.beginPath();
  const sides = 8;
  for (let i = 0; i < sides; i++) {
    const a = (Math.PI * 2 / sides) * i + rot; const r = s * pulse;
    const px = this.x + Math.cos(a) * r; const py = this.y + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.fill(); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();
  // Core eye
  const coreGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 0.4);
  coreGrad.addColorStop(0, '#ffffff'); coreGrad.addColorStop(0.5, '#8888ff'); coreGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = coreGrad; ctx.beginPath(); ctx.arc(this.x, this.y, s * 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(this.x, this.y, s * 0.12, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
};

Enemy.prototype._renderSpecter = function(ctx, s, pulse, flashColor, time) {
  if (this._isFaded) { ctx.globalAlpha = 0.15; }
  ctx.shadowColor = flashColor; ctx.shadowBlur = s * 2;
  // Ghostly form
  const ghostGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 1.2);
  ghostGrad.addColorStop(0, 'rgba(170,221,255,0.6)'); ghostGrad.addColorStop(0.5, 'rgba(100,180,255,0.3)'); ghostGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ghostGrad;
  ctx.beginPath();
  const wiggle = Math.sin(time * 0.01 + this.animOffset) * 3;
  ctx.ellipse(this.x + wiggle, this.y, s * 1.1, s * 0.7, 0, 0, Math.PI * 2); ctx.fill();
  // Hollow eyes
  ctx.fillStyle = '#ffffff'; ctx.beginPath();
  ctx.arc(this.x - s * 0.2, this.y - s * 0.15, s * 0.15, 0, Math.PI * 2); ctx.fill();
  ctx.arc(this.x + s * 0.2, this.y - s * 0.15, s * 0.15, 0, Math.PI * 2); ctx.fill();
};

Enemy.prototype._renderLarva = function(ctx, s, pulse, flashColor, time) {
  ctx.save(); ctx.shadowColor = flashColor; ctx.shadowBlur = 4;
  const squirm = Math.sin(time * 0.015 + this.animOffset) * 2;
  ctx.fillStyle = flashColor; ctx.beginPath();
  ctx.ellipse(this.x + squirm, this.y, s * 0.8, s * 0.4, 0, 0, Math.PI * 2); ctx.fill();
  // Tiny eyes
  ctx.fillStyle = '#000000'; ctx.beginPath();
  ctx.arc(this.x + s * 0.3 + squirm, this.y - s * 0.1, s * 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.arc(this.x + s * 0.3 + squirm, this.y + s * 0.1, s * 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
};

Enemy.prototype._renderTitan = function(ctx, s, pulse, flashColor, time) {
  ctx.save(); ctx.shadowColor = flashColor; ctx.shadowBlur = s * 2.5;
  // Massive armor plates
  const bodyGrad = ctx.createRadialGradient(this.x, this.y, s * 0.3, this.x, this.y, s * 1.4);
  bodyGrad.addColorStop(0, '#ff4444'); bodyGrad.addColorStop(0.5, '#cc0000'); bodyGrad.addColorStop(1, '#440000');
  ctx.fillStyle = bodyGrad; ctx.beginPath(); ctx.arc(this.x, this.y, s * 1.2, 0, Math.PI * 2); ctx.fill();
  // Armor lines
  ctx.strokeStyle = '#ff8888'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(this.x - s, this.y); ctx.lineTo(this.x + s, this.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(this.x, this.y - s); ctx.lineTo(this.x, this.y + s); ctx.stroke();
  // Core
  const coreGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 0.5);
  coreGrad.addColorStop(0, '#ffffff'); coreGrad.addColorStop(0.4, '#ffaa00'); coreGrad.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle = coreGrad; ctx.beginPath(); ctx.arc(this.x, this.y, s * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
};

// Extend the main enemy render to dispatch to new type renders
(function() {
  const origBossRender = Enemy.prototype._renderBoss;
  const origWraithRender = Enemy.prototype._renderWraith;
  const origBatRender = Enemy.prototype._renderBat;
  const origGolemRender = Enemy.prototype._renderGolem;
  const origSkeletonRender = Enemy.prototype._renderSkeleton;
  const origSlimeRender = Enemy.prototype._renderSlime;

  // Add dispatch for new types before the main switch in render()
  Enemy.prototype._dispatchRender = function(ctx, s, pulse, flashColor, time) {
    if (this.typeKey === 'voidSpider') this._renderVoidSpider(ctx, s, pulse, flashColor, time);
    else if (this.typeKey === 'plasmaJelly') this._renderPlasmaJelly(ctx, s, pulse, flashColor, time);
    else if (this.typeKey === 'sentinel') this._renderSentinel(ctx, s, pulse, flashColor, time);
    else if (this.typeKey === 'specter') this._renderSpecter(ctx, s, pulse, flashColor, time);
    else if (this.typeKey === 'larva') this._renderLarva(ctx, s, pulse, flashColor, time);
    else if (this.typeKey === 'titan') this._renderTitan(ctx, s, pulse, flashColor, time);
    else if (this.behavior === 'boss') origBossRender.call(this, ctx, s, pulse, flashColor, time);
    else if (this.behavior === 'phase') origWraithRender.call(this, ctx, s, pulse, flashColor, time);
    else if (this.typeKey === 'bat') origBatRender.call(this, ctx, s, pulse, flashColor, time);
    else if (this.typeKey === 'golem') origGolemRender.call(this, ctx, s, pulse, flashColor, time);
    else if (this.typeKey === 'skeleton') origSkeletonRender.call(this, ctx, s, pulse, flashColor, time);
    else origSlimeRender.call(this, ctx, s, pulse, flashColor, time);
  };

  // Replace the body shape dispatch in the main render method
  const origEnemyRender = Enemy.prototype.render;
  Enemy.prototype.render = function(ctx, time) {
    const s = this.size; const pulse = 1 + Math.sin(time * 0.003 + this.animOffset) * 0.08;
    const flashColor = this.flashTimer > 0 ? '#ffffff' : (this.eliteColor || this.color);
    ctx.save();
    ctx.shadowColor = flashColor;
    ctx.shadowBlur = s * (this.behavior === 'boss' || this.behavior === 'miniboss' ? 3 : 1.8);
    if (this.isElite) {
      ctx.globalAlpha = 0.2 + Math.sin(time * 0.006) * 0.1;
      ctx.fillStyle = this.eliteColor || '#ff8800'; ctx.beginPath(); ctx.arc(this.x, this.y, s * 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = this.eliteColor || '#ff8800'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }
    if (this._phasing) ctx.globalAlpha = 0.35;
    this._dispatchRender(ctx, s, pulse, flashColor, time);
    if (this.hp < this.maxHp) {
      const barW = s * 2.2; const barH = 3; const barX = this.x - barW / 2; const barY = this.y - s * 1.8;
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; roundRect(ctx, barX - 1, barY - 1, barW + 2, barH + 2, 2); ctx.fill();
      const hpGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      hpGrad.addColorStop(0, '#ff3355'); hpGrad.addColorStop(1, '#ff6688');
      ctx.fillStyle = hpGrad; ctx.fillRect(barX, barY, barW * (this.hp / this.maxHp), barH);
      if (this.isElite) {
        ctx.fillStyle = this.eliteColor || '#ff8800'; ctx.font = "bold 8px 'Rajdhani', sans-serif"; ctx.textAlign = 'center';
        ctx.fillText(this.name, this.x, barY - 3); ctx.textAlign = 'left';
      }
    }
    ctx.restore();
  };
})();

/**
 * Roll for a random item based on tier probabilities.
 * @param {number} luck - Player luck stat
 * @returns {string|null} Item ID or null
 */
function rollItemDrop(luck) {
  const tierChances = { common: 40 + luck * 0.2, uncommon: 25 + luck * 0.15, rare: 12 + luck * 0.1, epic: 4 + luck * 0.03, legendary: 1 + luck * 0.01 };
  const total = Object.values(tierChances).reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  let tier = 'common';
  for (const [t, w] of Object.entries(tierChances)) {
    r -= w; if (r <= 0) { tier = t; break; }
  }
  const candidates = Object.entries(ITEM_DEFS).filter(([, item]) => item.tier === tier);
  if (candidates.length === 0) return null;
  return candidates[Math.floor(Math.random() * candidates.length)][0];
}

/**
 * Apply biome-specific background rendering.
 * @param {CanvasRenderingContext2D} ctx
 * @param {Object} biome - Current BIOME object
 * @param {number} time - Game time
 */
function renderBiomeBackground(ctx, biome, time) {
  if (!biome || biome.id === 'void') return;
  // Subtle ambient pulse
  const pulse = 0.3 + 0.1 * Math.sin(time * 0.002);
  ctx.fillStyle = biome.ambientColor.replace('0.02', String(pulse));
  ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
  // Floating particles for specific biomes
  if (biome.id === 'stormZone') {
    ctx.fillStyle = 'rgba(255,255,100,0.03)';
    for (let i = 0; i < 3; i++) {
      const x = rand(0, CONFIG.WIDTH); const y = rand(0, CONFIG.HEIGHT);
      const alpha = 0.02 + Math.sin(time * 0.005 + i) * 0.01;
      ctx.fillStyle = `rgba(255,255,100,${alpha})`;
      ctx.fillRect(x, y, 2, 40);
    }
  }
  if (biome.id === 'frostRealm') {
    for (let i = 0; i < 5; i++) {
      const x = rand(0, CONFIG.WIDTH); const y = rand(0, CONFIG.HEIGHT);
      ctx.fillStyle = 'rgba(200,230,255,0.04)';
      ctx.beginPath(); ctx.arc(x, y, rand(1, 3), 0, Math.PI * 2); ctx.fill();
    }
  }
}

/**
 * Screen transition effects - fade in/out, flash.
 */
class ScreenTransition {
  constructor() {
    this.active = false;
    this.type = 'fade';
    this.timer = 0;
    this.duration = 500;
    this.callback = null;
  }

  /** Start a fade-in from black */
  fadeIn(duration = 500, cb = null) {
    this.active = true; this.type = 'fadeIn'; this.timer = 0; this.duration = duration; this.callback = cb;
  }
  /** Start a fade-out to black */
  fadeOut(duration = 500, cb = null) {
    this.active = true; this.type = 'fadeOut'; this.timer = 0; this.duration = duration; this.callback = cb;
  }
  /** Flash white */
  flash(duration = 150) {
    this.active = true; this.type = 'flash'; this.timer = 0; this.duration = duration;
  }

  /** Update transition state */
  update(dt) {
    if (!this.active) return;
    this.timer += dt;
    if (this.timer >= this.duration) {
      this.active = false;
      if (this.callback) { const cb = this.callback; this.callback = null; cb(); }
    }
  }

  /** Render transition overlay */
  render(ctx) {
    if (!this.active) return;
    const progress = this.timer / this.duration;
    let alpha = 0;
    if (this.type === 'fadeIn') alpha = 1 - progress;
    else if (this.type === 'fadeOut') alpha = progress;
    else if (this.type === 'flash') alpha = (1 - progress) * 0.7;
    ctx.fillStyle = this.type === 'flash' ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
  }
}

/**
 * RunStats - Tracks detailed per-run statistics.
 */
class RunStats {
  constructor() {
    this.damageDealt = {};
    this.killsPerWeapon = {};
    this.damageTaken = 0;
    this.gemsCollected = 0;
    this.powerupsUsed = {};
    this.itemsCollected = [];
    this.wavesReached = 0;
    this.critsLanded = 0;
    this.totalAttacks = 0;
    this.dodges = 0;
    this.shieldedHits = 0;
  }

  recordDamage(weaponId, amount) {
    this.damageDealt[weaponId] = (this.damageDealt[weaponId] || 0) + amount;
    this.totalAttacks++;
  }

  recordCrit(weaponId, amount) {
    this.recordDamage(weaponId, amount);
    this.critsLanded++;
  }

  recordKill(weaponId) {
    this.killsPerWeapon[weaponId] = (this.killsPerWeapon[weaponId] || 0) + 1;
  }

  getTopWeapon() {
    let top = null, maxDmg = 0;
    for (const [w, dmg] of Object.entries(this.damageDealt)) {
      if (dmg > maxDmg) { maxDmg = dmg; top = w; }
    }
    return top ? { weaponId: top, damage: maxDmg } : null;
  }

  getCritRate() {
    return this.totalAttacks > 0 ? (this.critsLanded / this.totalAttacks * 100) : 0;
  }
}

/**

class FPSCounter {
  constructor() {

  update() {
    this.frames++;

    if (now - this.lastTime >= 1000) {
      this.fps = this.frames;

    if (!this.visible) return;

    ctx.fillRect(CONFIG.WIDTH - 80, CONFIG.HEIGHT - 25, 75, 20);

  }
}

// Extend game update further for item drops, execution, gravity well, time dilation
(function() {
  const origUpdate3 = Game.prototype.update;
  Game.prototype.update = function(dt) {
    if (this.state !== 'playing') { origUpdate3.call(this, dt); return; }
    origUpdate3.call(this, dt);
    if (this.state !== 'playing') return;

    // Executioner item: insta-kill enemies below 15% HP
    if (this.player._executioner) {
      for (const enemy of this.enemies) {
        if (!enemy.alive) continue;
        if (enemy.hp < enemy.maxHp * 0.15 && enemy.behavior !== 'boss') {
          enemy.hp = 0; enemy.alive = false;
          this._onEnemyKilled(enemy);
          this.particles.emit(enemy.x, enemy.y, '#000000', 5, 1, 200, 1.5);
        }
      }
    }

    // Gravity well: pull enemies toward player
    if (this.player._gravityWell) {
      for (const enemy of this.enemies) {
        if (!enemy.alive) continue;
        const d = distance(enemy.x, enemy.y, this.player.x, this.player.y);
        if (d < 100 && d > 20) {
          const a = angleTo(enemy.x, enemy.y, this.player.x, this.player.y);
          enemy.x += Math.cos(a) * 0.5 * (dt / 16);
          enemy.y += Math.sin(a) * 0.5 * (dt / 16);
        }
      }
    }

    // Time dilation: extend wave timer
    if (this.player._timeDilation) {
      this.waveTimer += dt * 0.3;
    }

    // Biome switching
    if (this.wave !== (this._lastBiomeWave || 0)) {
      this._lastBiomeWave = this.wave;
      maybeSwitchBiome(this);
    }

    // Item drop from bosses (extra)
    if (this._itemManager && this._pendingItemDrop) {
      const itemId = this._pendingItemDrop;
      this._pendingItemDrop = null;
      this._itemManager.addItem(itemId, this.player);
      if (this.sound) this.sound.sfxItemPickup();
      this.floatingTexts.add(this.player.x, this.player.y - 15,
        ITEM_DEFS[itemId].icon + ' ' + ITEM_DEFS[itemId].name + '!',
        ITEM_DEFS[itemId].tier === 'legendary' ? CONFIG.COLORS.GOLD : CONFIG.COLORS.CYAN);
    }
  };
})();

/**
 * WeatherSystem - Ambient environmental effects that change over time.
 * Includes rain, nebula storms, void lightning, and star showers.
 */
class WeatherSystem {
  constructor() {
    this.type = 'clear';
    this.intensity = 0;
    this.timer = 0;
    this.duration = 30000;
    this.drops = [];
    this.maxDrops = 60;
  }

  /** Pick a random weather type based on biome */
  pickWeather(biomeId) {
    const options = {
      void: ['clear', 'clear', 'nebulaStorm'],
      nebula: ['nebulaStorm', 'emberRain', 'clear'],
      frostRealm: ['snow', 'snow', 'clear', 'iceShards'],
      stormZone: ['lightningStorm', 'lightningStorm', 'clear'],
      eclipse: ['starShower', 'voidLightning', 'clear'],
    };
    const opts = options[biomeId] || ['clear'];
    this.type = opts[Math.floor(Math.random() * opts.length)];
    this.intensity = rand(0.4, 1.0);
    this.timer = 0;
    this.duration = rand(20000, 40000);
    this.drops = [];
  }

  /** Update weather effects */
  update(dt) {
    this.timer += dt;
    if (this.timer >= this.duration) {
      this.timer = 0;
      if (window.game && window.game._currentBiome) {
        this.pickWeather(window.game._currentBiome.id);
      }
    }
    // Spawn weather particles
    if (this.type === 'snow' && this.drops.length < this.maxDrops) {
      this.drops.push({ x: rand(0, CONFIG.WIDTH), y: -10, vy: rand(0.5, 1.5), vx: rand(-0.3, 0.3), size: rand(1, 3), alpha: rand(0.3, 0.7) });
    }
    if (this.type === 'emberRain' && this.drops.length < this.maxDrops) {
      this.drops.push({ x: rand(0, CONFIG.WIDTH), y: -10, vy: rand(1, 2.5), vx: rand(-0.2, 0.2), size: rand(1, 2), alpha: rand(0.4, 0.8), color: '#ff6600' });
    }
    // Update drops
    for (let i = this.drops.length - 1; i >= 0; i--) {
      const d = this.drops[i];
      d.x += d.vx * (dt / 16);
      d.y += d.vy * (dt / 16);
      if (d.y > CONFIG.HEIGHT + 20) this.drops.splice(i, 1);
    }
  }

  /** Render weather effects */
  render(ctx) {
    // Darken for storms
    if (this.type === 'nebulaStorm' || this.type === 'lightningStorm') {
      const alpha = this.intensity * 0.15;
      ctx.fillStyle = `rgba(0,0,0,${alpha})`;
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    }
    // Render drops
    for (const d of this.drops) {
      ctx.fillStyle = d.color
        ? `rgba(255,100,0,${d.alpha})`
        : `rgba(200,220,255,${d.alpha})`;
      ctx.fillRect(d.x, d.y, d.size, d.size * (d.color ? 1 : 2));
    }
    // Void lightning flash
    if (this.type === 'voidLightning' && Math.random() < 0.02) {
      ctx.fillStyle = `rgba(170,68,255,${this.intensity * 0.15})`;
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    }
    // Lightning storm flash
    if (this.type === 'lightningStorm' && Math.random() < 0.03) {
      ctx.fillStyle = `rgba(255,255,150,${this.intensity * 0.2})`;
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    }
  }
}

/**
 * BossDeathSequence - Dramatic multi-stage death animation for bosses.
 */
class BossDeathSequence {
  constructor(x, y, size, color) {
    this.x = x; this.y = y; this.size = size; this.color = color;
    this.stage = 0;
    this.timer = 0;
    this.totalStages = 4;
    this.stageDurations = [300, 400, 500, 600];
    this.particles = [];
  }

  /** Update death sequence, returns true when complete */
  update(dt, game) {
    this.timer += dt;
    const stageDuration = this.stageDurations[this.stage] || 300;
    if (this.timer >= stageDuration) {
      this.stage++;
      this.timer = 0;
      if (this.stage === 1) game.particles.emit(this.x, this.y, this.color, 30, 5, 500, 3);
      if (this.stage === 2) {
        game.particles.emit(this.x, this.y, '#ffffff', 50, 8, 400, 4);
        game.addScreenShake(8);
      }
      if (this.stage === 3) {
        game.particles.emit(this.x, this.y, CONFIG.COLORS.GOLD, 40, 4, 600, 2.5);
        // Spawn extra gems
        for (let i = 0; i < 20; i++) {
          game.gems.push(new XPGem(this.x + rand(-40, 40), this.y + rand(-40, 40), 1));
        }
      }
    }
    // Continuous particles during death
    if (this.stage < this.totalStages) {
      const progress = this.timer / stageDuration;
      game.particles.emit(this.x + rand(-10, 10), this.y + rand(-10, 10),
        this.color, 2, 2 + this.stage, 200, 1.5 + this.stage * 0.5);
    }
    return this.stage >= this.totalStages;
  }

  /** Render death sequence visuals */
  render(ctx, game) {
    const progress = this.timer / (this.stageDurations[this.stage] || 300);
    const alpha = 1 - (this.stage / this.totalStages) - progress * 0.2;
    if (alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);
    // Expanding ring
    const ringRadius = this.size * (1 + this.stage * 1.5 + progress * 2);
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 4 - this.stage;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(this.x, this.y, ringRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

/**
 * Render the player's collected items during gameplay as small icons.
 * @param {CanvasRenderingContext2D} ctx
 * @param {Game} game
 */
function renderItemBar(ctx, game) {
  if (!game._itemManager || Object.keys(game._itemManager.items).length === 0) return;
  const items = Object.entries(game._itemManager.items);
  const startX = CONFIG.WIDTH - 165;
  const startY = CONFIG.HEIGHT - 60;

  // Background pill
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(ctx, startX - 4, startY - 2, 164, 22, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 0.5;
  roundRect(ctx, startX - 4, startY - 2, 164, 22, 6);
  ctx.stroke();

  ctx.fillStyle = '#aaaaaa';
  ctx.font = "bold 8px 'Rajdhani', sans-serif";
  ctx.textAlign = 'left';
  ctx.fillText('🎒 Items:', startX + 2, startY + 12);

  // Item icons
  let ix = startX + 50;
  for (const [itemId, stack] of items.slice(0, 5)) {
    const item = ITEM_DEFS[itemId];
    ctx.font = "10px sans-serif";
    ctx.fillText(item.icon, ix, startY + 12);
    if (stack > 1) {
      ctx.fillStyle = '#ffffff';
      ctx.font = "bold 7px sans-serif";
      ctx.fillText(stack.toString(), ix + 8, startY + 18);
    }
    ix += 20;
  }
  if (items.length > 5) {
    ctx.fillStyle = '#888';
    ctx.font = "8px sans-serif";
    ctx.fillText(`+${items.length - 5}`, ix, startY + 12);
  }

  ctx.textAlign = 'left';
}

/**
 * Apply additional post-processing effects beyond basic vignette/scanlines.
 * Includes: bloom simulation, color temperature shift, contrast boost.
 */
class PostProcessLayer {
  constructor() {
    this.enabled = true;
    this.bloomIntensity = 0.5;
    this.contrast = 1.05;
    this.saturation = 1.1;
    this.brightness = 1.0;
  }

  /**
   * Apply bloom-like glow to bright areas.
   * Simple approximation using wider glow on existing elements.
   * @param {CanvasRenderingContext2D} ctx
   * @param {Game} game
   */
  applyBloom(ctx, game) {
    if (!this.enabled || this.bloomIntensity <= 0) return;
    // Subtle bloom: overlay a blurred bright-pass
    // For performance, just add a subtle bright layer
    // (Full bloom would require offscreen canvas + blur)
    const alpha = this.bloomIntensity * 0.04;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    // Cyan tint in center
    const centerGrad = ctx.createRadialGradient(CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.WIDTH * 0.2, CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.WIDTH * 0.6);
    centerGrad.addColorStop(0, `rgba(0,229,255,${alpha * 2})`);
    centerGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = centerGrad;
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
  }

  /**
   * Color grading - subtle warm/cool shift based on biome.
   * @param {CanvasRenderingContext2D} ctx
   * @param {Object} biome
   */
  applyColorGrade(ctx, biome) {
    if (!this.enabled) return;
    if (biome && biome.id === 'nebula') {
      ctx.fillStyle = 'rgba(255,0,50,0.015)';
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    }
    if (biome && biome.id === 'frostRealm') {
      ctx.fillStyle = 'rgba(50,150,255,0.02)';
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    }
  }
}

  const origUpd = Game.prototype.update;

    if (this.state !== 'playing') return;
    if (this._weatherSystem) this._weatherSystem.update(dt);
    // Update boss death sequences
    if (this._bossDeathSequences) {
      for (let i = this._bossDeathSequences.length - 1; i >= 0; i--) {
        if (this._bossDeathSequences[i].update(dt, this)) {
          this._bossDeathSequences.splice(i, 1);
        }

    if (this._bossDeathSequences) {
      for (const seq of this._bossDeathSequences) seq.render(ctx, this);
    }
    // Post-process
    if (this._postProcess) {
      this._postProcess.applyBloom(ctx, this);
      this._postProcess.applyColorGrade(ctx, this._currentBiome);
    }
    // Item bar
    renderItemBar(ctx, this);
  };

  // Trigger boss death sequence on boss kill
  const origBossKill = Game.prototype._onEnemyKilled;

/**
 * PerformanceBudget - Monitors entity counts and warns if approaching limits.
 * Helps maintain smooth 60fps gameplay.
 */
class PerformanceBudget {
  constructor() {
    this.maxEnemies = 200;
    this.maxProjectiles = 100;
    this.maxParticles = CONFIG.MAX_PARTICLES;
    this.maxGems = 300;
    this.warningThreshold = 0.8;
  }

  /**
   * Check current game state against performance budgets.
   * @param {Game} game
   * @returns {string[]} Warnings
   */
  check(game) {
    const warnings = [];
    if (game.enemies.length > this.maxEnemies * this.warningThreshold) {
      warnings.push(`Enemies: ${game.enemies.length}/${this.maxEnemies}`);
    }
    if (game.projectiles.length + (game.bossProjectiles ? game.bossProjectiles.length : 0) > this.maxProjectiles * this.warningThreshold) {
      warnings.push(`Projectiles: ${game.projectiles.length}/${this.maxProjectiles}`);
    }
    if (game.gems.length > this.maxGems * this.warningThreshold) {
      warnings.push(`Gems: ${game.gems.length}/${this.maxGems}`);
    }
    return warnings;
  }

  /**
   * Auto-cleanup if any entity type exceeds budget.
   * @param {Game} game
   */
  enforce(game) {
    if (game.enemies.length > this.maxEnemies) {
      // Remove furthest enemies first
      game.enemies.sort((a, b) => {
        const da = distance(a.x, a.y, game.player.x, game.player.y);
        const db = distance(b.x, b.y, game.player.x, game.player.y);
        return db - da;
      });
      const toRemove = game.enemies.length - this.maxEnemies;
      for (let i = 0; i < toRemove; i++) {
        game.enemies[i].alive = false;
      }
    }
    if (game.gems.length > this.maxGems) {
      const toRemove = game.gems.length - this.maxGems;
      game.gems.splice(0, toRemove);
    }
    if (game.particles.particles.length > this.maxParticles) {
      game.particles.particles.splice(0, game.particles.particles.length - this.maxParticles);
    }
  }
}

/**
 * PauseMenu - In-game pause overlay with options.
 * Currently uses the existing pause overlay but can be extended
 * with volume control, restart, and quit options.
 */
class PauseMenu {
  constructor() {
    this.options = ['Resume', 'Restart', 'Quit to Shop'];
    this.selectedIndex = 0;
  }

  /**
   * Handle keyboard navigation in pause menu.
   * @param {string} key
   * @param {Game} game
   * @param {UIManager} uiManager
   */
  handleInput(key, game, uiManager) {
    if (game.state !== 'paused') return;
    if (key === 'arrowup') this.selectedIndex = Math.max(0, this.selectedIndex - 1);
    if (key === 'arrowdown') this.selectedIndex = Math.min(this.options.length - 1, this.selectedIndex + 1);
    if (key === 'enter') {
      switch (this.selectedIndex) {
        case 0: game.togglePause(); break;
        case 1: game.togglePause(); game.startGame(); break;
        case 2: game.togglePause(); game.sound.stopMusic(); uiManager.showShop(); break;
      }
    }
  }
}

// ====================================================================

/**
 * VOIDRUN: NEON VOID — Architecture Overview
 *
 * This game is built on a modular, class-based architecture:
 *
 * CORE SYSTEMS:
 *   Game           — Main controller: state machine, entity management, game loop
 *   Player         — Player character: HP, XP, weapons, stats, movement
 *   Enemy          — Enemy AI: behaviors, damage, rendering per type
 *   Projectile     — Weapon projectiles: physics, collision, homing
 *   Entity         — Base class: position, size, collision detection
 *
 * WEAPON SYSTEM:
 *   WEAPON_DEFS    — Weapon templates (12 weapons)
 *   Player.fireWeapon() — Fires weapons, returns effect descriptors
 *   Game._processWeaponResult() — Converts descriptors into game entities
 *
 * PROGRESSION:
 *   UPGRADE_POOL   — 80+ upgrade options for level-up choices
 *   MetaProgression — Persistent shop upgrades between runs
 *   ItemManager    — In-run item collection system
 *
 * RENDERING:
 *   Canvas 2D       — All rendering is done via HTML5 Canvas
 *   Post-process    — Vignette, scanlines, chromatic fringe, bloom
 *   ParticleSystem  — 800-particle cap for all visual effects
 *
 * AUDIO:
 *   SoundSystem     — Web Audio API synthesized sounds
 *   No external files needed
 *
 * DATA PERSISTENCE:
 *   localStorage    — Meta-progression, bestiary, tutorial state
 *   DailySeed       — Deterministic seed for daily challenge mode
 */

// ====================================================================
//  SECTION 51: EXTENDED JSDOC FOR CORE CLASSES
// ====================================================================

/**
 * @class Entity
 * @classdesc Base class for all game entities (Player, Enemy, Projectile, Gem, PowerUp).
 * Provides position tracking, size, alive state, and collision detection.
 *
