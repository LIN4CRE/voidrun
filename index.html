    this.holyRingAngle = 0;

    // Generate starfield and background elements
    for (let i = 0; i < 150; i++) {
      this.stars.push(new Star());
    }
    this._nebulas = [];
    for (let i = 0; i < 8; i++) {
      this._nebulas.push(new NebulaCloud());
    }
    this._cosmicRays = [];
    for (let i = 0; i < 15; i++) {
      this._cosmicRays.push(new CosmicRay());
    }
    this._spaceDust = [];
    for (let i = 0; i < 50; i++) {
      this._spaceDust.push(new SpaceDust());
    }

    // Bind methods
    this._loop = this._loop.bind(this);
    this._handleVisibility = this._handleVisibility.bind(this);

    // Set up UI buttons
    document.getElementById('btnStart').addEventListener('click', () => this.startGame());
    document.getElementById('btnRestart').addEventListener('click', () => this.startGame());
    document.addEventListener('visibilitychange', this._handleVisibility);
  }

  /**
   * Initialize and start a new game.
   */
  startGame() {
    // Hide UI screens
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('gameover-screen').classList.add('hidden');
    document.getElementById('pause-overlay').classList.add('hidden');
    document.getElementById('levelup-overlay').classList.remove('active');

    // Reset game state
    this.player = new Player();
    this.enemies = [];
    this.projectiles = [];
    this.gems = [];
    this.pickups = [];
    this.particles.clear();
    this.powerups = [];
    this.bossProjectiles = [];
    this._bossLasers = [];
    this._freezeTimer = 0;
    if (this.player) {
      this.player._activeBuffs = [];
      this.player._shielded = false;
      this.player._dmgBoost = 1;
      this.player._cdBoost = false;
    }
    this.floatingTexts.clear();
    this.gameTime = 0;
    this.wave = 1;
    this.waveTimer = CONFIG.WAVE_DURATION_SEC * 1000;
    this.totalKills = 0;
    this.screenShake = 0;
    this.cameraOffset = { x: 0, y: 0 };
    this.upgradeChoices = [];
    this.maxedUpgrades = new Set();
    this.upgradeLevels = {};
    this.spawnAccum = 0;
    this.enemyCap = CONFIG.ENEMY_CAP_BASE;
    this.holyRingAngle = 0;
    this.state = 'playing';

    // Create input handler
    if (this.input) this.input.destroy();
    this.input = new InputHandler();

    // Start game loop
    if (this.rafId) cancelAnimationFrame(this.rafId);
    this.lastTime = performance.now();
    this.rafId = requestAnimationFrame(this._loop);
  }

  /**
   * Toggle pause state.
   */
  togglePause() {
    if (this.state === 'playing') {
      this.state = 'paused';
      document.getElementById('pause-overlay').classList.remove('hidden');
    } else if (this.state === 'paused') {
      this.state = 'playing';
      document.getElementById('pause-overlay').classList.add('hidden');
      this.lastTime = performance.now();
      this.rafId = requestAnimationFrame(this._loop);
    }
  }

  /**
   * Trigger a level up - pauses gameplay and shows upgrade choices.
   */
  triggerLevelUp() {
    this.state = 'levelup';
    this.generateUpgradeChoices();
    this.showLevelUpUI();
  }

  /**
   * Generate 3 random upgrade choices based on current state.
   */
  generateUpgradeChoices() {
    const choices = [];

    // Filter available upgrades
    const available = UPGRADE_POOL.filter(upg => {
      // Skip if maxed
      const currentLevel = this.upgradeLevels[upg.id] || 0;
      if (currentLevel >= upg.maxLevel) return false;
      // Check condition (for weapon unlocks)
      if (upg.condition && !upg.condition(this)) return false;
      // For weapon upgrades, only show if weapon is owned
      if (upg.weaponId && !this.player.ownedWeapons.has(upg.weaponId)) return false;
      return true;
    });

    // Luck affects rarity chances
    const luck = this.player.luck;
    const rarityWeights = {
      common: 50,
      uncommon: 30 + luck * 0.3,
      rare: 15 + luck * 0.2,
      epic: 4 + luck * 0.05,
      legendary: 1 + luck * 0.02,
    };

    // Pick 3 choices (or fewer if not enough available)
    const pool = [...available];
    for (let i = 0; i < 3 && pool.length > 0; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      choices.push(pool[idx]);
      pool.splice(idx, 1);
    }

    // If we have fewer than 3, add "Heal" fillers
    while (choices.length < 3) {
      choices.push(UPGRADE_POOL.find(u => u.id === 'heal_full'));
    }

    this.upgradeChoices = choices;
  }

  /**
   * Display the level up UI overlay with upgrade cards.
   */
  showLevelUpUI() {
    const overlay = document.getElementById('levelup-overlay');
    const container = document.getElementById('upgrade-choices');
    overlay.classList.add('active');
    container.innerHTML = '';

    this.upgradeChoices.forEach((upg, idx) => {
      const card = document.createElement('div');
      card.className = 'upgrade-card';

      const currentLevel = this.upgradeLevels[upg.id] || 0;
      const levelText = upg.maxLevel < 99 ? ` (${currentLevel}/${upg.maxLevel})` : '';

      card.innerHTML = `
        <div class="card-icon">${upg.icon}</div>
        <div class="card-name">${upg.name}${levelText}</div>
        <div class="card-desc">${upg.description}</div>
        <span class="card-rarity rarity-${upg.rarity}">${upg.rarity.toUpperCase()}</span>
      `;

      card.addEventListener('click', (e) => {
        e.stopPropagation();
        this.selectUpgrade(idx);
      });

      container.appendChild(card);
    });
  }

  /**
   * Apply a selected upgrade and resume gameplay.
   * @param {number} index - Index of selected upgrade
   */
  selectUpgrade(index) {
    if (index < 0 || index >= this.upgradeChoices.length) return;

    const upg = this.upgradeChoices[index];
    const currentLevel = (this.upgradeLevels[upg.id] || 0) + 1;
    this.upgradeLevels[upg.id] = currentLevel;

    // Apply the upgrade effect
    upg.apply(this, currentLevel);

    // If maxed, add to maxed set
    if (currentLevel >= upg.maxLevel) {
      this.maxedUpgrades.add(upg.id);
    }

    // Show upgrade feedback
    this.floatingTexts.add(
      CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 - 40,
      `${upg.name}!`, CONFIG.COLORS.GOLD
    );

    // Hide overlay and resume
    document.getElementById('levelup-overlay').classList.remove('active');
    this.state = 'playing';
    this.lastTime = performance.now();
    this.rafId = requestAnimationFrame(this._loop);
  }

  /**
   * Spawn enemies based on current wave and time.
   * @param {number} dt - Delta time
   */
  spawnEnemies(dt) {
    if (this.enemies.length >= this.enemyCap) return;

    this.spawnAccum += dt;
    const spawnInterval = Math.max(200, 800 - this.wave * 30); // Spawn faster at higher waves

    while (this.spawnAccum >= spawnInterval && this.enemies.length < this.enemyCap) {
      this.spawnAccum -= spawnInterval;
      this._spawnOneEnemy();
    }
  }

  /**
   * Spawn a single enemy at the edge of the screen.
   * @private
   */
  _spawnOneEnemy() {
    // Pick spawn edge
    const side = randInt(0, 3);
    let x, y;
    const margin = 20;

    switch (side) {
      case 0: x = rand(0, CONFIG.WIDTH); y = -margin; break;      // top
      case 1: x = rand(0, CONFIG.WIDTH); y = CONFIG.HEIGHT + margin; break; // bottom
      case 2: x = -margin; y = rand(0, CONFIG.HEIGHT); break;     // left
      case 3: x = CONFIG.WIDTH + margin; y = rand(0, CONFIG.HEIGHT); break; // right
    }

    // Pick enemy type based on wave
    const typeKey = this._pickEnemyType();
    const enemy = new Enemy(typeKey, x, y, this.wave);
    this.enemies.push(enemy);
  }

  /**
   * Pick enemy type weighted by current wave.
   * @private
   * @returns {string} Enemy type key
   */
  _pickEnemyType() {
    const w = this.wave;

    // Boss every N waves
    if (w % CONFIG.BOSS_WAVE_INTERVAL === 0 && Math.random() < 0.08) {
      return 'boss';
    }

    // Weighted random based on wave
    const pool = [];
    pool.push({ type: 'slime', weight: Math.max(1, 10 - w * 0.5) });
    pool.push({ type: 'fastSlime', weight: Math.max(1, 5 + w * 0.3) });
    if (w >= 2) pool.push({ type: 'bat', weight: Math.max(1, 3 + w * 0.5) });
    if (w >= 3) pool.push({ type: 'skeleton', weight: Math.max(1, 2 + w * 0.4) });
    if (w >= 5) pool.push({ type: 'golem', weight: Math.max(1, 1 + w * 0.2) });
    if (w >= 7) pool.push({ type: 'wraith', weight: Math.max(1, 0.5 + w * 0.2) });

    const totalWeight = pool.reduce((s, p) => s + p.weight, 0);
    let r = Math.random() * totalWeight;
    for (const p of pool) {
      r -= p.weight;
      if (r <= 0) return p.type;
    }
    return 'slime';
  }

  /**
   * Fire all equipped weapons for the player.
   */
  fireWeapons() {
    for (const wid of this.player.ownedWeapons) {
      const results = this.player.fireWeapon(wid, this.enemies);
      for (const r of results) {
        this._processWeaponResult(r);
      }
    }
  }

  /**
   * Process a weapon firing result - create projectiles, effects, etc.
   * @private
   * @param {Object} result - Weapon result descriptor
   */
  _processWeaponResult(result) {
    switch (result.type) {
      case 'projectile': {
        const proj = new Projectile(result);
        this.projectiles.push(proj);
        // Muzzle flash particles
        this.particles.emit(
          result.x, result.y, result.color,
          3, 1.5, 200, 2
        );
        break;
      }

      case 'beam': {
        // Apply beam damage to enemies along the beam line
        this._handleBeam(result);
        break;
      }

      case 'aoe': {
        // Damage all enemies within radius
        this._handleAoE(result);
        // Visual effect
        this.particles.emit(
          result.x, result.y, result.color,
          30, 4, 600, 2.5
        );
        break;
      }

      case 'lightning': {
        this._handleLightning(result);
        break;
      }
    }
  }

  /**
   * Handle void beam - line damage.
   * @private
   */
  _handleBeam(result) {
    const endX = this.player.x + Math.cos(result.angle) * result.length;
    const endY = this.player.y + Math.sin(result.angle) * result.length;

    // Store beam for rendering
    if (!this._beams) this._beams = [];
    this._beams.push({
      startX: this.player.x,
      startY: this.player.y,
      endX, endY,
      color: result.color,
      width: result.width,
      life: 100,
    });

    // Check enemy hits along beam
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;
      const dist = this._pointToLineDist(
        enemy.x, enemy.y,
        this.player.x, this.player.y,
        endX, endY
      );
      if (dist < enemy.size + result.width) {
        const died = enemy.takeDamage(result.damage);
        this.floatingTexts.addDamage(enemy.x, enemy.y - 10, result.damage, false);
        this.particles.emit(enemy.x, enemy.y, result.color, 2, 1, 150, 1.5);
        if (died) {
          this._onEnemyKilled(enemy);
        }
      }
    }
  }

  /**
   * Calculate shortest distance from point to line segment.
   * @private
   */
  _pointToLineDist(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return distance(px, py, x1, y1);
    let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = clamp(t, 0, 1);
    return distance(px, py, x1 + t * dx, y1 + t * dy);
  }

  /**
   * Handle AoE damage effect (Frost Nova).
   * @private
   */
  _handleAoE(result) {
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;
      const d = distance(enemy.x, enemy.y, result.x, result.y);
      if (d <= result.radius) {
        const died = enemy.takeDamage(result.damage);
        this.floatingTexts.addDamage(enemy.x, enemy.y, result.damage, false);
        enemy.applySlow(result.slowAmount, result.slowDuration);
        if (died) this._onEnemyKilled(enemy);
      }
    }

    // Spawn red pickup occasionally
    if (Math.random() < 0.05) {
      this.pickups.push(new HealthPickup(result.x, result.y));
    }
  }

  /**
   * Handle lightning chain damage.
   * @private
   */
  _handleLightning(result) {
    if (!result.targets || result.targets.length === 0) return;

    let prevX = result.originX;
    let prevY = result.originY;
    let dmg = result.damage;

    // Store lightning arcs for rendering
    if (!this._lightningArcs) this._lightningArcs = [];

    for (const target of result.targets) {
      if (!target.alive) continue;

      this._lightningArcs.push({
        x1: prevX, y1: prevY,
        x2: target.x, y2: target.y,
        color: result.color,
        life: 150,
      });

      const died = target.takeDamage(dmg);
      this.floatingTexts.addDamage(target.x, target.y, dmg, false);
      this.particles.emit(target.x, target.y, result.color, 4, 2, 200, 2);
      if (died) this._onEnemyKilled(target);

      dmg *= result.chainDamageFalloff;
      prevX = target.x;
      prevY = target.y;
    }
  }

  /**
   * Handle holy ring passive damage.
   * @private
   * @param {number} dt - Delta time
   */
  _handleHolyRings(dt) {
    if (!this.player.ownedWeapons.has('holyRing')) return;
    const def = this.player.getWeaponDef('holyRing');
    if (!def || !def.isPassive) return;

    const ringCount = def.ringCount || 2;
    this.holyRingAngle += def.ringSpeed * (dt / 16);

    for (let i = 0; i < ringCount; i++) {
      const angle = this.holyRingAngle + (Math.PI * 2 / ringCount) * i;
      const rx = this.player.x + Math.cos(angle) * def.ringRadius;
      const ry = this.player.y + Math.sin(angle) * def.ringRadius;

      for (const enemy of this.enemies) {
        if (!enemy.alive) continue;
        if (enemy.ringDamageCooldown > 0) continue;

        const d = distance(rx, ry, enemy.x, enemy.y);
        if (d < enemy.size + def.projectileSize) {
          const died = enemy.takeDamage(def.damage);
          enemy.ringDamageCooldown = def.ringDamageCooldown || 300;
          this.floatingTexts.addDamage(enemy.x, enemy.y, def.damage, false);
          this.particles.emit(enemy.x, enemy.y, def.color, 2, 1.5, 150, 1.5);
          if (died) this._onEnemyKilled(enemy);
        }
      }
    }
  }

  /**
   * Called when an enemy is killed - spawns gems, particles, updates stats.
   * @private
   * @param {Enemy} enemy - Killed enemy
   */
  _onEnemyKilled(enemy) {
    this.totalKills++;
    this.player.totalKills++;

    // Death particles
    const count = enemy.behavior === 'boss' ? 30 : 8;
    this.particles.emit(enemy.x, enemy.y, enemy.color, count, 4, 400, 2.5);

    // Screen shake for bosses
    if (enemy.behavior === 'boss') {
      this.addScreenShake(8);
    } else if (enemy.typeKey === 'golem') {
      this.addScreenShake(2);
    }

    // Drop XP gems
    const gemCount = enemy.xpDrop + Math.floor(this.player.luck / 20);
    for (let i = 0; i < gemCount; i++) {
      this.gems.push(new XPGem(enemy.x, enemy.y, 1));
    }

    // Chance for health pickup (luck increases)
    if (Math.random() < 0.03 + this.player.luck * 0.001) {
      this.pickups.push(new HealthPickup(enemy.x, enemy.y));
    }

    // Boss drops powerups
    if (enemy.behavior === 'boss') {
      const powerTypes = ['speedBoost', 'damageBoost', 'shield', 'magnetBoost', 'rapidFire', 'freezeAll', 'xpVacuum'];
      const dropCount = 3; // Boss drops 3 powerups
      for (let d = 0; d < dropCount; d++) {
        const pt = pick(powerTypes);
        this.powerups.push(new PowerUp(enemy.x + rand(-30, 30), enemy.y + rand(-30, 30), pt));
      }
    }

    // Random powerup drop from elite enemies
    if (enemy.isElite && Math.random() < 0.3) {
      const powerTypes = ['speedBoost', 'damageBoost', 'magnetBoost', 'rapidFire'];
      this.powerups.push(new PowerUp(enemy.x + rand(-10, 10), enemy.y + rand(-10, 10), pick(powerTypes)));
    }

    // Rare random powerup from any enemy
    if (Math.random() < 0.002 + this.player.luck * 0.0001) {
      const powerTypes = ['speedBoost', 'damageBoost', 'shield', 'magnetBoost', 'xpVacuum', 'rapidFire'];
      this.powerups.push(new PowerUp(enemy.x, enemy.y, pick(powerTypes)));
    }
  }

  /**
   * Instantly kill all enemies (Nova Burst power-up).
   */
  killAllEnemies() {
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;
      enemy.alive = false;
      this._onEnemyKilled(enemy);
    }
    this.addScreenShake(12);
    this.particles.emit(this.player.x, this.player.y, '#ffffff', 80, 8, 800, 3);
  }

  /**
   * Add screen shake effect.
   * @param {number} amount - Shake intensity
   */
  addScreenShake(amount) {
    this.screenShake = Math.max(this.screenShake, amount);
  }

  /**
   * Handle projectile-enemy collisions.
   * @private
   */
  _handleProjectileCollisions() {
    for (let pi = this.projectiles.length - 1; pi >= 0; pi--) {
      const proj = this.projectiles[pi];
      if (!proj.alive) continue;

      let hitSomething = false;

      for (const enemy of this.enemies) {
        if (!enemy.alive) continue;

        // Check collision
        const d = distance(proj.x, proj.y, enemy.x, enemy.y);
        if (d < proj.size + enemy.size + 4) {
          const died = enemy.takeDamage(proj.damage);
          const isCrit = proj.damage > 20;
          this.floatingTexts.addDamage(enemy.x, enemy.y, proj.damage, isCrit);
          this.particles.emit(proj.x, proj.y, proj.color, 5, 3, 200, 2);

          // Knockback
          if (proj.knockback > 0) {
            const kbAngle = angleTo(proj.x, proj.y, enemy.x, enemy.y);
            enemy.x += Math.cos(kbAngle) * proj.knockback * 3;
            enemy.y += Math.sin(kbAngle) * proj.knockback * 3;
          }

          if (died) {
            this._onEnemyKilled(enemy);
          }

          hitSomething = true;

          // Check pierce
          if (proj.pierce > 0) {
            proj.pierce--;
          } else {
            proj.alive = false;
          }

          // Explosion
          if (proj.explosive && proj.explosionRadius > 0) {
            this._explode(proj, enemy);
            proj.alive = false;
          }

          if (!proj.alive) break;
        }
      }

      // Clean up dead projectiles
      if (!proj.alive) {
        this.projectiles.splice(pi, 1);
      }
    }
  }

  /**
   * Handle explosion effect from fireball and other explosive projectiles.
   * @private
   */
  _explode(proj, hitEnemy) {
    const ex = proj.x;
    const ey = proj.y;
    const radius = proj.explosionRadius;
    const dmg = proj.damage * (proj.explosionDamage || 0.5);

    // Explosion particles
    this.particles.emit(ex, ey, '#ff6600', 25, 5, 500, 3);
    this.particles.emit(ex, ey, '#ffaa00', 15, 3, 400, 2);

    // Damage nearby enemies
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;
      const d = distance(enemy.x, enemy.y, ex, ey);
      if (d <= radius) {
        const falloff = 1 - (d / radius) * 0.5;
        const died = enemy.takeDamage(Math.round(dmg * falloff));
        this.floatingTexts.addDamage(enemy.x, enemy.y, Math.round(dmg * falloff), false);
        if (died) this._onEnemyKilled(enemy);
      }
    }
  }

  /**
   * Handle enemy-player collisions (contact damage).
   * @private
   */
  _handlePlayerCollisions() {
    if (this.player.invincibilityTimer > 0) return;

    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;
      const d = distance(this.player.x, this.player.y, enemy.x, enemy.y);
      if (d < this.player.size + enemy.size) {
        const damaged = this.player.takeDamage(enemy.damage);
        if (damaged) {
          this.particles.emit(this.player.x, this.player.y, CONFIG.COLORS.RED, 10, 3, 300, 2);
          this.addScreenShake(3);
          // Knockback player slightly
          const angle = angleTo(enemy.x, enemy.y, this.player.x, this.player.y);
          this.player.x += Math.cos(angle) * 10;
          this.player.y += Math.sin(angle) * 10;
        }
        if (!this.player.alive) {
          this._gameOver();
          return;
        }
      }
    }
  }

  /**
   * Handle gem/pickup collection.
   * @private
   */
  _handlePickups() {
    // Gems
    for (let i = this.gems.length - 1; i >= 0; i--) {
      const gem = this.gems[i];
      if (!gem.alive) {
        this.gems.splice(i, 1);
        continue;
      }
      const d = distance(this.player.x, this.player.y, gem.x, gem.y);
      if (d < this.player.size + gem.size + 2) {
        this.player.addXP(gem.value);
        this.particles.emit(gem.x, gem.y, CONFIG.COLORS.XP_GEM, 3, 1.5, 150, 1.5);
        this.gems.splice(i, 1);

        // Check for level up
        if (this.state !== 'levelup') {
          // XP is handled by addXP, level up triggered in update loop
        }
      }
    }

    // Health pickups
    for (let i = this.pickups.length - 1; i >= 0; i--) {
      const pickup = this.pickups[i];
      if (!pickup.alive) {
        this.pickups.splice(i, 1);
        continue;
      }
      const d = distance(this.player.x, this.player.y, pickup.x, pickup.y);
      if (d < this.player.size + pickup.size + 2) {
        this.player.heal(pickup.healAmount);
        this.particles.emit(pickup.x, pickup.y, CONFIG.COLORS.RED, 8, 3, 300, 2);
        this.floatingTexts.add(pickup.x, pickup.y - 10, `+${pickup.healAmount} HP`, CONFIG.COLORS.RED);
        this.pickups.splice(i, 1);
      }
    }
  }

  /**
   * Trigger game over state.
   * @private
   */
  _gameOver() {
    this.state = 'gameover';

    // Death animation
    this.particles.emit(this.player.x, this.player.y, CONFIG.COLORS.RED, 50, 6, 1000, 3);
    this.particles.emit(this.player.x, this.player.y, CONFIG.COLORS.CYAN, 30, 4, 800, 2);
    this.addScreenShake(15);

    // Cancel game loop
    if (this.rafId) {
      cancelAnimationFrame(this.rafId);
      this.rafId = null;
    }

    // Show game over screen after a short delay
    setTimeout(() => {
      this._render(); // Render one final frame
      this._showGameOverUI();
    }, 500);
  }

  /**
   * Display game over UI with stats.
   * @private
   */
  _showGameOverUI() {
    const screen = document.getElementById('gameover-screen');
    screen.classList.remove('hidden');

    const statsContainer = document.getElementById('stats-container');
    const surviveMinutes = Math.floor(this.gameTime / 60000);
    const surviveSeconds = Math.floor((this.gameTime % 60000) / 1000);

    statsContainer.innerHTML = `
      <span class="stat-label">Time Survived</span>
      <span class="stat-value">${surviveMinutes}m ${surviveSeconds}s</span>
      <span class="stat-label">Level Reached</span>
      <span class="stat-value">${this.player.highestLevel}</span>
      <span class="stat-label">Enemies Killed</span>
      <span class="stat-value">${this.player.totalKills}</span>
      <span class="stat-label">Wave</span>
      <span class="stat-value">${this.wave}</span>
      <span class="stat-label">Weapons Unlocked</span>
      <span class="stat-value">${this.player.ownedWeapons.size}</span>
    `;
  }

  /**
   * Handle visibility change (tab switch) - auto-pause.
   * @private
   */
  _handleVisibility() {
    if (document.hidden && this.state === 'playing') {
      this.togglePause();
    }
  }

  /**
   * Main game update loop - called each frame.
   * @param {number} dt - Delta time in ms
   */
  update(dt) {
    if (this.state !== 'playing') return;

    // Update game time
    this.gameTime += dt;

    // Update wave timer
    this.waveTimer -= dt;
    if (this.waveTimer <= 0) {
      this.wave++;
      this.waveTimer = CONFIG.WAVE_DURATION_SEC * 1000;
      this.enemyCap = CONFIG.ENEMY_CAP_BASE + this.wave * CONFIG.ENEMY_CAP_PER_WAVE;

      // Wave announcement
      this.floatingTexts.add(
        CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2,
        `WAVE ${this.wave}`, CONFIG.COLORS.GOLD
      );

      // Wave start particles
      this.particles.emit(CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.COLORS.GOLD, 20, 3, 800, 2);
    }

    // Update player
    this.player.update(dt, this.input);
    if (this.player.xp >= this.player.xpToNext) {
      // XP overflow handled in addXP; trigger level up
      this.triggerLevelUp();
      return; // Don't continue updating during level up
    }

    // Fire weapons
    this.fireWeapons();

    // Handle holy rings
    this._handleHolyRings(dt);

    // Spawn enemies
    this.spawnEnemies(dt);

    // Update enemies
    for (const enemy of this.enemies) {
      if (enemy.alive) enemy.update(dt, this.player);
    }

    // Update projectiles
    for (const proj of this.projectiles) {
      if (proj.alive) proj.update(dt, this.enemies);
    }

    // Update gems
    for (const gem of this.gems) {
      if (gem.alive) gem.update(dt, this.player);
    }

    // Update pickups
    for (const pickup of this.pickups) {
      if (pickup.alive) pickup.update(dt);
    }

    // Update powerups
    for (const pw of this.powerups) {
      if (pw.alive) pw.update(dt);
    }

    // Update boss projectiles
    for (const bp of this.bossProjectiles) {
      if (bp.alive) bp.update(dt, []);
    }

    // Process boss attacks (queued attacks from boss AI)
    this._processBossAttacks();

    // Update boss lasers
    for (let i = this._bossLasers.length - 1; i >= 0; i--) {
      this._bossLasers[i].life -= dt;
      if (this._bossLasers[i].life <= 0) this._bossLasers.splice(i, 1);
    }

    // Freeze timer
    if (this._freezeTimer > 0) {
      this._freezeTimer -= dt;
    }

    // Player powerup buff timers
    this._updatePowerupBuffs(dt);

    // Handle collisions
    this._handleProjectileCollisions();
    this._handleBossProjectileCollisions();
    this._handlePlayerCollisions();
    this._handlePickups();
    this._handlePowerupPickups();

    // Clean up dead entities
    this._cleanupDead();

    // Update particles
    this.particles.update(dt);

    // Update background elements
    if (this._nebulas) {
      for (const n of this._nebulas) n.update(dt);
    }
    if (this._cosmicRays) {
      for (const r of this._cosmicRays) r.update(dt);
    }
    if (this._spaceDust) {
      for (const d of this._spaceDust) d.update(dt);
    }

    // Update floating texts
    this.floatingTexts.update(dt);

    // Update beams (fade out)
    if (this._beams) {
      for (let i = this._beams.length - 1; i >= 0; i--) {
        this._beams[i].life -= dt;
        if (this._beams[i].life <= 0) this._beams.splice(i, 1);
      }
    }

    // Update lightning arcs (fade out)
    if (this._lightningArcs) {
      for (let i = this._lightningArcs.length - 1; i >= 0; i--) {
        this._lightningArcs[i].life -= dt;
        if (this._lightningArcs[i].life <= 0) this._lightningArcs.splice(i, 1);
      }
    }

    // Update screen shake
    if (this.screenShake > CONFIG.SCREEN_SHAKE_THRESHOLD) {
      this.screenShake *= CONFIG.SCREEN_SHAKE_DECAY;
      this.shakeAngle = rand(0, Math.PI * 2);
      this.cameraOffset.x = Math.cos(this.shakeAngle) * this.screenShake;
      this.cameraOffset.y = Math.sin(this.shakeAngle) * this.screenShake;
    } else {
      this.screenShake = 0;
      this.cameraOffset.x = 0;
      this.cameraOffset.y = 0;
    }
  }

  /**
   * Remove dead entities from arrays (extended for boss/powerup systems).
   * @private
   */
  _cleanupDead() {
    for (let i = this.enemies.length - 1; i >= 0; i--) {
      if (!this.enemies[i].alive) this.enemies.splice(i, 1);
    }
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      if (!this.projectiles[i].alive) this.projectiles.splice(i, 1);
    }
    for (let i = this.gems.length - 1; i >= 0; i--) {
      if (!this.gems[i].alive) this.gems.splice(i, 1);
    }
    for (let i = this.pickups.length - 1; i >= 0; i--) {
      if (!this.pickups[i].alive) this.pickups.splice(i, 1);
    }
    for (let i = this.powerups.length - 1; i >= 0; i--) {
      if (!this.powerups[i].alive) this.powerups.splice(i, 1);
    }
    for (let i = this.bossProjectiles.length - 1; i >= 0; i--) {
      if (!this.bossProjectiles[i].alive) this.bossProjectiles.splice(i, 1);
    }
  }

  /**
   * Process queued boss attacks.
   * @private
   */
  _processBossAttacks() {
    for (const enemy of this.enemies) {
      if (!enemy.alive || enemy.behavior !== 'boss') continue;
      const atk = enemy.executeQueuedAttack();
      if (!atk) continue;
      switch (atk.type) {
        case 'circleBarrage': this._bossCircleBarrage(atk); break;
        case 'aimedBarrage': this._bossAimedBarrage(atk); break;
        case 'homingOrbs': this._bossHomingOrbs(atk); break;
        case 'laserSweep': this._bossLaserSweep(atk); break;
        case 'spawnMinions': this._bossSpawnMinions(atk); break;
        case 'leap': this._bossLeap(atk); break;
      }
    }
  }

  /** @private */
  _bossCircleBarrage(atk) {
    const count = 12 + this.wave;
    for (let i = 0; i < count; i++) {
      const a = (Math.PI * 2 / count) * i;
      this._spawnBossProjectile(atk.bossX, atk.bossY, a, 2.5, atk.damage * 0.5, '#ff4444', 2000);
    }
  }
  /** @private */
  _bossAimedBarrage(atk) {
    const t = atk.target || { x: this.player.x, y: this.player.y };
    const ba = angleTo(atk.bossX, atk.bossY, t.x, t.y);
    const n = 5 + this.wave;
    for (let i = 0; i < n; i++) {
      this._spawnBossProjectile(atk.bossX, atk.bossY, ba + (i - (n - 1) / 2) * 0.12, 3, atk.damage * 0.6, '#ff8800', 2500);
    }
  }
  /** @private */
  _bossHomingOrbs(atk) {
    const n = 3 + this.wave;
    for (let i = 0; i < n; i++) {
      const bp = this._spawnBossProjectile(atk.bossX, atk.bossY, (Math.PI * 2 / n) * i, 1.5, atk.damage * 0.4, '#aa44ff', 5000);
      if (bp) bp.homing = 0.04;
    }
  }
  /** @private */
  _bossLaserSweep(atk) {
    for (let i = 0; i < 8; i++) {
      this._bossLasers.push({ startX: atk.bossX, startY: atk.bossY, angle: (atk.angle || 0) + (Math.PI * 2 / 8) * i, length: 300, width: 4, life: 1500, damage: atk.damage * 0.3 });
    }
  }
  /** @private */
  _bossSpawnMinions(atk) {
    const n = 4 + this.wave;
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 / n) * i;
      const tk = this.wave >= 7 ? 'wraith' : (this.wave >= 4 ? 'skeleton' : 'slime');
      this.enemies.push(new Enemy(tk, atk.bossX + Math.cos(a) * atk.bossSize * 2, atk.bossY + Math.sin(a) * atk.bossSize * 2, this.wave));
    }
    this.particles.emit(atk.bossX, atk.bossY, '#ff00ff', 20, 3, 400, 2);
  }
  /** @private */
  _bossLeap(atk) {
    for (const e of this.enemies) {
      if (!e.alive || e.behavior !== 'boss') continue;
      const ag = angleTo(atk.target.x, atk.target.y, e.x, e.y);
      e.x = clamp(atk.target.x + Math.cos(ag) * 60, e.size, CONFIG.WIDTH - e.size);
      e.y = clamp(atk.target.y + Math.sin(ag) * 60, e.size, CONFIG.HEIGHT - e.size);
      this.particles.emit(e.x, e.y, '#ff4400', 30, 6, 500, 3);
      this.addScreenShake(6);
      if (distance(e.x, e.y, this.player.x, this.player.y) < 80) this.player.takeDamage(atk.damage * 0.5);
      break;
    }
  }

  /** @private Spawn a boss projectile */
  _spawnBossProjectile(x, y, angle, speed, damage, color, life) {
    const proj = new Projectile({ x, y, angle, speed, damage, color, size: 5, life, pierce: 0, homing: 0, knockback: 1, explosive: false, explosionRadius: 0, explosionDamage: 0 });
    this.bossProjectiles.push(proj);
    return proj;
  }

  /** @private Boss projectile collisions with player */
  _handleBossProjectileCollisions() {
    if (this.player._shielded || this.player.invincibilityTimer > 0) return;
    for (let i = this.bossProjectiles.length - 1; i >= 0; i--) {
      const bp = this.bossProjectiles[i];
      if (!bp.alive) { this.bossProjectiles.splice(i, 1); continue; }
      if (distance(bp.x, bp.y, this.player.x, this.player.y) < bp.size + this.player.size) {
        this.player.takeDamage(bp.damage);
        bp.alive = false;
        this.bossProjectiles.splice(i, 1);
      }
    }
  }

  /** @private Collect powerups */
  _handlePowerupPickups() {
    for (let i = this.powerups.length - 1; i >= 0; i--) {
      const pw = this.powerups[i];
      if (!pw.alive) { this.powerups.splice(i, 1); continue; }
      if (distance(this.player.x, this.player.y, pw.x, pw.y) < this.player.size + pw.size + 4) {
        this._applyPowerup(pw);
        this.powerups.splice(i, 1);
      }
    }
  }

  /** @private Apply powerup effect */
  _applyPowerup(pw) {
    const pt = pw.powerType;
    this.particles.emit(pw.x, pw.y, pt.color, 10, 3, 400, 2);
    this.floatingTexts.add(pw.x, pw.y - 10, pt.name + '!', pt.color);
    if (pt.instant) {
      if (pw.typeKey === 'xpVacuum') {
        for (const gem of this.gems) { if (gem.alive) { this.player.addXP(gem.value); gem.alive = false; } }
        this.gems = this.gems.filter(g => g.alive);
      }
      return;
    }
    if (pw.typeKey === 'freezeAll') { this._freezeTimer = pw.duration; return; }
    pt.apply(this.player);
    if (!this.player._activeBuffs) this.player._activeBuffs = [];
    const ex = this.player._activeBuffs.find(b => b.typeKey === pw.typeKey);
    if (ex) { pt.remove(this.player); ex.remaining = pw.duration; }
    else { this.player._activeBuffs.push({ typeKey: pw.typeKey, powerType: pt, remaining: pw.duration, duration: pw.duration }); }
    pt.apply(this.player);
  }

  /** @private Update buff timers */
  _updatePowerupBuffs(dt) {
    if (!this.player._activeBuffs) return;
    for (let i = this.player._activeBuffs.length - 1; i >= 0; i--) {
      const b = this.player._activeBuffs[i];
      b.remaining -= dt;
      if (b.remaining <= 0) { b.powerType.remove(this.player); this.player._activeBuffs.splice(i, 1); }
    }
  }

  /**
   * Main render pass - draws everything to canvas.
   * @private
   */
  _render() {
    ctx.clearRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    // Camera transform for screen shake
    ctx.save();
    ctx.translate(this.cameraOffset.x, this.cameraOffset.y);

    // --- BACKGROUND LAYER 1: Deep space gradient ---
    const bgGrad = ctx.createRadialGradient(
      CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, 0,
      CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.WIDTH * 0.75
    );
    bgGrad.addColorStop(0, '#0c0c2e');
    bgGrad.addColorStop(0.5, '#080820');
    bgGrad.addColorStop(1, '#030310');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(-10, -10, CONFIG.WIDTH + 20, CONFIG.HEIGHT + 20);

    // --- BACKGROUND LAYER 2: Nebula clouds ---
    if (this._nebulas) {
      for (const nebula of this._nebulas) {
        nebula.render(ctx, this.gameTime);
      }
    }

    // --- BACKGROUND LAYER 3: Cosmic rays ---
    if (this._cosmicRays) {
      for (const ray of this._cosmicRays) {
        ray.render(ctx);
      }
    }

    // --- BACKGROUND LAYER 4: Subtle grid ---
    ctx.strokeStyle = 'rgba(0,229,255,0.025)';
    ctx.lineWidth = 0.5;
    const gridSize = 80;
    for (let x = gridSize; x < CONFIG.WIDTH; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, CONFIG.HEIGHT);
      ctx.stroke();
    }
    for (let y = gridSize; y < CONFIG.HEIGHT; y += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(CONFIG.WIDTH, y);
      ctx.stroke();
    }

    // --- BACKGROUND LAYER 5: Space dust ---
    if (this._spaceDust) {
      for (const dust of this._spaceDust) {
        dust.render(ctx, this.gameTime);
      }
    }

    // --- BACKGROUND LAYER 6: Stars ---
    for (const star of this.stars) {
      star.render(ctx, this.gameTime);
    }

    // --- GAME ENTITIES (layered: gems below enemies, enemies, projectiles on top) ---

    // Gems
    for (const gem of this.gems) {
      if (gem.alive) gem.render(ctx, this.gameTime);
    }

    // Health pickups
    for (const pickup of this.pickups) {
      if (pickup.alive) pickup.render(ctx, this.gameTime);
    }

    // Enemies
    for (const enemy of this.enemies) {
      if (enemy.alive) enemy.render(ctx, this.gameTime);
    }

    // Holy rings
    this._renderHolyRings(ctx);

    // Projectiles
    for (const proj of this.projectiles) {
      if (proj.alive) proj.render(ctx, this.gameTime);
    }

    // Beams
    if (this._beams) {
      for (const beam of this._beams) {
        const alpha = beam.life / 100;
        ctx.save();
        ctx.globalAlpha = alpha;
        // Outer glow
        ctx.strokeStyle = beam.color;
        ctx.lineWidth = beam.width + 4;
        ctx.shadowColor = beam.color;
        ctx.shadowBlur = beam.width * 3;
        ctx.globalAlpha = alpha * 0.3;
        ctx.beginPath();
        ctx.moveTo(beam.startX, beam.startY);
        ctx.lineTo(beam.endX, beam.endY);
        ctx.stroke();
        // Main beam
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = beam.color;
        ctx.lineWidth = beam.width;
        ctx.shadowBlur = beam.width * 2;
        ctx.beginPath();
        ctx.moveTo(beam.startX, beam.startY);
        ctx.lineTo(beam.endX, beam.endY);
        ctx.stroke();
        // Hot core
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = beam.width * 0.35;
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 4;
        ctx.stroke();
        ctx.restore();
      }
    }

    // Lightning arcs
    if (this._lightningArcs) {
      for (const arc of this._lightningArcs) {
        const alpha = arc.life / 150;
        ctx.save();
        ctx.globalAlpha = alpha;

        // Outer glow
        ctx.strokeStyle = arc.color;
        ctx.lineWidth = 5;
        ctx.shadowColor = arc.color;
        ctx.shadowBlur = 16;
        this._drawLightningPath(ctx, arc);
        ctx.stroke();

        // Main arc
        ctx.strokeStyle = arc.color;
        ctx.lineWidth = 2.5;
        ctx.shadowBlur = 10;
        this._drawLightningPath(ctx, arc);
        ctx.stroke();

        // White core
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 0.8;
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 6;
        this._drawLightningPath(ctx, arc);
        ctx.stroke();

        ctx.restore();
      }
    }

    // Player trail particles
    if (this.state === 'playing' || this.state === 'levelup') {
      const speed = Math.abs(this.player.vx) + Math.abs(this.player.vy);
      if (speed > 0.5) {
        const trailCount = Math.min(3, Math.floor(speed / 1.5));
        for (let i = 0; i < trailCount; i++) {
          this.particles.trail(this.player.x, this.player.y, CONFIG.COLORS.CYAN, 1.5);
        }
      }
    }

    // Player
    if (this.player && this.player.alive) {
      this.player.render(ctx, this.gameTime);
    }

    // Particles (on top of everything)
    this.particles.render(ctx);

    // Boss effects (telegraphs, boss projectiles, lasers)
    this._renderBossEffects(ctx);

    // Powerup collectibles
    for (const pw of this.powerups) {
      if (pw.alive) pw.render(ctx, this.gameTime);
    }

    // Floating texts (topmost)
    this.floatingTexts.render(ctx);

    ctx.restore();

    // --- POST-PROCESSING (no camera shake) ---
    this._renderPostProcess();

    // --- HUD (no camera shake) ---
    this._renderHUD();
  }

  /**
   * Draw jagged lightning path for rendering.
   * @private
   */
  _drawLightningPath(ctx, arc) {
    const dx = arc.x2 - arc.x1;
    const dy = arc.y2 - arc.y1;
    const segments = 7;
    ctx.beginPath();
    ctx.moveTo(arc.x1, arc.y1);
    for (let i = 1; i < segments; i++) {
      const t = i / segments;
      const jitter = 12;
      const px = arc.x1 + dx * t + rand(-jitter, jitter);
      const py = arc.y1 + dy * t + rand(-jitter, jitter);
      ctx.lineTo(px, py);
    }
    ctx.lineTo(arc.x2, arc.y2);
  }

  /**
   * Post-processing effects: vignette, scanlines, chromatic fringe.
   * @private
   */
  _renderPostProcess() {
    // --- Vignette ---
    const vignetteGrad = ctx.createRadialGradient(
      CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.WIDTH * 0.3,
      CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.WIDTH * 0.72
    );
    vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vignetteGrad.addColorStop(0.6, 'rgba(0,0,0,0)');
    vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
    ctx.fillStyle = vignetteGrad;
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    // --- Subtle scanlines ---
    ctx.fillStyle = 'rgba(0,0,0,0.03)';
    for (let y = 0; y < CONFIG.HEIGHT; y += 3) {
      ctx.fillRect(0, y, CONFIG.WIDTH, 1);
    }

    // --- Chromatic fringe at edges (subtle) ---
    const fringeAlpha = 0.04 + Math.sin(this.gameTime * 0.001) * 0.02;
    ctx.fillStyle = `rgba(0,229,255,${fringeAlpha})`;
    ctx.fillRect(0, 0, 3, CONFIG.HEIGHT);
    ctx.fillRect(CONFIG.WIDTH - 3, 0, 3, CONFIG.HEIGHT);
    ctx.fillStyle = `rgba(255,0,229,${fringeAlpha})`;
    ctx.fillRect(0, 0, CONFIG.WIDTH, 2);
    ctx.fillRect(0, CONFIG.HEIGHT - 2, CONFIG.WIDTH, 2);

    // --- Damage vignette (when low HP) ---
    if (this.player && this.player.hp < this.player.maxHp * 0.3) {
      const damageAlpha = (1 - this.player.hp / (this.player.maxHp * 0.3)) * 0.25;
      const pulse = 0.8 + 0.2 * Math.sin(this.gameTime * 0.005);
      const dmgGrad = ctx.createRadialGradient(
        CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.WIDTH * 0.15,
        CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.WIDTH * 0.7
      );
      dmgGrad.addColorStop(0, 'rgba(255,0,0,0)');
      dmgGrad.addColorStop(1, `rgba(255,0,0,${damageAlpha * pulse})`);
      ctx.fillStyle = dmgGrad;
      ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    }
  }

  /**
   * Render holy ring visual effects.
   * @private
   */
  _renderHolyRings(ctx) {
    if (!this.player.ownedWeapons.has('holyRing')) return;
    const def = this.player.getWeaponDef('holyRing');
    if (!def) return;

    const ringCount = def.ringCount || 2;
    for (let i = 0; i < ringCount; i++) {
      const angle = this.holyRingAngle + (Math.PI * 2 / ringCount) * i;
      const rx = this.player.x + Math.cos(angle) * def.ringRadius;
      const ry = this.player.y + Math.sin(angle) * def.ringRadius;
      const orbSize = def.projectileSize || 6;

      // Orbit trail (faint arc)
      ctx.save();
      ctx.strokeStyle = hexToRgba(def.color, 0.12);
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 8]);
      ctx.beginPath();
      ctx.arc(this.player.x, this.player.y, def.ringRadius, angle - 0.3, angle + 0.3);
      ctx.stroke();
      ctx.setLineDash([]);

      // Outer glow
      ctx.shadowColor = def.color;
      ctx.shadowBlur = 16;
      ctx.strokeStyle = hexToRgba(def.color, 0.5);
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(rx, ry, orbSize * 1.5, 0, Math.PI * 2);
      ctx.stroke();

      // Inner ring
      ctx.shadowBlur = 10;
      ctx.strokeStyle = hexToRgba(def.color, 0.7);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(rx, ry, orbSize, 0, Math.PI * 2);
      ctx.stroke();

      // Core orb
      const orbGrad = ctx.createRadialGradient(rx, ry, 0, rx, ry, orbSize * 0.7);
      orbGrad.addColorStop(0, '#ffffff');
      orbGrad.addColorStop(0.3, def.color);
      orbGrad.addColorStop(1, hexToRgba(def.color, 0.2));
      ctx.fillStyle = orbGrad;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(rx, ry, orbSize * 0.7, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }
  }

  /**
   * Render the HUD (heads-up display) with HP, XP, wave info, etc.
   * @private
   */
  _renderHUD() {
    const pad = 15;
    const time = this.gameTime;

    // --- HP BAR (glass panel) ---
    const hpBarW = 210;
    const hpBarH = 16;
    const hpX = pad;
    const hpY = pad;

    // Glass panel background
    this._drawGlassPanel(hpX - 4, hpY - 4, hpBarW + 8, hpBarH + 8, 5);

    // HP bar background (dark track)
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, hpX, hpY, hpBarW, hpBarH, 4);
    ctx.fill();

    // HP bar fill
    const hpRatio = this.player.hp / this.player.maxHp;
    const hpGrad = ctx.createLinearGradient(hpX, 0, hpX + hpBarW, 0);
    if (hpRatio > 0.5) {
      hpGrad.addColorStop(0, '#00ff88');
      hpGrad.addColorStop(0.5, '#00cc66');
      hpGrad.addColorStop(1, '#009944');
    } else if (hpRatio > 0.25) {
      hpGrad.addColorStop(0, '#ffaa00');
      hpGrad.addColorStop(0.5, '#cc8800');
      hpGrad.addColorStop(1, '#996600');
    } else {
      hpGrad.addColorStop(0, '#ff3355');
      hpGrad.addColorStop(0.5, '#cc1133');
      hpGrad.addColorStop(1, '#990022');
    }
    ctx.fillStyle = hpGrad;
    roundRect(ctx, hpX, hpY, hpBarW * hpRatio, hpBarH, 4);
    ctx.fill();

    // HP bar shimmer overlay
    if (hpRatio > 0) {
      const shimmerX = hpX + (Math.sin(time * 0.003) * 0.5 + 0.5) * hpBarW * hpRatio;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      roundRect(ctx, shimmerX - 15, hpY, 30, hpBarH, 4);
      ctx.fill();
    }

    // HP text
    ctx.fillStyle = '#ffffff';
    ctx.font = "bold 11px 'Rajdhani', sans-serif";
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 4;
    ctx.fillText(`❤ ${Math.ceil(this.player.hp)} / ${this.player.maxHp}`, hpX + hpBarW / 2, hpY + hpBarH - 3);
    ctx.shadowBlur = 0;

    // --- XP BAR ---
    const xpBarW = 210;
    const xpBarH = 8;
    const xpX = pad;
    const xpY = hpY + hpBarH + 8;

    this._drawGlassPanel(xpX - 4, xpY - 3, xpBarW + 8, xpBarH + 6, 4);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, xpX, xpY, xpBarW, xpBarH, 3);
    ctx.fill();

    const xpRatio = this.player.xp / this.player.xpToNext;
    const xpGrad = ctx.createLinearGradient(xpX, 0, xpX + xpBarW, 0);
    xpGrad.addColorStop(0, '#00e5ff');
    xpGrad.addColorStop(1, '#0088aa');
    ctx.fillStyle = xpGrad;
    roundRect(ctx, xpX, xpY, xpBarW * xpRatio, xpBarH, 3);
    ctx.fill();

    // XP shimmer
    if (xpRatio > 0.1) {
      const sx = xpX + (Math.sin(time * 0.005 + 1) * 0.5 + 0.5) * xpBarW * xpRatio;
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      roundRect(ctx, sx - 10, xpY, 20, xpBarH, 3);
      ctx.fill();
    }

    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = "9px 'Rajdhani', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(`XP ${Math.floor(this.player.xp)} / ${this.player.xpToNext}`, xpX + xpBarW / 2, xpY + xpBarH - 1);

    // --- STATS PANEL (left side, below bars) ---
    const statX = pad;
    const statY = xpY + xpBarH + 10;
    const statW = 210;
    const statH = 68;

    this._drawGlassPanel(statX - 4, statY - 4, statW + 8, statH + 8, 5);

    // Level badge
    ctx.fillStyle = CONFIG.COLORS.GOLD;
    ctx.font = "bold 13px 'Orbitron', sans-serif";
    ctx.textAlign = 'left';
    ctx.fillText(`⚡ LV ${this.player.level}`, statX + 4, statY + 14);

    // Wave
    ctx.fillStyle = CONFIG.COLORS.MAGENTA;
    ctx.font = "11px 'Rajdhani', sans-serif";
    ctx.fillText(`🌊 WAVE ${this.wave}`, statX + 4, statY + 30);

    // Timer
    const remainingSec = Math.ceil(this.waveTimer / 1000);
    ctx.fillStyle = CONFIG.COLORS.CYAN;
    ctx.fillText(`⏱ NEXT: ${remainingSec}s`, statX + 4, statY + 46);

    // Kills (right-aligned in panel)
    ctx.textAlign = 'right';
    ctx.fillStyle = '#aaaaaa';
    ctx.font = "10px 'Rajdhani', sans-serif";
    ctx.fillText(`💀 ${this.player.totalKills} kills`, statX + statW - 4, statY + 46);

    // Revivals in panel
    if (this.player.revivals > 0) {
      ctx.fillStyle = CONFIG.COLORS.GOLD;
      ctx.fillText(`🪶 x${this.player.revivals}`, statX + statW - 4, statY + 14);
    }

    // --- WEAPONS PANEL (right side, glass panel) ---
    const wpW = 170;
    const wpH = this.player.ownedWeapons.size * 22 + 30;
    const wpX = CONFIG.WIDTH - pad - wpW;
    const wpY = pad;

    this._drawGlassPanel(wpX - 4, wpY - 4, wpW + 8, wpH + 8, 5);

    ctx.fillStyle = CONFIG.COLORS.CYAN;
    ctx.font = "bold 10px 'Orbitron', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText('⚔ WEAPONS', wpX + wpW / 2, wpY + 16);

    let wy = wpY + 26;
    for (const wid of this.player.ownedWeapons) {
      const def = WEAPON_DEFS[wid];
      const cd = this.player.weaponCooldowns[wid];
      const cdRatio = cd > 0 ? cd / def.cooldown : 0;

      // Weapon icon + name
      ctx.textAlign = 'left';
      const readyColor = cd > 0 ? '#555555' : '#ffffff';
      ctx.fillStyle = readyColor;
      ctx.font = "11px 'Rajdhani', sans-serif";
      ctx.fillText(`${def.icon} ${def.name}`, wpX + 6, wy + 10);

      // Cooldown bar (if reloading)
      if (cdRatio > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        roundRect(ctx, wpX + 6, wy + 12, wpW - 16, 3, 1.5);
        ctx.fill();
        const cdGrad = ctx.createLinearGradient(wpX + 6, 0, wpX + wpW - 10, 0);
        cdGrad.addColorStop(0, CONFIG.COLORS.CYAN);
        cdGrad.addColorStop(1, '#006688');
        ctx.fillStyle = cdGrad;
        roundRect(ctx, wpX + 6, wy + 12, (wpW - 16) * (1 - cdRatio), 3, 1.5);
        ctx.fill();
      }

      wy += 21;
    }

    ctx.textAlign = 'left';

    // --- BOSS HP BAR (top center, only when boss is alive) ---
    const boss = this.enemies.find(e => e.alive && e.behavior === 'boss');
    if (boss) {
      const bBarW = 300;
      const bBarH = 10;
      const bX = CONFIG.WIDTH / 2 - bBarW / 2;
      const bY = CONFIG.HEIGHT - pad - 30;

      // Glass background
      this._drawGlassPanel(bX - 4, bY - 4, bBarW + 8, bBarH + 18, 5);

      // Boss name
      ctx.fillStyle = '#ff4444';
      ctx.font = "bold 10px 'Orbitron', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText(`☠ ${boss.name} - Phase ${boss.bossPhase + 1}`, CONFIG.WIDTH / 2, bY - 2);

      // HP bar
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      roundRect(ctx, bX, bY + 4, bBarW, bBarH, 4);
      ctx.fill();

      const bHpRatio = boss.hp / boss.maxHp;
      const bHpGrad = ctx.createLinearGradient(bX, 0, bX + bBarW, 0);
      bHpGrad.addColorStop(0, '#ff0000');
      bHpGrad.addColorStop(0.5, '#ff4444');
      bHpGrad.addColorStop(1, '#ff8888');
      ctx.fillStyle = bHpGrad;
      roundRect(ctx, bX, bY + 4, bBarW * bHpRatio, bBarH, 4);
      ctx.fill();

      // Phase markers
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(bX + bBarW * 0.6 - 1, bY + 2, 2, bBarH + 4);
      ctx.fillRect(bX + bBarW * 0.3 - 1, bY + 2, 2, bBarH + 4);
    }

    // --- POWERUP BUFF INDICATORS (below stats) ---
    if (this.player._activeBuffs && this.player._activeBuffs.length > 0) {
      let buffY = xpY + xpBarH + statH + 14;
      for (const buff of this.player._activeBuffs) {
        const bw = 210;
        const bh = 14;
        this._drawGlassPanel(statX - 4, buffY - 2, bw + 8, bh + 4, 3);

        ctx.fillStyle = buff.powerType.color;
        ctx.font = "bold 9px 'Rajdhani', sans-serif";
        ctx.textAlign = 'left';
        ctx.fillText(`${buff.powerType.icon} ${buff.powerType.name}`, statX + 4, buffY + bh - 2);

        // Timer bar
        const barRatio = buff.remaining / buff.duration;
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(statX + bw - 55, buffY + 2, 50, bh - 4);
        ctx.fillStyle = buff.powerType.color;
        ctx.fillRect(statX + bw - 55, buffY + 2, 50 * barRatio, bh - 4);

        ctx.fillStyle = '#ffffff';
        ctx.font = "8px 'Rajdhani', sans-serif";
        ctx.textAlign = 'right';
        ctx.fillText(`${Math.ceil(buff.remaining / 1000)}s`, statX + bw - 4, buffY + bh - 2);

        buffY += 18;
      }
    }

    // --- SHIELD INDICATOR (when shielded) ---
    if (this.player._shielded) {
      const shieldAlpha = 0.15 + Math.sin(time * 0.008) * 0.05;
      ctx.strokeStyle = `rgba(68,170,255,${shieldAlpha + 0.2})`;
      ctx.lineWidth = 3;
      ctx.shadowColor = '#44aaff';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(this.player.x, this.player.y, this.player.size * 2.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  /**
   * Draw a glass-morphism style panel (translucent with border glow).
   * @private
   */
  _drawGlassPanel(x, y, w, h, r) {
    // Background
    const glassGrad = ctx.createLinearGradient(x, y, x, y + h);
    glassGrad.addColorStop(0, 'rgba(10,10,40,0.75)');
    glassGrad.addColorStop(1, 'rgba(8,8,30,0.85)');
    ctx.fillStyle = glassGrad;
    roundRect(ctx, x, y, w, h, r);
    ctx.fill();

    // Border (subtle glow)
    ctx.strokeStyle = 'rgba(0,229,255,0.25)';
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, w, h, r);
    ctx.stroke();

    // Top highlight line
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x + r, y + 1);
    ctx.lineTo(x + w - r, y + 1);
    ctx.stroke();
  }

  /**
   * Main game loop (called via requestAnimationFrame).
   * @private
   * @param {number} timestamp - High-res timestamp from rAF
   */
  _loop(timestamp) {
    if (this.state !== 'playing') return;

    // Calculate delta time, capped to prevent spiral of death
    let dt = timestamp - this.lastTime;
    this.lastTime = timestamp;
    if (dt > 100) dt = 100; // Cap at 100ms

    this.update(dt);
    this._render();

    this.rafId = requestAnimationFrame(this._loop);
  }

  /**
   * Render a single frame (used for game over screen).
   * @private
   */
  _renderStatic() {
    this._render();
  }
}

/**
 * SoundSystem - Generates retro-style sound effects using Web Audio API.
 * All sounds are synthesized in real-time - no external files needed.
 */
class SoundSystem {
  constructor() {
    /** @type {AudioContext|null} */
    this.ctx = null;
    /** @type {boolean} Whether audio is initialized */
    this.initialized = false;
    /** @type {number} Master volume (0-1) */
    this.volume = 0.3;
    /** @type {GainNode} Master gain node */
    this.masterGain = null;
  }

  /**
   * Initialize audio context (must be called from user gesture).
   */
  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = this.volume;
      this.masterGain.connect(this.ctx.destination);
      this.initialized = true;
    } catch (e) {
      console.warn('Web Audio API not available:', e);
    }
  }

  /**
   * Play a simple synthesized tone.
   * @param {number} freq - Frequency in Hz
   * @param {number} duration - Duration in seconds
   * @param {string} type - Oscillator type (sine, square, sawtooth, triangle)
   * @param {number} volume - Volume (0-1)
   * @param {number} [freqEnd] - End frequency for sweeps
   */
  playTone(freq, duration, type = 'sine', volume = 0.15, freqEnd = null) {
    if (!this.initialized || !this.ctx) return;
    try {
      const now = this.ctx.currentTime;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      if (freqEnd !== null) {
        osc.frequency.linearRampToValueAtTime(freqEnd, now + duration);
      }

      gain.gain.setValueAtTime(volume * this.volume, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start(now);
      osc.stop(now + duration);
    } catch (e) {
      // Silently ignore audio errors
    }
  }

  /**
   * Play noise burst (for explosions/hits).
   * @param {number} duration - Duration in seconds
   * @param {number} volume - Volume level
   */
  playNoise(duration = 0.1, volume = 0.1) {
    if (!this.initialized || !this.ctx) return;
    try {
      const now = this.ctx.currentTime;
      const bufferSize = this.ctx.sampleRate * duration;
      const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }
      const source = this.ctx.createBufferSource();
      source.buffer = buffer;
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(volume * this.volume, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      source.connect(gain);
      gain.connect(this.masterGain);
      source.start(now);
    } catch (e) { /* ignore */ }
  }

  /** Sound: Player takes damage */
  sfxPlayerHit() {
    this.playTone(200, 0.15, 'square', 0.2);
    this.playTone(100, 0.2, 'sawtooth', 0.15, 50);
  }

  /** Sound: Enemy hit */
  sfxEnemyHit() {
    this.playTone(800, 0.05, 'square', 0.08, 200);
  }

  /** Sound: Enemy killed */
  sfxEnemyKill() {
    this.playTone(600, 0.08, 'square', 0.1, 1200);
    this.playNoise(0.03, 0.04);
  }

  /** Sound: Boss killed */
  sfxBossKill() {
    this.playTone(300, 0.4, 'sawtooth', 0.3, 1200);
    this.playTone(150, 0.5, 'sine', 0.25, 600);
    this.playNoise(0.2, 0.15);
    setTimeout(() => this.playTone(800, 0.3, 'triangle', 0.2, 400), 200);
  }

  /** Sound: XP gem collected */
  sfxGemPickup() {
    this.playTone(1200, 0.06, 'sine', 0.06, 1800);
  }

  /** Sound: Level up */
  sfxLevelUp() {
    this.playTone(400, 0.15, 'triangle', 0.2, 800);
    setTimeout(() => this.playTone(600, 0.15, 'triangle', 0.2, 1200), 100);
    setTimeout(() => this.playTone(800, 0.2, 'triangle', 0.25, 1600), 200);
  }

  /** Sound: Weapon fire */
  sfxWeaponFire(weaponId) {
    switch (weaponId) {
      case 'magicBolt':
        this.playTone(1000, 0.06, 'sine', 0.08, 400);
        break;
      case 'fireball':
        this.playTone(200, 0.2, 'sawtooth', 0.15, 100);
        this.playNoise(0.08, 0.06);
        break;
      case 'lightning':
        this.playTone(2000, 0.08, 'square', 0.12, 200);
        this.playNoise(0.04, 0.08);
        break;
      case 'frostNova':
        this.playTone(800, 0.3, 'sine', 0.15, 200);
        this.playNoise(0.15, 0.05);
        break;
      case 'voidBeam':
        this.playTone(300, 0.1, 'sawtooth', 0.1, 100);
        break;
      case 'energyOrb':
        this.playTone(500, 0.1, 'triangle', 0.08, 2000);
        break;
      default:
        this.playTone(800, 0.05, 'sine', 0.05);
    }
  }

  /** Sound: New wave */
  sfxNewWave() {
    this.playTone(300, 0.3, 'triangle', 0.2, 600);
    setTimeout(() => this.playTone(450, 0.3, 'triangle', 0.2, 900), 150);
  }

  /** Music: Low background drone using LFO */
  startMusic() {
    if (!this.initialized || !this.ctx) return;
    try {
      const now = this.ctx.currentTime;
      // Deep ambient drone
      const osc = this.ctx.createOscillator();
      const lfo = this.ctx.createOscillator();
      const lfoGain = this.ctx.createGain();
      const gain = this.ctx.createGain();

      osc.type = 'sine';
      osc.frequency.value = 55; // Low A
      lfo.type = 'sine';
      lfo.frequency.value = 0.1; // Slow modulation
      lfoGain.gain.value = 10;

      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);

      gain.gain.setValueAtTime(0.03 * this.volume, now);
      osc.connect(gain);
      gain.connect(this.masterGain);

      osc.start(now);
      lfo.start(now);

      // Store for cleanup
      this._musicNodes = { osc, lfo, gain, lfoGain };
    } catch (e) { /* ignore */ }
  }

  /** Stop background music */
  stopMusic() {
    if (this._musicNodes) {
      try {
        this._musicNodes.osc.stop();
        this._musicNodes.lfo.stop();
      } catch (e) { /* ignore */ }
      this._musicNodes = null;
    }
  }

  /** Mute/unmute */
  setVolume(v) {
    this.volume = clamp(v, 0, 1);
    if (this.masterGain) {
      this.masterGain.gain.value = this.volume;
    }
  }
}

/**
 * AchievementManager - Tracks and displays achievement unlocks.
 */
class AchievementManager {
  constructor() {
    /** @type {Set<string>} Unlocked achievement IDs */
    this.unlocked = new Set();
    /** @type {Array} Pending notifications to display */
    this.notifications = [];
    /** @type {Set<string>} Unlocked this session (for notification dedup) */
    this.sessionUnlocked = new Set();
  }

  /**
   * Check all achievements against current game state.
   * @param {Game} game - Game instance
   */
  check(game) {
    for (const ach of ACHIEVEMENTS) {
      if (this.unlocked.has(ach.id)) continue;
      if (ach.check(game)) {
        this.unlocked.add(ach.id);
        this.sessionUnlocked.add(ach.id);
        this.notifications.push({ ...ach, time: game.gameTime });
        // Sound effect for achievement
        if (game.sound) {
          game.sound.playTone(600, 0.15, 'triangle', 0.2, 1200);
          setTimeout(() => game.sound.playTone(900, 0.2, 'triangle', 0.25, 1800), 150);
        }
      }
    }
  }

  /**
   * Render pending achievement notifications.
   * @param {CanvasRenderingContext2D} ctx
   * @param {number} gameTime
   * @returns {boolean} True if notifications are being displayed
   */
  render(ctx, gameTime) {
    let hasActive = false;
    for (let i = this.notifications.length - 1; i >= 0; i--) {
      const notif = this.notifications[i];
      const age = gameTime - notif.time;
      if (age > 4000) {
        this.notifications.splice(i, 1);
        continue;
      }
      hasActive = true;

      let alpha = 1;
      let yOff = 0;
      if (age < 300) {
        // Slide in from right
        const t = age / 300;
        yOff = (1 - t) * 80;
        alpha = t;
      } else if (age > 3500) {
        // Fade out
        alpha = 1 - (age - 3500) / 500;
      }

      const idx = this.notifications.length - 1 - i;
      const y = CONFIG.HEIGHT / 2 - 60 + idx * 50 + yOff;

      ctx.save();
      ctx.globalAlpha = alpha;

      // Background pill
      const text = `${notif.icon} ${notif.name}`;
      ctx.font = "bold 14px 'Rajdhani', sans-serif";
      const metrics = ctx.measureText(text);
      const pw = metrics.width + 30;
      const px = CONFIG.WIDTH / 2 - pw / 2;

      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.strokeStyle = CONFIG.COLORS.GOLD;
      ctx.lineWidth = 1;
      roundRect(ctx, px, y - 12, pw, 28, 14);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = CONFIG.COLORS.GOLD;
      ctx.textAlign = 'center';
      ctx.fillText(text, CONFIG.WIDTH / 2, y + 7);
      ctx.textAlign = 'left';

      ctx.restore();
    }
    return hasActive;
  }

  /** Reset session tracking (for new game) */
  resetSession() {
    this.sessionUnlocked.clear();
    this.notifications = [];
  }
}

/**
 * Draw a rounded rectangle path.
 * @param {CanvasRenderingContext2D} ctx
 * @param {number} x
 * @param {number} y
 * @param {number} w
 * @param {number} h
 * @param {number} r - Corner radius
 */
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/**
 * ComboSystem - Tracks multi-kill combos and grants bonus XP.
 * Quick successive kills build a combo meter for bonus rewards.
 */
class ComboSystem {
  constructor() {
    /** @type {number} Current combo count */
    this.count = 0;
    /** @type {number} Combo timer (decays over time) */
    this.timer = 0;
    /** @type {number} Max combo reached */
    this.maxCombo = 0;
    /** @type {number} Combo expiry time in ms */
    this.expiryTime = 1500;
    /** @type {number} Best combo message display time */
    this.bestComboMsg = 0;
    /** @type {number} Current combo tier */
    this.tier = 0;
  }

  /**
   * Register a kill and update combo.
   * @param {Game} game - Game instance for XP bonus
   */
  onKill(game) {
    this.count++;
    this.timer = this.expiryTime;
    this.maxCombo = Math.max(this.maxCombo, this.count);

    // Determine tier
    const prevTier = this.tier;
    if (this.count >= 100) this.tier = 6;
    else if (this.count >= 50) this.tier = 5;
    else if (this.count >= 25) this.tier = 4;
    else if (this.count >= 10) this.tier = 3;
    else if (this.count >= 5) this.tier = 2;
    else this.tier = 1;

    // XP bonus for high combos
    if (this.count >= 10 && this.count % 10 === 0) {
      const bonusXP = Math.floor(this.count / 10);
      game.player.xp += bonusXP;
      game.floatingTexts.add(
        game.player.x, game.player.y - 15,
        `COMBO x${this.count}! +${bonusXP} XP`,
        CONFIG.COLORS.GOLD
      );
      game.particles.emit(
        game.player.x, game.player.y,
        CONFIG.COLORS.GOLD, 10, 3, 400, 2
      );
    }

    // Tier up notification
    if (this.tier > prevTier && this.tier >= 3) {
      const tierNames = ['', '', '', 'KILLING SPREE', 'RAMPAGE', 'GODLIKE', 'VOID ASCENDANT'];
      game.floatingTexts.add(
        CONFIG.WIDTH / 2, CONFIG.HEIGHT / 3,
        tierNames[this.tier],
        this.tier >= 6 ? CONFIG.COLORS.MAGENTA : CONFIG.COLORS.GOLD
      );
    }
  }

  /**
   * Update combo timer - combo resets if no kills for too long.
   * @param {number} dt - Delta time
   */
  update(dt) {
    if (this.count > 0 && this.timer > 0) {
      this.timer -= dt;
      if (this.timer <= 0) {
        // Combo ended
        if (this.count >= 5) {
          this.bestComboMsg = 2000;
        }
        this.count = 0;
        this.tier = 0;
      }
    }
    if (this.bestComboMsg > 0) {
      this.bestComboMsg -= dt;
    }
  }

  /**
   * Render combo display.
   * @param {CanvasRenderingContext2D} ctx
   */
  render(ctx) {
    if (this.count >= 3) {
      const alpha = Math.min(1, this.timer / 500);
      const pulse = 1 + Math.sin(performance.now() * 0.008) * 0.1;

      ctx.save();
      ctx.globalAlpha = alpha;

      // Combo counter below player
      const x = CONFIG.WIDTH / 2;
      const y = CONFIG.HEIGHT - 60;

      // Glow
      const colors = ['#aaa', '#aaa', '#aaa', CONFIG.COLORS.GREEN, CONFIG.COLORS.CYAN, CONFIG.COLORS.MAGENTA, CONFIG.COLORS.GOLD];
      const tierColor = colors[Math.min(this.tier, colors.length - 1)];

      ctx.shadowColor = tierColor;
      ctx.shadowBlur = 15;
      ctx.fillStyle = tierColor;
      ctx.font = `bold ${18 * pulse}px 'Orbitron', sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(`${this.count}x COMBO`, x, y);

      // Combo bar
      const barW = 150;
      const barH = 4;
      const barX = x - barW / 2;
      const barY = y + 8;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = tierColor;
      ctx.fillRect(barX, barY, barW * (this.timer / this.expiryTime), barH);

      ctx.restore();
    }

    // Best combo message
    if (this.bestComboMsg > 0 && this.maxCombo >= 10) {
      const alpha = Math.min(1, this.bestComboMsg / 500);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = CONFIG.COLORS.CYAN;
      ctx.font = "bold 16px 'Rajdhani', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText(`Best Combo: ${this.maxCombo}x`, CONFIG.WIDTH / 2, CONFIG.HEIGHT - 30);
      ctx.restore();
    }
  }

  /** Reset for new game */
  reset() {
    this.count = 0;
    this.timer = 0;
    this.maxCombo = 0;
    this.tier = 0;
    this.bestComboMsg = 0;
  }
}

/**
 * Minimap - Renders a small overview of entity positions.
 * Helps player track enemy clusters and gem locations.
 */
class Minimap {
  constructor() {
    /** @type {number} Minimap size in pixels */
    this.size = 120;
    /** @type {number} Padding from corner */
    this.padding = 10;
    /** @type {number} Scale factor (game coords -> minimap coords) */
    this.scale = this.size / Math.max(CONFIG.WIDTH, CONFIG.HEIGHT);
  }

  /**
   * Convert game coordinate to minimap coordinate.
   * @param {number} gx - Game x
   * @param {number} gy - Game y
   * @returns {{x: number, y: number}} Minimap coords
   */
  toMap(gx, gy) {
    return {
      x: this.padding + gx * this.scale,
      y: CONFIG.HEIGHT - this.size - this.padding + gy * this.scale
    };
  }

  /**
   * Render the minimap.
   * @param {CanvasRenderingContext2D} ctx
   * @param {Game} game
   */
  render(ctx, game) {
    if (game.state !== 'playing') return;

    const mx = this.padding;
    const my = CONFIG.HEIGHT - this.size - this.padding;

    // Background
    ctx.fillStyle = 'rgba(0,0,20,0.7)';
    ctx.strokeStyle = 'rgba(0,229,255,0.3)';
    ctx.lineWidth = 1;
    ctx.fillRect(mx, my, this.size, this.size);
    ctx.strokeRect(mx, my, this.size, this.size);

    // Enemies (small dots)
    const enemyColorCounts = {};
    for (const enemy of game.enemies) {
      if (!enemy.alive) continue;
      const pos = this.toMap(enemy.x, enemy.y);
      // Cluster nearby enemies for performance
      const key = `${Math.round(pos.x)},${Math.round(pos.y)}`;
      enemyColorCounts[enemy.color] = (enemyColorCounts[enemy.color] || 0) + 1;
      ctx.fillStyle = hexToRgba(enemy.color, 0.6);
      ctx.fillRect(pos.x - 0.5, pos.y - 0.5, 1.5, 1.5);
    }

    // Gems (yellow dots)
    for (const gem of game.gems) {
      if (!gem.alive) continue;
      const pos = this.toMap(gem.x, gem.y);
      ctx.fillStyle = hexToRgba(CONFIG.COLORS.XP_GEM, 0.7);
      ctx.fillRect(pos.x - 0.5, pos.y - 0.5, 1, 1);
    }

    // Health pickups (red dots)
    for (const pickup of game.pickups) {
      if (!pickup.alive) continue;
      const pos = this.toMap(pickup.x, pickup.y);
      ctx.fillStyle = hexToRgba(CONFIG.COLORS.RED, 0.8);
      ctx.fillRect(pos.x - 0.5, pos.y - 0.5, 1, 1);
    }

    // Player (bright cyan dot)
    const playerPos = this.toMap(game.player.x, game.player.y);
    ctx.fillStyle = CONFIG.COLORS.CYAN;
    ctx.shadowColor = CONFIG.COLORS.CYAN;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(playerPos.x, playerPos.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Player magnet range ring
    ctx.strokeStyle = 'rgba(0,229,255,0.2)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(playerPos.x, playerPos.y, game.player.getMagnetRange() * this.scale, 0, Math.PI * 2);
    ctx.stroke();

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = "8px 'Rajdhani', sans-serif";
    ctx.textAlign = 'left';
    ctx.fillText('MAP', mx + 2, my + 10);
  }
}
