/**
 * Player - The main character controlled by the player.
 * Handles movement, HP, XP, weapons, and power-ups.
 */
class Player extends Entity {
  constructor() {
    super(CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, CONFIG.PLAYER.SIZE);

    /** @type {number} Current hit points */
    this.hp = CONFIG.PLAYER.MAX_HP;
    /** @type {number} Maximum hit points */
    this.maxHp = CONFIG.PLAYER.MAX_HP;
    /** @type {number} Base max HP (for scaling) */
    this.baseMaxHp = CONFIG.PLAYER.MAX_HP;

    /** @type {number} Current XP */
    this.xp = 0;
    /** @type {number} XP needed for next level */
    this.xpToNext = CONFIG.XP_BASE_REQUIREMENT;
    /** @type {number} Current level */
    this.level = 1;

    /** @type {number} Invincibility timer after taking damage */
    this.invincibilityTimer = 0;
    /** @type {number} Speed multiplier */
    this.speedMult = 1;
    /** @type {number} HP multiplier */
    this.hpMult = 1;
    /** @type {number} Armor (flat damage reduction) */
    this.armor = CONFIG.PLAYER.ARMOR;
    /** @type {number} HP regeneration per second */
    this.hpRegen = CONFIG.PLAYER.HP_REGEN;
    /** @type {number} XP gain multiplier */
    this.xpMult = CONFIG.PLAYER.XP_MULTIPLIER;
    /** @type {number} Magnet range multiplier */
    this.magnetMult = 1;
    /** @type {number} Crit chance (0-1) */
    this.critChance = CONFIG.PLAYER.CRIT_CHANCE;
    /** @type {number} Crit damage multiplier */
    this.critMult = CONFIG.PLAYER.CRIT_MULTIPLIER;
    /** @type {number} Luck stat affecting drops and upgrades */
    this.luck = CONFIG.PLAYER.LUCK;
    /** @type {number} Number of revivals available */
    this.revivals = CONFIG.PLAYER.REVIVALS;

    /** @type {Set<string>} Owned weapon IDs */
    this.ownedWeapons = new Set(['magicBolt']);

    /**
     * Weapon state overrides - stores upgrade effects per weapon.
     * @type {Object<string, Object>}
     */
    this.weaponState = {};
    for (const wid of Object.keys(WEAPON_DEFS)) {
      this.weaponState[wid] = {};
    }

    /**
     * Weapon cooldown trackers.
     * @type {Object<string, number>}
     */
    this.weaponCooldowns = {};
    for (const wid of Object.keys(WEAPON_DEFS)) {
      this.weaponCooldowns[wid] = 0;
    }

    /** @type {number} Tracks total kills for stats */
    this.totalKills = 0;
    /** @type {number} Total damage dealt */
    this.totalDamage = 0;
    /** @type {number} Highest level reached */
    this.highestLevel = 1;
  }

  /**
   * Get the effective weapon definition with upgrades applied.
   * @param {string} weaponId - Weapon identifier
   * @returns {Object} Modified weapon definition
   */
  getWeaponDef(weaponId) {
    const base = WEAPON_DEFS[weaponId];
    if (!base) return null;
    const state = this.weaponState[weaponId] || {};
    const def = { ...base };

    // Apply state modifiers
    if (state.damageMult) def.damage = Math.round(base.damage * state.damageMult);
    if (state.speedMult) def.projectileSpeed = base.projectileSpeed * state.speedMult;
    if (state.countBonus) def.count = base.count + state.countBonus;
    if (state.cdMult) def.cooldown = Math.max(50, Math.round(base.cooldown * state.cdMult));
    if (state.pierceBonus !== undefined) def.pierce = (base.pierce || 0) + state.pierceBonus;
    if (state.aoeMult) def.explosionRadius = (base.explosionRadius || 50) * state.aoeMult;
    if (state.chainBonus) def.chainCount = (base.chainCount || 3) + state.chainBonus;
    if (state.rangeMult) def.chainRange = (base.chainRange || 120) * state.rangeMult;
    if (state.radiusMult) def.radius = (base.radius || 120) * state.radiusMult;
    if (state.slowMult) def.slowAmount = Math.min(0.9, (base.slowAmount || 0.4) * state.slowMult);
    if (state.ringsBonus) def.ringCount = (base.ringCount || 2) + state.ringsBonus;
    if (state.radiusMult && weaponId === 'holyRing') {
      def.ringRadius = (base.ringRadius || 65) * state.radiusMult;
    }
    if (state.speedMult && weaponId === 'holyRing') {
      def.ringSpeed = (base.ringSpeed || 0.02) * state.speedMult;
    }
    if (state.lengthMult) def.beamLength = (base.beamLength || 200) * state.lengthMult;
    if (state.widthMult) def.beamWidth = (base.beamWidth || 6) * state.widthMult;
    if (state.tickMult) def.cooldown = Math.max(30, Math.round((base.cooldown || 80) * state.tickMult));

    return def;
  }

  /**
   * Check if a hit is a critical hit based on crit chance.
   * @returns {boolean} True if critical hit
   */
  isCriticalHit() {
    return Math.random() < this.critChance;
  }

  /**
   * Apply damage to the player, accounting for armor and invincibility.
   * @param {number} amount - Raw damage amount
   * @returns {boolean} True if damage was applied
   */
  takeDamage(amount) {
    if (this.invincibilityTimer > 0) return false;

    const reduced = Math.max(1, amount - this.armor);
    this.hp -= reduced;
    this.invincibilityTimer = CONFIG.PLAYER.INVINCIBILITY_MS;

    if (this.hp <= 0) {
      if (this.revivals > 0) {
        this.revivals--;
        this.hp = Math.round(this.maxHp * 0.5);
        this.invincibilityTimer = 3000;
        return true;
      }
      this.alive = false;
    }
    return true;
  }

  /**
   * Add XP and check for level up.
   * @param {number} amount - XP amount
   * @returns {boolean} True if leveled up
   */
  addXP(amount) {
    const gained = amount * this.xpMult;
    this.xp += gained;
    if (this.xp >= this.xpToNext) {
      this.xp -= this.xpToNext;
      this.level++;
      this.highestLevel = Math.max(this.highestLevel, this.level);
      this.xpToNext = Math.round(this.xpToNext * CONFIG.XP_GROWTH_FACTOR);
      this.maxHp = Math.round(this.baseMaxHp * this.hpMult);
      this.hp = Math.min(this.hp + 5, this.maxHp); // Small heal on level up
      return true;
    }
    return false;
  }

  /**
   * Get current movement speed.
   * @returns {number} Effective speed
   */
  getSpeed() {
    return CONFIG.PLAYER.SPEED * this.speedMult;
  }

  /**
   * Get effective magnet/pickup range.
   * @returns {number} Magnet range in pixels
   */
  getMagnetRange() {
    return CONFIG.PLAYER.MAGNET_RANGE * this.magnetMult;
  }

  /**
   * Update player state each frame.
   * @param {number} dt - Delta time
   * @param {InputHandler} input - Input handler
   */
  update(dt, input) {
    // Movement
    const move = input.getMovement();
    const speed = this.getSpeed();
    this.vx = move.x * speed;
    this.vy = move.y * speed;

    this.x += this.vx * (dt / 16);
    this.y += this.vy * (dt / 16);

    // Clamp to bounds
    this.x = clamp(this.x, this.size, CONFIG.WIDTH - this.size);
    this.y = clamp(this.y, this.size, CONFIG.HEIGHT - this.size);

    // Invincibility timer
    if (this.invincibilityTimer > 0) {
      this.invincibilityTimer -= dt;
    }

    // HP regeneration
    if (this.hpRegen > 0 && this.hp < this.maxHp) {
      this.hp = Math.min(this.maxHp, this.hp + this.hpRegen * (dt / 1000));
    }

    // Update weapon cooldowns
    for (const wid of this.ownedWeapons) {
      if (this.weaponCooldowns[wid] > 0) {
        this.weaponCooldowns[wid] -= dt;
      }
    }
  }

  /**
   * Try to fire a weapon. Returns projectiles/effects to spawn.
   * @param {string} weaponId - Weapon to fire
   * @param {Enemy[]} enemies - Current enemy list
   * @returns {Array} Array of projectile configs or effect descriptors
   */
  fireWeapon(weaponId, enemies) {
    if (this.weaponCooldowns[weaponId] > 0) return [];
    if (!this.ownedWeapons.has(weaponId)) return [];

    const def = this.getWeaponDef(weaponId);
    if (!def) return [];

    // Reset cooldown (with rapid fire buff)
    const cdMult = this._cdBoost ? 0.4 : 1;
    this.weaponCooldowns[weaponId] = Math.round(def.cooldown * cdMult);

    const results = [];
    const nearest = this._findNearestEnemy(enemies);

    // Handle different weapon types
    if (def.isBeam) {
      // Void Beam: continuous beam toward nearest enemy
      if (nearest) {
        const angle = angleTo(this.x, this.y, nearest.x, nearest.y);
        results.push({
          type: 'beam',
          weaponId,
          angle,
          damage: def.damage * (this.isCriticalHit() ? this.critMult : 1) * (this._dmgBoost || 1),
          length: def.beamLength,
          width: def.beamWidth,
          color: def.color,
        });
      }
    } else if (def.isAoe) {
      // Frost Nova: AoE ring
      results.push({
        type: 'aoe',
        weaponId,
        x: this.x,
        y: this.y,
        radius: def.radius,
        damage: def.damage * (this.isCriticalHit() ? this.critMult : 1) * (this._dmgBoost || 1),
        color: def.color,
        slowAmount: def.slowAmount,
        slowDuration: def.slowDuration,
      });
    } else if (def.isPassive) {
      // Holy Ring: handled separately in update loop
      // No projectile needed - rings are rendered directly
    } else if (weaponId === 'lightning') {
      // Lightning: chain hits
      if (nearest) {
        results.push({
          type: 'lightning',
          weaponId,
          originX: this.x,
          originY: this.y,
          targets: this._findChainTargets(nearest, enemies, def),
          damage: def.damage * (this._dmgBoost || 1),
          color: def.color,
          chainCount: def.chainCount,
          chainDamageFalloff: def.chainDamageFalloff,
        });
      }
    } else {
      // Standard projectile weapons
      const count = def.count || 1;
      for (let i = 0; i < count; i++) {
        let angle;
        if (nearest && def.orbitMode) {
          // Omni-directional around player
          angle = (Math.PI * 2 / count) * i + (performance.now() / 1000);
        } else if (nearest) {
          angle = angleTo(this.x, this.y, nearest.x, nearest.y);
          angle += rand(-def.spread, def.spread);
        } else {
          angle = rand(0, Math.PI * 2);
        }

        results.push({
          type: 'projectile',
          weaponId,
          x: this.x,
          y: this.y,
          angle,
          speed: def.projectileSpeed,
          damage: def.damage * (this.isCriticalHit() ? this.critMult : 1) * (this._dmgBoost || 1),
          size: def.projectileSize,
          life: def.projectileLife,
          color: def.color,
          pierce: def.pierce || 0,
          homing: def.homing || 0,
          knockback: def.knockback || 0,
          explosive: def.explosive || false,
          explosionRadius: def.explosionRadius || 0,
          explosionDamage: def.explosionDamage || 0,
        });
      }
    }

    return results;
  }

  /**
   * Find the nearest enemy to the player for auto-targeting.
   * @private
   * @param {Enemy[]} enemies - Enemy list
   * @returns {Enemy|null} Nearest enemy or null
   */
  _findNearestEnemy(enemies) {
    let nearest = null;
    let minDist = Infinity;
    for (const e of enemies) {
      if (!e.alive) continue;
      const d = distance(this.x, this.y, e.x, e.y);
      if (d < minDist) {
        minDist = d;
        nearest = e;
      }
    }
    return nearest;
  }

  /**
   * Find chain targets for lightning weapon.
   * @private
   * @param {Enemy} first - First target (nearest)
   * @param {Enemy[]} enemies - All enemies
   * @param {Object} def - Weapon definition
   * @returns {Enemy[]} Chain of targets
   */
  _findChainTargets(first, enemies, def) {
    const targets = [first];
    const hitSet = new Set([first]);
    let current = first;

    for (let i = 1; i < def.chainCount; i++) {
      let nearest = null;
      let minDist = def.chainRange;
      for (const e of enemies) {
        if (!e.alive || hitSet.has(e)) continue;
        const d = distance(current.x, current.y, e.x, e.y);
        if (d < minDist) {
          minDist = d;
          nearest = e;
        }
      }
      if (nearest) {
        targets.push(nearest);
        hitSet.add(nearest);
        current = nearest;
      } else {
        break;
      }
    }
    return targets;
  }

  /**
   * Heal the player by a flat amount.
   * @param {number} amount - HP to restore
   */
  heal(amount) {
    this.hp = Math.min(this.maxHp, this.hp + amount);
  }

  /**
   * Render the player character with energy shields, rotating rings, and engine glow.
   * @param {CanvasRenderingContext2D} ctx - Canvas context
   * @param {number} time - Current game time for animations
   */
  render(ctx, time) {
    // Skip rendering if invincible and blinking
    if (this.invincibilityTimer > 0 && Math.floor(this.invincibilityTimer / 100) % 2 === 0) {
      return;
    }

    const x = this.x;
    const y = this.y;
    const s = this.size;
    const pulse = 1 + Math.sin(time * 0.005) * 0.08;

    // --- LAYER 1: Outer energy field (large, faint) ---
    ctx.save();
    ctx.globalAlpha = 0.15 + Math.sin(time * 0.003) * 0.05;
    const eFieldGrad = ctx.createRadialGradient(x, y, s * 1.2, x, y, s * 3.5);
    eFieldGrad.addColorStop(0, 'rgba(0,229,255,0)');
    eFieldGrad.addColorStop(0.5, 'rgba(0,229,255,0.15)');
    eFieldGrad.addColorStop(1, 'rgba(0,229,255,0)');
    ctx.fillStyle = eFieldGrad;
    ctx.beginPath();
    ctx.arc(x, y, s * 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // --- LAYER 2: Rotating ring (outer) ---
    ctx.save();
    ctx.globalAlpha = 0.25;
    const rotAngle1 = time * 0.002;
    ctx.strokeStyle = CONFIG.COLORS.CYAN;
    ctx.lineWidth = 1;
    ctx.shadowColor = CONFIG.COLORS.CYAN;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.ellipse(x, y, s * 2.2, s * 1.1, rotAngle1, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    // --- LAYER 3: Rotating ring (inner) ---
    ctx.save();
    ctx.globalAlpha = 0.35;
    const rotAngle2 = time * 0.003 + Math.PI / 4;
    ctx.strokeStyle = CONFIG.COLORS.CYAN;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = CONFIG.COLORS.CYAN;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.ellipse(x, y, s * 1.7, s * 0.8, rotAngle2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    // --- LAYER 4: Engine glow (behind, direction-dependent) ---
    if (Math.abs(this.vx) + Math.abs(this.vy) > 0.3) {
      const moveAngle = Math.atan2(this.vy, this.vx);
      const engineX = x - Math.cos(moveAngle) * s * 1.2;
      const engineY = y - Math.sin(moveAngle) * s * 1.2;
      const speedNorm = Math.min(1, (Math.abs(this.vx) + Math.abs(this.vy)) / this.getSpeed());

      ctx.save();
      const engineGrad = ctx.createRadialGradient(engineX, engineY, 0, engineX, engineY, s * 1.5 * speedNorm);
      engineGrad.addColorStop(0, 'rgba(0,229,255,0.7)');
      engineGrad.addColorStop(0.5, 'rgba(0,150,255,0.3)');
      engineGrad.addColorStop(1, 'rgba(0,100,255,0)');
      ctx.fillStyle = engineGrad;
      ctx.beginPath();
      ctx.arc(engineX, engineY, s * 1.5 * speedNorm, 0, Math.PI * 2);
      ctx.fill();

      // Engine streaks
      for (let i = 0; i < 3; i++) {
        const streakX = engineX + rand(-3, 3);
        const streakY = engineY + rand(-3, 3);
        ctx.strokeStyle = `rgba(0,229,255,${0.4 * speedNorm})`;
        ctx.lineWidth = rand(1, 2);
        ctx.beginPath();
        ctx.moveTo(streakX, streakY);
        ctx.lineTo(streakX - Math.cos(moveAngle) * s * 2, streakY - Math.sin(moveAngle) * s * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    // --- LAYER 5: Outer glow ring ---
    ctx.save();
    ctx.shadowColor = CONFIG.COLORS.PLAYER_GLOW;
    ctx.shadowBlur = 20;
    ctx.strokeStyle = hexToRgba(CONFIG.COLORS.CYAN, 0.4);
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(x, y, s * pulse * 1.7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    // --- LAYER 6: Inner glow ring ---
    ctx.save();
    ctx.shadowColor = CONFIG.COLORS.CYAN;
    ctx.shadowBlur = 14;
    ctx.strokeStyle = hexToRgba(CONFIG.COLORS.CYAN, 0.7);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, s * pulse * 1.15, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // --- LAYER 7: Main body (radial gradient sphere) ---
    const bodyGrad = ctx.createRadialGradient(x - s * 0.2, y - s * 0.2, 0, x, y, s * pulse);
    bodyGrad.addColorStop(0, '#ffffff');
    bodyGrad.addColorStop(0.2, '#ccf0ff');
    bodyGrad.addColorStop(0.5, CONFIG.COLORS.CYAN);
    bodyGrad.addColorStop(0.85, '#005566');
    bodyGrad.addColorStop(1, 'rgba(0,50,80,0.1)');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(x, y, s * pulse, 0, Math.PI * 2);
    ctx.fill();

    // --- LAYER 8: Specular highlight ---
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(x - s * 0.25, y - s * 0.3, s * 0.3, 0, Math.PI * 2);
    ctx.fill();

    // --- LAYER 9: Crosshair / reticle lines ---
    ctx.save();
    ctx.strokeStyle = hexToRgba(CONFIG.COLORS.CYAN, 0.25);
    ctx.lineWidth = 1;
    const ch = s * 2.8;
    ctx.beginPath();
    ctx.moveTo(x - ch, y);
    ctx.lineTo(x - s * 1.6, y);
    ctx.moveTo(x + s * 1.6, y);
    ctx.lineTo(x + ch, y);
    ctx.moveTo(x, y - ch);
    ctx.lineTo(x, y - s * 1.6);
    ctx.moveTo(x, y + s * 1.6);
    ctx.lineTo(x, y + ch);
    ctx.stroke();

    // Corner ticks
    const tickLen = s * 0.7;
    const tickGap = s * 1.8;
    for (let i = 0; i < 4; i++) {
      const a = (Math.PI / 4) + (Math.PI / 2) * i;
      const cx = x + Math.cos(a) * tickGap;
      const cy = y + Math.sin(a) * tickGap;
      ctx.beginPath();
      ctx.moveTo(cx - Math.cos(a) * tickLen, cy - Math.sin(a) * tickLen);
      ctx.lineTo(cx + Math.cos(a + Math.PI / 2) * tickLen * 0.5, cy + Math.sin(a + Math.PI / 2) * tickLen * 0.5);
      ctx.moveTo(cx - Math.cos(a) * tickLen, cy - Math.sin(a) * tickLen);
      ctx.lineTo(cx - Math.cos(a + Math.PI / 2) * tickLen * 0.5, cy - Math.sin(a + Math.PI / 2) * tickLen * 0.5);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ====================================================================
//  SECTION 11: ENEMY TYPES & CLASSES
// ====================================================================

/**
 * Enemy type definitions - templates for spawning different enemy varieties.
 */
const ENEMY_TYPES = {
  slime: {
    name: 'Slime',
    size: 10,
    speed: 1.2,
    hp: 15,
    damage: 8,
    xpDrop: 1,
    color: '#44ff44',
    glowColor: 'rgba(68,255,68,0.4)',
    behavior: 'chase',
  },
  fastSlime: {
    name: 'Swift Slime',
    size: 8,
    speed: 2.8,
    hp: 8,
    damage: 10,
    xpDrop: 1,
    color: '#88ff44',
    glowColor: 'rgba(136,255,68,0.4)',
    behavior: 'chase',
  },
  bat: {
    name: 'Void Bat',
    size: 7,
    speed: 3.5,
    hp: 5,
    damage: 6,
    xpDrop: 2,
    color: '#ff44ff',
    glowColor: 'rgba(255,68,255,0.5)',
    behavior: 'zigzag',
    zigzagFreq: 0.05,
    zigzagAmp: 2,
  },
  skeleton: {
    name: 'Skeleton',
    size: 11,
    speed: 1.6,
    hp: 30,
    damage: 12,
    xpDrop: 3,
    color: '#ddddcc',
    glowColor: 'rgba(221,221,204,0.3)',
    behavior: 'chase',
  },
  golem: {
    name: 'Void Golem',
    size: 18,
    speed: 0.8,
    hp: 100,
    damage: 20,
    xpDrop: 8,
    color: '#884400',
    glowColor: 'rgba(255,100,0,0.4)',
    behavior: 'chase',
  },
  wraith: {
    name: 'Wraith',
    size: 12,
    speed: 2.0,
    hp: 25,
    damage: 15,
    xpDrop: 4,
    color: '#6644aa',
    glowColor: 'rgba(102,68,170,0.5)',
    behavior: 'phase',
  },
  boss: {
    name: 'VOID LORD',
    size: 30,
    speed: 0.6,
    hp: 500,
    damage: 30,
    xpDrop: 50,
    color: '#ff0000',
    glowColor: 'rgba(255,0,0,0.7)',
    behavior: 'boss',
  },
};

/**
 * Enemy - An enemy entity that chases and damages the player.
 * Supports multiple behavior types: chase, zigzag, phase, boss.
 */
class Enemy extends Entity {
  /**
   * @param {string} typeKey - Key into ENEMY_TYPES
   * @param {number} x - Spawn x
   * @param {number} y - Spawn y
   * @param {number} waveMultiplier - Difficulty scaling from current wave
   */
  constructor(typeKey, x, y, waveMultiplier = 1) {
    const type = ENEMY_TYPES[typeKey];
    super(x, y, type.size);

    /** @type {string} Enemy type identifier */
    this.typeKey = typeKey;
    /** @type {string} Display name */
    this.name = type.name;
    /** @type {number} Movement speed */
    this.speed = type.speed * (1 + (waveMultiplier - 1) * 0.15);
    /** @type {number} Hit points (scaled by wave) */
    this.maxHp = Math.round(type.hp * (1 + (waveMultiplier - 1) * 0.3));
    /** @type {number} Current HP */
    this.hp = this.maxHp;
    /** @type {number} Contact damage to player */
    this.damage = Math.round(type.damage * (1 + (waveMultiplier - 1) * 0.1));
    /** @type {number} XP gems dropped on death */
    this.xpDrop = type.xpDrop;
    /** @type {string} Primary color */
    this.color = type.color;
    /** @type {string} Glow color for rendering */
    this.glowColor = type.glowColor;
    /** @type {string} AI behavior pattern */
    this.behavior = type.behavior;

    // Zigzag behavior params
    /** @type {number} Zigzag oscillation frequency */
    this.zigzagFreq = type.zigzagFreq || 0;
    /** @type {number} Zigzag amplitude */
    this.zigzagAmp = type.zigzagAmp || 0;
    /** @type {number} Zigzag phase offset */
    this.zigzagPhase = Math.random() * Math.PI * 2;

    // Slow/status effects
    /** @type {number} Slow factor (1 = normal, 0.5 = half speed) */
    this.slowFactor = 1;
    /** @type {number} Slow effect remaining duration */
    this.slowTimer = 0;
    /** @type {number} Stun remaining duration */
    this.stunTimer = 0;

    // Rendering animation
    /** @type {number} Animation time offset */
    this.animOffset = Math.random() * Math.PI * 2;
    /** @type {number} Hit flash timer */
    this.flashTimer = 0;

    // Damage cooldown for holy ring (prevents insta-gib)
    /** @type {number} Timer for ring damage immunity */
    this.ringDamageCooldown = 0;

    // --- Boss-specific state ---
    /** @type {number} Boss attack cooldown */
    this.bossAttackTimer = 0;
    /** @type {number} Boss current phase (0-2 based on HP) */
    this.bossPhase = 0;
    /** @type {number} Boss sub-attack timer */
    this.bossSubTimer = 0;
    /** @type {string} Current boss attack type */
    this.bossAttackType = 'idle';
    /** @type {number} Telegraph/windup timer */
    this.telegraphTimer = 0;
    /** @type {number} Telegraph circle radius */
    this.telegraphRadius = 0;
    /** @type {{x:number,y:number}} Telegraph position */
    this.telegraphPos = null;
    /** @type {{x:number,y:number}} Boss charge target */
    this.chargeTarget = null;
    /** @type {number} Boss charge speed multiplier */
    this.chargeSpeed = 0;
  }

  /**
   * Apply a slow effect to this enemy.
   * @param {number} factor - Slow factor (0-1 where 0.3 = 70% slow)
   * @param {number} duration - Duration in ms
   */
  applySlow(factor, duration) {
    this.slowFactor = Math.min(this.slowFactor, factor);
    this.slowTimer = Math.max(this.slowTimer, duration);
  }

  /**
   * Apply a stun effect.
   * @param {number} duration - Duration in ms
   */
  applyStun(duration) {
    this.stunTimer = Math.max(this.stunTimer, duration);
  }

  /**
   * Take damage from a weapon.
   * @param {number} amount - Damage amount
   * @param {boolean} isCrit - Whether it's a critical hit
   * @returns {boolean} True if enemy died
   */
  takeDamage(amount, isCrit = false) {
    this.hp -= amount;
    this.flashTimer = 80;
    if (this.hp <= 0) {
      this.hp = 0;
      this.alive = false;
      return true;
    }
    return false;
  }

  /**
   * Full boss AI: phases, attack patterns, and telegraphing.
   * @private
   * @param {number} dt - Delta time
   * @param {Player} player - Player reference
   * @param {number} effectiveSpeed - Current effective speed
   */
  _updateBossAI(dt, player, effectiveSpeed) {
    // Determine phase based on HP
    const hpRatio = this.hp / this.maxHp;
    if (hpRatio > 0.6) this.bossPhase = 0;
    else if (hpRatio > 0.3) this.bossPhase = 1;
    else this.bossPhase = 2;

    // Attack cooldown
    this.bossAttackTimer -= dt;
    this.bossSubTimer -= dt;

    // Telegraph timer
    if (this.telegraphTimer > 0) {
      this.telegraphTimer -= dt;
    }

    const distToPlayer = distance(this.x, this.y, player.x, player.y);
    const angleToPlayer = angleTo(this.x, this.y, player.x, player.y);

    // If charging, continue charge
    if (this.bossAttackType === 'charge' && this.chargeTarget) {
      const chargeAngle = angleTo(this.x, this.y, this.chargeTarget.x, this.chargeTarget.y);
      this.vx = Math.cos(chargeAngle) * this.chargeSpeed;
      this.vy = Math.sin(chargeAngle) * this.chargeSpeed;
      this.bossSubTimer -= dt;
      if (this.bossSubTimer <= 0 || distToPlayer < this.size + player.size + 5) {
        this.bossAttackType = 'idle';
        this.chargeTarget = null;
        this.chargeSpeed = 0;
      }
      return;
    }

    // Pick new attack if idle and cooldown ready
    if (this.bossAttackType === 'idle' && this.bossAttackTimer <= 0) {
      this._pickBossAttack(player, distToPlayer);
    }

    // Default: slow approach while between attacks
    if (this.bossAttackType === 'idle') {
      this.vx = Math.cos(angleToPlayer) * effectiveSpeed * 0.4;
      this.vy = Math.sin(angleToPlayer) * effectiveSpeed * 0.4;
    }

    // Update telegraph position to follow player for aimed attacks
    if (this.telegraphTimer > 0 && this.telegraphPos && this.bossAttackType === 'aimedBarrage') {
      this.telegraphPos = { x: player.x, y: player.y };
    }
  }

  /**
   * Pick and initiate a boss attack based on phase.
   * @private
   */
  _pickBossAttack(player, distToPlayer) {
    const attacks = ['charge', 'circleBarrage'];
    if (this.bossPhase >= 1) attacks.push('aimedBarrage', 'homingOrbs');
    if (this.bossPhase >= 2) attacks.push('laserSweep', 'spawnMinions');
    if (distToPlayer > 150) attacks.push('charge', 'leap');

    const attack = pick(attacks);
    this.bossAttackType = attack;

    switch (attack) {
      case 'charge':
        this._startCharge(player, distToPlayer);
        break;
      case 'circleBarrage':
        this._startCircleBarrage();
        break;
      case 'aimedBarrage':
        this._startAimedBarrage(player);
        break;
      case 'homingOrbs':
        this._startHomingOrbs();
        break;
      case 'laserSweep':
        this._startLaserSweep(player);
        break;
      case 'spawnMinions':
        this._startSpawnMinions();
        break;
      case 'leap':
        this._startLeap(player);
        break;
    }
  }

  /** @private Charge attack - rush toward player after telegraph */
  _startCharge(player, distToPlayer) {
    this.telegraphTimer = 600;
    this.telegraphPos = { x: this.x, y: this.y };
    this.telegraphRadius = this.size * 2;
    this.bossAttackTimer = 2000 + this.bossPhase * 500;
    this.bossSubTimer = 800;
    // Schedule actual charge after telegraph
    const bossRef = this;
    setTimeout(() => {
      if (bossRef.alive && bossRef.bossAttackType === 'charge') {
        bossRef.chargeTarget = { x: player.x, y: player.y };
        bossRef.chargeSpeed = bossRef.speed * (5 + bossRef.bossPhase * 1.5);
        bossRef.telegraphTimer = 0;
        bossRef.telegraphPos = null;
      }
    }, 600);
  }

  /** @private Circle barrage - fire bullets in all directions */
  _startCircleBarrage() {
    this.telegraphTimer = 500;
    this.telegraphPos = { x: this.x, y: this.y };
    this.telegraphRadius = this.size * 1.5;
    this.bossAttackTimer = 2500 - this.bossPhase * 300;
    this._queuedAttack = { type: 'circleBarrage', time: 500 };
  }

  /** @private Aimed barrage - fire spread of bullets at player */
  _startAimedBarrage(player) {
    this.telegraphTimer = 700;
    this.telegraphPos = { x: player.x, y: player.y };
    this.telegraphRadius = 40;
    this.bossAttackTimer = 2200 - this.bossPhase * 200;
    this._queuedAttack = { type: 'aimedBarrage', time: 700, target: { x: player.x, y: player.y } };
  }

  /** @private Homing orbs - slow tracking projectiles */
  _startHomingOrbs() {
    this.telegraphTimer = 400;
    this.telegraphPos = { x: this.x, y: this.y };
    this.telegraphRadius = this.size * 2;
    this.bossAttackTimer = 3000 - this.bossPhase * 400;
    this._queuedAttack = { type: 'homingOrbs', time: 400 };
  }

  /** @private Laser sweep - rotating beam */
  _startLaserSweep(player) {
    this.telegraphTimer = 800;
    this.telegraphPos = { x: this.x, y: this.y };
    this.telegraphRadius = 250;
    this.bossAttackTimer = 3500;
    this._queuedAttack = { type: 'laserSweep', time: 800, angle: angleTo(this.x, this.y, player.x, player.y) };
  }

  /** @private Spawn minion enemies */
  _startSpawnMinions() {
    this.telegraphTimer = 600;
    this.telegraphPos = { x: this.x, y: this.y };
    this.telegraphRadius = this.size * 2.5;
    this.bossAttackTimer = 4000;
    this._queuedAttack = { type: 'spawnMinions', time: 600 };
  }

  /** @private Leap attack - jump toward player */
  _startLeap(player) {
    this.telegraphTimer = 500;
    this.telegraphPos = { x: player.x, y: player.y };
    this.telegraphRadius = 60;
    this.bossAttackTimer = 2500;
    this._queuedAttack = { type: 'leap', time: 500, target: { x: player.x, y: player.y } };
  }

  /**
   * Executes a queued boss attack (called from Game update).
   * @returns {Object|null} Attack descriptor for Game to process
   */
  executeQueuedAttack() {
    if (!this._queuedAttack) return null;
    const atk = this._queuedAttack;
    this._queuedAttack = null;
    this.telegraphTimer = 0;
    this.telegraphPos = null;
    return { ...atk, bossX: this.x, bossY: this.y, bossSize: this.size, damage: this.damage };
  }

  /**
   * Update enemy AI and state.
   * @param {number} dt - Delta time
   * @param {Player} player - Reference to player for targeting
   */
  update(dt, player) {
    // Update status effects
    if (this.slowTimer > 0) {
      this.slowTimer -= dt;
      if (this.slowTimer <= 0) this.slowFactor = 1;
    }
    if (this.stunTimer > 0) {
      this.stunTimer -= dt;
    }
    if (this.flashTimer > 0) {
      this.flashTimer -= dt;
    }
    if (this.ringDamageCooldown > 0) {
      this.ringDamageCooldown -= dt;
    }

    // Don't move if stunned or frozen globally
    if (this.stunTimer > 0) return;
    if (window.game && window.game._freezeTimer > 0) return;

    // Movement AI based on behavior type
    const effectiveSpeed = this.speed * this.slowFactor;
    const angle = angleTo(this.x, this.y, player.x, player.y);

    switch (this.behavior) {
      case 'chase':
        // Direct chase toward player
        this.vx = Math.cos(angle) * effectiveSpeed;
        this.vy = Math.sin(angle) * effectiveSpeed;
        break;

      case 'zigzag':
        // Chase with sinusoidal oscillation perpendicular to movement
        this.zigzagPhase += this.zigzagFreq * (dt / 16);
        const perpAngle = angle + Math.PI / 2;
        const chaseVx = Math.cos(angle) * effectiveSpeed;
        const chaseVy = Math.sin(angle) * effectiveSpeed;
        const zigX = Math.cos(perpAngle) * Math.sin(this.zigzagPhase) * this.zigzagAmp;
        const zigY = Math.sin(perpAngle) * Math.sin(this.zigzagPhase) * this.zigzagAmp;
        this.vx = chaseVx + zigX;
        this.vy = chaseVy + zigY;
        break;

      case 'phase':
        // Moves toward player, occasionally teleports forward
        this.vx = Math.cos(angle) * effectiveSpeed;
        this.vy = Math.sin(angle) * effectiveSpeed;
        // Phase teleport: rare forward blink
        if (Math.random() < 0.002) {
          const dist = distance(this.x, this.y, player.x, player.y);
          if (dist > 50) {
            this.x += Math.cos(angle) * 30;
            this.y += Math.sin(angle) * 30;
          }
        }
        break;

      case 'boss':
        this._updateBossAI(dt, player, effectiveSpeed);
        break;
    }

    this.x += this.vx * (dt / 16);
    this.y += this.vy * (dt / 16);

    // Keep in bounds with some margin
    const margin = this.size;
    if (this.x < margin) { this.x = margin; this.vx *= -0.5; }
    if (this.x > CONFIG.WIDTH - margin) { this.x = CONFIG.WIDTH - margin; this.vx *= -0.5; }
    if (this.y < margin) { this.y = margin; this.vy *= -0.5; }
    if (this.y > CONFIG.HEIGHT - margin) { this.y = CONFIG.HEIGHT - margin; this.vy *= -0.5; }
  }

  /**
   * Render the enemy with glow effects and animations.
   * @param {CanvasRenderingContext2D} ctx - Canvas context
   * @param {number} time - Game time for animation
   */
  render(ctx, time) {
    const s = this.size;
    const pulse = 1 + Math.sin(time * 0.003 + this.animOffset) * 0.08;
    const flashColor = this.flashTimer > 0 ? '#ffffff' : (this.eliteColor || this.color);

    ctx.save();

    // Shared glow
    ctx.shadowColor = flashColor;
    ctx.shadowBlur = s * (this.behavior === 'boss' ? 3 : 1.8);

    // --- Elite aura ---
    if (this.isElite) {
      ctx.globalAlpha = 0.2 + Math.sin(time * 0.006) * 0.1;
      ctx.fillStyle = this.eliteColor || '#ff8800';
      ctx.beginPath();
      ctx.arc(this.x, this.y, s * 1.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = this.eliteColor || '#ff8800';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    // --- Spectral phase effect ---
    if (this._phasing) {
      ctx.globalAlpha = 0.35;
    }

    // Body shape varies by type (detailed artwork per enemy)
    if (this.behavior === 'boss') {
      this._renderBoss(ctx, s, pulse, flashColor, time);
    } else if (this.behavior === 'phase') {
      this._renderWraith(ctx, s, pulse, flashColor, time);
    } else if (this.typeKey === 'bat') {
      this._renderBat(ctx, s, pulse, flashColor, time);
    } else if (this.typeKey === 'golem') {
      this._renderGolem(ctx, s, pulse, flashColor, time);
    } else if (this.typeKey === 'skeleton') {
      this._renderSkeleton(ctx, s, pulse, flashColor, time);
    } else {
      this._renderSlime(ctx, s, pulse, flashColor, time);
    }

    // HP bar above head
    if (this.hp < this.maxHp) {
      const barW = s * 2.2;
      const barH = 3;
      const barX = this.x - barW / 2;
      const barY = this.y - s * 1.8;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      roundRect(ctx, barX - 1, barY - 1, barW + 2, barH + 2, 2);
      ctx.fill();
      const hpGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      hpGrad.addColorStop(0, '#ff3355');
      hpGrad.addColorStop(1, '#ff6688');
      ctx.fillStyle = hpGrad;
      ctx.fillRect(barX, barY, barW * (this.hp / this.maxHp), barH);

      // Elite name tag
      if (this.isElite) {
        ctx.fillStyle = this.eliteColor || '#ff8800';
        ctx.font = "bold 8px 'Rajdhani', sans-serif";
        ctx.textAlign = 'center';
        ctx.fillText(this.name, this.x, barY - 3);
        ctx.textAlign = 'left';
      }
    }

    ctx.restore();
  }

  /** @private Render boss - massive void lord with rotating rings and eyes */
  _renderBoss(ctx, s, pulse, flashColor, time) {
    // Dark aura ring
    ctx.strokeStyle = 'rgba(255,0,0,0.2)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s * 2.2, 0, Math.PI * 2);
    ctx.stroke();

    // Rotating rings
    for (let r = 0; r < 2; r++) {
      const rot = time * (0.001 + r * 0.0005) + r * Math.PI / 2;
      ctx.strokeStyle = hexToRgba('#ff4400', 0.4 - r * 0.15);
      ctx.lineWidth = 2 - r * 0.5;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, s * 1.6 + r * 0.3, s * 0.8 + r * 0.15, rot, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Spiky body (7 spikes for asymmetry)
    const bodyGrad = ctx.createRadialGradient(this.x, this.y, s * 0.3, this.x, this.y, s * 1.5);
    bodyGrad.addColorStop(0, '#ff4444');
    bodyGrad.addColorStop(0.4, '#cc0000');
    bodyGrad.addColorStop(0.8, '#660000');
    bodyGrad.addColorStop(1, 'rgba(50,0,0,0)');
    ctx.fillStyle = bodyGrad;

    ctx.beginPath();
    const spikes = 7;
    const rot = time * 0.0015;
    for (let i = 0; i < spikes * 2; i++) {
      const a = (Math.PI * 2 / (spikes * 2)) * i + rot;
      const r = i % 2 === 0 ? s * pulse * 1.4 : s * pulse * 0.85;
      const px = this.x + Math.cos(a) * r;
      const py = this.y + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = hexToRgba('#ff6666', 0.8);
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Central eye
    const eyeGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 0.35);
    eyeGrad.addColorStop(0, '#ffffff');
    eyeGrad.addColorStop(0.5, '#ffdddd');
    eyeGrad.addColorStop(1, '#ff0000');
    ctx.fillStyle = eyeGrad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Pupil (follows a direction)
    const pupilAngle = time * 0.003;
    const ppx = this.x + Math.cos(pupilAngle) * s * 0.08;
    const ppy = this.y + Math.sin(pupilAngle) * s * 0.08;
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.arc(ppx, ppy, s * 0.12, 0, Math.PI * 2);
    ctx.fill();

    // Mini eyes around
    for (let i = 0; i < 5; i++) {
      const ea = (Math.PI * 2 / 5) * i + rot * 0.5;
      const ex = this.x + Math.cos(ea) * s * 0.9;
      const ey = this.y + Math.sin(ea) * s * 0.9;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(ex, ey, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(ex, ey, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /** @private Render wraith - ghostly, ethereal, with trailing wisps */
  _renderWraith(ctx, s, pulse, flashColor, time) {
    // Wisps trailing behind
    for (let w = 0; w < 3; w++) {
      const wAngle = -time * 0.001 + w * 2.1;
      const wDist = s * (0.8 + w * 0.5);
      const wx = this.x + Math.cos(wAngle) * wDist;
      const wy = this.y + Math.sin(wAngle) * wDist;
      ctx.fillStyle = `rgba(102,68,170,${0.15 - w * 0.04})`;
      ctx.beginPath();
      ctx.arc(wx, wy, s * (0.5 - w * 0.1), 0, Math.PI * 2);
      ctx.fill();
    }

    // Main body - ethereal cloud
    const bodyGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 1.4);
    bodyGrad.addColorStop(0, 'rgba(180,150,255,0.7)');
    bodyGrad.addColorStop(0.4, 'rgba(102,68,170,0.5)');
    bodyGrad.addColorStop(0.8, 'rgba(50,30,100,0.2)');
    bodyGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    const clouds = 6;
    for (let i = 0; i < clouds; i++) {
      const a = (Math.PI * 2 / clouds) * i + time * 0.0015;
      const r = s * pulse * 0.8;
      ctx.arc(this.x + Math.cos(a) * r * 0.65, this.y + Math.sin(a) * r * 0.65, s * 0.55, 0, Math.PI * 2);
    }
    ctx.fill();

    // Glowing eyes (menacing)
    for (let e = -1; e <= 1; e += 2) {
      const eyeGrad = ctx.createRadialGradient(
        this.x + e * s * 0.25, this.y - s * 0.15,
        0, this.x + e * s * 0.25, this.y - s * 0.15, s * 0.2
      );
      eyeGrad.addColorStop(0, '#ffffff');
      eyeGrad.addColorStop(0.5, '#ccbbff');
      eyeGrad.addColorStop(1, 'rgba(102,68,170,0)');
      ctx.fillStyle = eyeGrad;
      ctx.beginPath();
      ctx.ellipse(this.x + e * s * 0.25, this.y - s * 0.15, s * 0.2, s * 0.12, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /** @private Render bat - fast wing-flapping creature with trailing motion blur */
  _renderBat(ctx, s, pulse, flashColor, time) {
    const wingFlap = Math.sin(time * 0.012 + this.animOffset);
    const flapPower = 0.5 + wingFlap * 0.3;

    // Motion blur / trail
    if (Math.abs(this.vx) + Math.abs(this.vy) > 1) {
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = flashColor;
      ctx.beginPath();
      ctx.arc(this.x - this.vx * 0.5, this.y - this.vy * 0.5, s * 0.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Wings (animated)
    const wingGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 1.2);
    wingGrad.addColorStop(0, flashColor);
    wingGrad.addColorStop(0.6, hexToRgba(flashColor, 0.6));
    wingGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = wingGrad;

    // Left wing
    ctx.beginPath();
    ctx.ellipse(this.x - s * 0.7, this.y, s * 0.5, s * 0.35 * flapPower, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = hexToRgba('#ffffff', 0.2);
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Right wing
    ctx.beginPath();
    ctx.ellipse(this.x + s * 0.7, this.y, s * 0.5, s * 0.35 * (1 - flapPower * 0.7), 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Body
    const bodyGrad = ctx.createRadialGradient(this.x, this.y - s * 0.1, 0, this.x, this.y, s * 0.5);
    bodyGrad.addColorStop(0, '#ffffff');
    bodyGrad.addColorStop(0.5, flashColor);
    bodyGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(this.x, this.y, s * 0.45, s * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Glowing red eyes
    for (let e = -1; e <= 1; e += 2) {
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(this.x + e * s * 0.13, this.y - s * 0.12, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(this.x + e * s * 0.13, this.y - s * 0.12, s * 0.04, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /** @private Render golem - heavy armored tank with cracks and glowing core */
  _renderGolem(ctx, s, pulse, flashColor, time) {
    // Outer shield
    ctx.strokeStyle = 'rgba(255,100,0,0.3)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s * 1.4, 0, Math.PI * 2);
    ctx.stroke();

    // Hexagonal shell
    ctx.beginPath();
    const corners = 6;
    for (let i = 0; i < corners; i++) {
      const a = (Math.PI * 2 / corners) * i + time * 0.0005;
      const r = s * pulse;
      const px = this.x + Math.cos(a) * r;
      const py = this.y + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();

    const shellGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 1.2);
    shellGrad.addColorStop(0, '#ff9966');
    shellGrad.addColorStop(0.5, '#884400');
    shellGrad.addColorStop(1, '#331100');
    ctx.fillStyle = shellGrad;
    ctx.fill();
    ctx.strokeStyle = '#ff6600';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Cracks / surface detail
    ctx.strokeStyle = 'rgba(255,150,50,0.4)';
    ctx.lineWidth = 0.8;
    for (let c = 0; c < 3; c++) {
      const ca = (Math.PI * 2 / 3) * c + this.animOffset;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + Math.cos(ca) * s * 0.75, this.y + Math.sin(ca) * s * 0.75);
      ctx.stroke();
    }

    // Glowing core (center)
    const coreGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 0.3);
    coreGrad.addColorStop(0, '#ffffff');
    coreGrad.addColorStop(0.3, '#ffaa44');
    coreGrad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s * 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Eyes (deep set)
    for (let e = -1; e <= 1; e += 2) {
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(this.x + e * s * 0.3, this.y - s * 0.2, s * 0.14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(this.x + e * s * 0.3, this.y - s * 0.2, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /** @private Render skeleton - bony, angular, with rattling effect */
  _renderSkeleton(ctx, s, pulse, flashColor, time) {
    const shake = Math.sin(time * 0.02 + this.animOffset) * 1.5;

    // Bone structure - cross shape
    ctx.fillStyle = '#ddddcc';
    ctx.beginPath();
    // Skull (top circle)
    ctx.arc(this.x, this.y - s * 0.3, s * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // Jaw
    ctx.fillStyle = '#ccccbb';
    ctx.fillRect(this.x - s * 0.3, this.y - s * 0.05, s * 0.6, s * 0.25);
    // Spine
    ctx.fillStyle = '#ddddcc';
    ctx.fillRect(this.x - s * 0.15, this.y + s * 0.1, s * 0.3, s * 0.5);
    // Arms
    ctx.fillRect(this.x - s * 0.8 + shake, this.y - s * 0.15, s * 0.65, s * 0.15);
    ctx.fillRect(this.x + s * 0.15 - shake, this.y - s * 0.15, s * 0.65, s * 0.15);

    // Ribs
    ctx.strokeStyle = '#ccccbb';
    ctx.lineWidth = 1.5;
    for (let r = 0; r < 3; r++) {
      const ry = this.y - s * 0.1 + r * s * 0.15;
      ctx.beginPath();
      ctx.arc(this.x, ry, s * 0.25, 0, Math.PI);
      ctx.stroke();
    }

    // Skull details
    ctx.fillStyle = '#111111';
    // Eyes
    ctx.beginPath();
    ctx.arc(this.x - s * 0.15, this.y - s * 0.35, s * 0.1, 0, Math.PI * 2);
    ctx.arc(this.x + s * 0.15, this.y - s * 0.35, s * 0.1, 0, Math.PI * 2);
    ctx.fill();
    // Nose
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - s * 0.25);
    ctx.lineTo(this.x - s * 0.06, this.y - s * 0.15);
    ctx.lineTo(this.x + s * 0.06, this.y - s * 0.15);
    ctx.closePath();
    ctx.fill();

    // Glow behind skull
    ctx.fillStyle = 'rgba(221,221,204,0.3)';
    ctx.beginPath();
    ctx.arc(this.x, this.y - s * 0.25, s * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }

  /** @private Render slime - bouncy blob with gooey details */
  _renderSlime(ctx, s, pulse, flashColor, time) {
    const bounce = Math.sin(time * 0.004 + this.animOffset) * 0.1;
    const squish = 1 + bounce;

    // Puddle shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(this.x, this.y + s * 0.3, s * 0.7, s * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body (squishy blob)
    const bodyGrad = ctx.createRadialGradient(this.x, this.y - s * 0.15, 0, this.x, this.y, s);
    bodyGrad.addColorStop(0, '#aaffaa');
    bodyGrad.addColorStop(0.3, flashColor);
    bodyGrad.addColorStop(0.8, hexToRgba(flashColor, 0.6));
    bodyGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(this.x, this.y, s * squish * 1.1, s * (2 - squish) * 1.05, 0, 0, Math.PI * 2);
    ctx.fill();

    // Specular highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(this.x - s * 0.2, this.y - s * 0.35, s * 0.25, 0, Math.PI * 2);
    ctx.fill();

    // Eyes (derpy - different sizes for personality)
    const eyeY = this.y - s * 0.1;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(this.x - s * 0.25, eyeY, s * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x + s * 0.25, eyeY, s * 0.22, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = '#222222';
    ctx.beginPath();
    ctx.arc(this.x - s * 0.25, eyeY, s * 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x + s * 0.25, eyeY, s * 0.09, 0, Math.PI * 2);
    ctx.fill();

    // Pupil highlights
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(this.x - s * 0.29, eyeY - s * 0.05, s * 0.04, 0, Math.PI * 2);
    ctx.arc(this.x + s * 0.21, eyeY - s * 0.04, s * 0.035, 0, Math.PI * 2);
    ctx.fill();
  }
}

/**
 * XPGem - An experience gem dropped by enemies.
 * Floats toward the player when within magnet range.
 */
class XPGem extends Entity {
  /**
   * @param {number} x - Spawn x
   * @param {number} y - Spawn y
   * @param {number} value - XP value
   */
  constructor(x, y, value) {
    super(x + rand(-5, 5), y + rand(-5, 5), 4);
    /** @type {number} XP value when collected */
    this.value = value;
    /** @type {number} Lifetime before disappearing */
    this.lifetime = CONFIG.XP_GEM_LIFETIME;
    /** @type {number} Age in ms */
    this.age = 0;
    /** @type {boolean} Whether magnet is pulling this gem */
    this.magnetized = false;
  }

  /**
   * Update gem - age, magnet attraction to player.
   * @param {number} dt - Delta time
   * @param {Player} player - Player reference
   */
  update(dt, player) {
    this.age += dt;
    if (this.age > this.lifetime) {
      // Start fading - shrink
      this.size = Math.max(0.5, this.size - 0.02 * (dt / 16));
      if (this.size <= 0.5) this.alive = false;
      return;
    }

    // Magnet effect
    const dist = distance(this.x, this.y, player.x, player.y);
    const magnetRange = player.getMagnetRange();

    if (dist < magnetRange) {
      this.magnetized = true;
      const angle = angleTo(this.x, this.y, player.x, player.y);
      const speed = lerp(1, 8, 1 - dist / magnetRange);
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
    } else {
      this.magnetized = false;
      this.vx *= 0.95;
      this.vy *= 0.95;
    }

    this.x += this.vx * (dt / 16);
    this.y += this.vy * (dt / 16);
  }

  /**
   * Render gem with glow.
   * @param {CanvasRenderingContext2D} ctx - Canvas context
   * @param {number} time - Game time for animation
   */
  render(ctx, time) {
    const s = this.size;
    const pulse = 1 + Math.sin(time * 0.008 + this.age * 0.01) * 0.2;
    const alpha = this.age > this.lifetime * 0.8
      ? 1 - (this.age - this.lifetime * 0.8) / (this.lifetime * 0.2)
      : 1;
    const rot = time * 0.003 + this.age * 0.005;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Outer glow
    const outerGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 2.5);
    outerGrad.addColorStop(0, 'rgba(255,221,68,0.3)');
    outerGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = outerGrad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Main diamond (rotating slightly)
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(rot);
    ctx.shadowColor = CONFIG.COLORS.XP_GEM;
    ctx.shadowBlur = 8;

    // Outer diamond
    ctx.fillStyle = hexToRgba('#ffaa00', 0.6);
    ctx.beginPath();
    ctx.moveTo(0, -s * pulse * 1.3);
    ctx.lineTo(s * pulse * 0.9, 0);
    ctx.lineTo(0, s * pulse * 1.3);
    ctx.lineTo(-s * pulse * 0.9, 0);
    ctx.closePath();
    ctx.fill();

    // Inner diamond
    const innerGrad = ctx.createLinearGradient(0, -s * pulse, 0, s * pulse);
    innerGrad.addColorStop(0, '#ffffff');
    innerGrad.addColorStop(0.3, CONFIG.COLORS.XP_GEM);
    innerGrad.addColorStop(0.7, '#ffaa00');
    innerGrad.addColorStop(1, '#cc8800');
    ctx.fillStyle = innerGrad;
    ctx.beginPath();
    ctx.moveTo(0, -s * pulse);
    ctx.lineTo(s * pulse * 0.7, 0);
    ctx.lineTo(0, s * pulse);
    ctx.lineTo(-s * pulse * 0.7, 0);
    ctx.closePath();
    ctx.fill();

    // Bright speck in center
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.25, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    ctx.restore();
  }
}

/**
 * HealthPickup - A rare HP restoration pickup with rotating cross and glow.
 */
class HealthPickup extends Entity {
  /**
   * @param {number} x - Spawn x
   * @param {number} y - Spawn y
   */
  constructor(x, y) {
    super(x, y, 6);
    /** @type {number} HP to restore */
    this.healAmount = 20;
    /** @type {number} Lifetime */
    this.lifetime = 20000;
    /** @type {number} Age */
    this.age = 0;
  }

  /** @param {number} dt */
  update(dt) {
    this.age += dt;
    if (this.age > this.lifetime) this.alive = false;
  }

  /** @param {CanvasRenderingContext2D} ctx @param {number} time */
  render(ctx, time) {
    const pulse = 1 + Math.sin(time * 0.006) * 0.12;
    const alpha = this.age > this.lifetime * 0.7
      ? 1 - (this.age - this.lifetime * 0.7) / (this.lifetime * 0.3)
      : 1;
    const rot = time * 0.001;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(rot);

    // Outer glow
    const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size * 2.2);
    glowGrad.addColorStop(0, 'rgba(255,51,85,0.3)');
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, 0, this.size * 2.2, 0, Math.PI * 2);
    ctx.fill();

    // Cross shape
    const s = this.size * pulse;
    ctx.shadowColor = CONFIG.COLORS.RED;
    ctx.shadowBlur = 12;

    const crossGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, s);
    crossGrad.addColorStop(0, '#ff6688');
    crossGrad.addColorStop(0.7, CONFIG.COLORS.RED);
    crossGrad.addColorStop(1, '#990022');
    ctx.fillStyle = crossGrad;
    ctx.fillRect(-s * 0.3, -s, s * 0.6, s * 2);
    ctx.fillRect(-s, -s * 0.3, s * 2, s * 0.6);

    // White center highlight
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.shadowBlur = 0;
    ctx.fillRect(-s * 0.15, -s * 0.15, s * 0.3, s * 0.3);

    ctx.restore();
  }
}

/**
 * Projectile - A weapon projectile that travels across the screen.
 */
class Projectile extends Entity {
  /**
   * @param {Object} config - Projectile configuration
   */
  constructor(config) {
    super(config.x, config.y, config.size || 4);

    /** @type {string} Color */
    this.color = config.color;
    /** @type {number} Damage */
    this.damage = config.damage;
    /** @type {number} Movement speed */
    this.speed = config.speed;
    /** @type {number} Angle of travel */
    this.angle = config.angle;
    /** @type {number} Remaining lifetime in ms */
    this.life = config.life;
    /** @type {number} Number of enemies this can pierce */
    this.pierce = config.pierce || 0;
    /** @type {number} Homing strength */
    this.homing = config.homing || 0;
    /** @type {number} Knockback force */
    this.knockback = config.knockback || 0;
    /** @type {boolean} Explodes on hit */
    this.explosive = config.explosive || false;
    /** @type {number} Explosion radius */
    this.explosionRadius = config.explosionRadius || 0;
    /** @type {number} Explosion damage multiplier */
    this.explosionDamage = config.explosionDamage || 0;
    /** @type {Set<Enemy>} Enemies already hit (for pierce tracking) */
    this.hitEnemies = new Set();

    this.vx = Math.cos(this.angle) * this.speed;
    this.vy = Math.sin(this.angle) * this.speed;
  }

  /**
   * Update projectile position, homing, and lifetime.
   * @param {number} dt - Delta time
   * @param {Enemy[]} enemies - Enemies for homing
   */
  update(dt, enemies) {
    // Homing: adjust angle toward nearest enemy
    if (this.homing > 0) {
      let nearest = null;
      let minDist = 200;
      for (const e of enemies) {
        if (!e.alive || this.hitEnemies.has(e)) continue;
        const d = distance(this.x, this.y, e.x, e.y);
        if (d < minDist) { minDist = d; nearest = e; }
      }
      if (nearest) {
        const targetAngle = angleTo(this.x, this.y, nearest.x, nearest.y);
        // Smoothly rotate toward target
        let diff = targetAngle - this.angle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        this.angle += diff * this.homing * (dt / 16);
      }
    }

    this.vx = Math.cos(this.angle) * this.speed;
    this.vy = Math.sin(this.angle) * this.speed;

    this.x += this.vx * (dt / 16);
    this.y += this.vy * (dt / 16);
    this.life -= dt;

    // Die if out of bounds or expired
    if (this.life <= 0 || !inBounds(this.x, this.y, -50)) {
      this.alive = false;
    }
  }

  /**
   * Render projectile with trail effect.
   * @param {CanvasRenderingContext2D} ctx
   * @param {number} time
   */
  render(ctx, time) {
    ctx.save();

    // Trail (stretched glow behind the projectile)
    const trailLen = this.size * 3;
    const trailX = this.x - Math.cos(this.angle) * trailLen * 0.5;
    const trailY = this.y - Math.sin(this.angle) * trailLen * 0.5;
    const trailGrad = ctx.createLinearGradient(
      this.x + Math.cos(this.angle) * trailLen * 0.5,
      this.y + Math.sin(this.angle) * trailLen * 0.5,
      this.x - Math.cos(this.angle) * trailLen * 0.5,
      this.y - Math.sin(this.angle) * trailLen * 0.5
    );
    trailGrad.addColorStop(0, this.color);
    trailGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = trailGrad;
    ctx.globalAlpha = 0.2;
    ctx.beginPath();
    ctx.ellipse(
      (this.x + trailX) / 2, (this.y + trailY) / 2,
      trailLen * 0.5, this.size * 1.2, this.angle, 0, Math.PI * 2
    );
    ctx.fill();
    ctx.globalAlpha = 1;

    // Outer glow aura
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = hexToRgba(this.color, 0.25);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Mid glow
    ctx.shadowBlur = 6;
    ctx.fillStyle = hexToRgba(this.color, 0.4);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Core (gunmetal/color gradient)
    const coreGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
    coreGrad.addColorStop(0, '#ffffff');
    coreGrad.addColorStop(0.2, '#ffeeff');
    coreGrad.addColorStop(0.5, this.color);
    coreGrad.addColorStop(1, hexToRgba(this.color, 0.3));
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();

    // Bright center
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Weapon-specific accents
    if (this.weaponId === 'fireball' || this.explosive) {
      // Fire flicker
      for (let i = 0; i < 2; i++) {
        const fa = this.angle + Math.PI + rand(-0.5, 0.5);
        const fd = this.size * rand(0.5, 1.2);
        ctx.fillStyle = hexToRgba('#ffaa00', 0.3);
        ctx.beginPath();
        ctx.arc(
          this.x + Math.cos(fa) * fd,
          this.y + Math.sin(fa) * fd,
          this.size * 0.4, 0, Math.PI * 2
        );
        ctx.fill();
      }
    }

    if (this.weaponId === 'energyOrb') {
      // Concentric rings
      ctx.strokeStyle = hexToRgba(this.color, 0.3);
      ctx.lineWidth = 0.8;
      for (let r = 1; r <= 2; r++) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * r * 0.8, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    ctx.restore();
  }
}

/**
 * NebulaCloud - A drifting colored gas cloud in the background.
 */
class NebulaCloud {
  constructor() {
    this.x = rand(-200, CONFIG.WIDTH + 200);
    this.y = rand(-200, CONFIG.HEIGHT + 200);
    this.radius = rand(80, 200);
    this.vx = rand(-0.08, 0.08);
    this.vy = rand(-0.06, 0.06);
    this.color = pick(['rgba(100,0,200,0.04)', 'rgba(0,100,200,0.04)', 'rgba(0,200,150,0.03)', 'rgba(150,0,100,0.03)', 'rgba(50,0,150,0.04)']);
    this.pulseSpeed = rand(0.0005, 0.002);
    this.pulseOffset = rand(0, Math.PI * 2);
    this.shape = rand(0, 1);
  }

  /** @param {number} dt */
  update(dt) {
    this.x += this.vx * (dt / 16);
    this.y += this.vy * (dt / 16);
    if (this.x > CONFIG.WIDTH + 300) this.x = -300;
    if (this.x < -300) this.x = CONFIG.WIDTH + 300;
    if (this.y > CONFIG.HEIGHT + 300) this.y = -300;
    if (this.y < -300) this.y = CONFIG.HEIGHT + 300;
  }

  /** @param {CanvasRenderingContext2D} ctx @param {number} time */
  render(ctx, time) {
    const pulse = 0.7 + 0.3 * Math.sin(time * this.pulseSpeed + this.pulseOffset);
    const r = this.radius * pulse;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    grad.addColorStop(0, this.color);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    if (this.shape < 0.5) {
      ctx.ellipse(this.x, this.y, r, r * 0.6, rand(-0.3, 0.3), 0, Math.PI * 2);
    } else {
      ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    }
    ctx.fill();
  }
}

/**
 * CosmicRay - Occasional streak of light across the background.
 */
class CosmicRay {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = rand(0, CONFIG.WIDTH);
    this.y = rand(0, CONFIG.HEIGHT);
    const angle = rand(0, Math.PI * 2);
    this.vx = Math.cos(angle) * rand(1, 3);
    this.vy = Math.sin(angle) * rand(1, 3);
    this.life = 1;
    this.length = rand(30, 80);
    this.width = rand(0.5, 1.5);
    this.color = pick(['rgba(255,255,255,0.3)', 'rgba(0,229,255,0.2)', 'rgba(200,200,255,0.25)']);
  }
  /** @param {number} dt */
  update(dt) {
    this.x += this.vx * (dt / 16);
    this.y += this.vy * (dt / 16);
    this.life -= 0.003 * (dt / 16);
    if (this.life <= 0 || !inBounds(this.x, this.y, -100)) this.reset();
  }
  /** @param {CanvasRenderingContext2D} ctx */
  render(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life * 0.5;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.width;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x - this.vx * this.length, this.y - this.vy * this.length);
    ctx.stroke();
    ctx.restore();
  }
}

/**
 * SpaceDust - Tiny floating specks with slow drift.
 */
class SpaceDust {
  constructor() {
    this.x = rand(0, CONFIG.WIDTH);
    this.y = rand(0, CONFIG.HEIGHT);
    this.size = rand(0.3, 1.2);
    this.vx = rand(-0.15, 0.15);
    this.vy = rand(-0.1, 0.1);
    this.alpha = rand(0.2, 0.6);
    this.twinkleSpeed = rand(0.003, 0.01);
    this.phase = rand(0, Math.PI * 2);
  }
  /** @param {number} dt */
  update(dt) {
    this.x += this.vx * (dt / 16);
    this.y += this.vy * (dt / 16);
    if (this.x < -10) this.x = CONFIG.WIDTH + 10;
    if (this.x > CONFIG.WIDTH + 10) this.x = -10;
    if (this.y < -10) this.y = CONFIG.HEIGHT + 10;
    if (this.y > CONFIG.HEIGHT + 10) this.y = -10;
  }
  /** @param {CanvasRenderingContext2D} ctx @param {number} time */
  render(ctx, time) {
    const a = this.alpha * (0.5 + 0.5 * Math.sin(time * this.twinkleSpeed + this.phase));
    ctx.fillStyle = `rgba(180,200,255,${a})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

/**
 * Star - A single background star with twinkling animation.
 */
class Star {
  constructor() {
    this.x = rand(0, CONFIG.WIDTH);
    this.y = rand(0, CONFIG.HEIGHT);
    this.size = rand(0.5, 2.5);
    this.brightness = rand(0.3, 1);
    this.twinkleSpeed = rand(0.002, 0.008);
    this.twinkleOffset = rand(0, Math.PI * 2);
    this.hasSpikes = Math.random() < 0.15;
    this.spikeLen = this.hasSpikes ? rand(1.5, 4) : 0;
    this.spikeAngle = rand(0, Math.PI);
  }

  /**
   * @param {CanvasRenderingContext2D} ctx
   * @param {number} time
   */
  render(ctx, time) {
    const alpha = this.brightness * (0.6 + 0.4 * Math.sin(time * this.twinkleSpeed + this.twinkleOffset));
    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();

    // Cross spikes for bright stars
    if (this.hasSpikes && alpha > 0.5) {
      ctx.save();
      ctx.globalAlpha = alpha * 0.5;
      ctx.strokeStyle = 'rgba(200,220,255,0.5)';
      ctx.lineWidth = 0.3;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.spikeAngle);
      ctx.beginPath();
      ctx.moveTo(-this.spikeLen, 0); ctx.lineTo(this.spikeLen, 0);
      ctx.moveTo(0, -this.spikeLen); ctx.lineTo(0, this.spikeLen);
      ctx.stroke();
      ctx.restore();
    }
  }
}

    this.lifetime = 15000;
    /** @type {number} */
    this.age = 0;
    /** @type {number} */
    this.duration = type.duration;
  }

  /** @param {number} dt */
  update(dt) {
    this.age += dt;
    if (this.age > this.lifetime) this.alive = false;
  }

  /** @param {CanvasRenderingContext2D} ctx @param {number} time */
  render(ctx, time) {
    const pulse = 1 + Math.sin(time * 0.007 + this.age * 0.01) * 0.15;
    const alpha = this.age > this.lifetime * 0.7
      ? 1 - (this.age - this.lifetime * 0.7) / (this.lifetime * 0.3)
      : 1;
    const pt = this.powerType;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Outer glow
    const glowGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
    glowGrad.addColorStop(0, hexToRgba(pt.color, 0.35));
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Rotating border
    ctx.strokeStyle = hexToRgba(pt.color, 0.6);
    ctx.lineWidth = 2;
    ctx.shadowColor = pt.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * pulse, 0, Math.PI * 2);
    ctx.stroke();

    // Hex inner shape
    const rot = time * 0.003;
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i + rot;
      const r = this.size * pulse * 0.7;
      const px = this.x + Math.cos(a) * r;
      const py = this.y + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();

    // Icon
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    ctx.font = "12px sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(pt.icon, this.x, this.y + 4);

    ctx.restore();
  }
}

class MetaProgression {
  constructor() {
    this.totalGold = 0;
    this.runGold = 0;
    this.upgrades = {};
    this.totalRuns = 0;
    this.bestTime = 0;
    this.bestKills = 0;
    this.bestWave = 0;
    this._load();
  }
  _load() {
    try {
      const data = JSON.parse(localStorage.getItem('voidrun_meta') || '{}');
      this.totalGold = data.totalGold || 0;
      this.upgrades = data.upgrades || {};
      this.totalRuns = data.totalRuns || 0;
      this.bestTime = data.bestTime || 0;
      this.bestKills = data.bestKills || 0;
      this.bestWave = data.bestWave || 0;
    } catch (e) {}
  }
  _save() {
    try { localStorage.setItem('voidrun_meta', JSON.stringify({
      totalGold: this.totalGold, upgrades: this.upgrades, totalRuns: this.totalRuns,
      bestTime: this.bestTime, bestKills: this.bestKills, bestWave: this.bestWave
    })); } catch (e) {}
  }
  addGold(amount) { this.runGold += amount; this.totalGold += amount; this._save(); }
  recordRun(gameTime, kills, wave) {
    this.totalRuns++;
    if (gameTime > this.bestTime) this.bestTime = gameTime;
    if (kills > this.bestKills) this.bestKills = kills;
    if (wave > this.bestWave) this.bestWave = wave;
    this._save();
  }
  purchase(upgradeId, cost) {
    if (this.totalGold < cost) return false;
    const lvl = (this.upgrades[upgradeId] || 0) + 1;
    if (lvl > PERMANENT_UPGRADES[upgradeId].maxLevel) return false;
    this.totalGold -= cost;
    this.upgrades[upgradeId] = lvl;
    this._save();
    return true;
  }
  getLevel(upgradeId) { return this.upgrades[upgradeId] || 0; }
}

function applyPermanentUpgrades(player, meta) {
  const hpLvl = meta.getLevel('startHp');
  if (hpLvl > 0) { player.maxHp += hpLvl * 10; player.baseMaxHp = player.maxHp; player.hp = player.maxHp; }
  const spdLvl = meta.getLevel('startSpeed');
  if (spdLvl > 0) player.speedMult = (player.speedMult || 1) + spdLvl * 0.03;
  const dmgLvl = meta.getLevel('startDamage');
  if (dmgLvl > 0) player._dmgBoost = (player._dmgBoost || 1) + dmgLvl * 0.04;
  const armLvl = meta.getLevel('startArmor');
  if (armLvl > 0) player.armor += armLvl;
  const magLvl = meta.getLevel('magnetStart');
  if (magLvl > 0) player.magnetMult = (player.magnetMult || 1) + magLvl * 0.15;
  const luckLvl = meta.getLevel('luckBoost');
  if (luckLvl > 0) player.luck += luckLvl * 5;
  const revLvl = meta.getLevel('reviveStart');
  if (revLvl > 0) player.revivals += 1;
}

function getUpgradeCost(upgradeId, meta) {
  const upg = PERMANENT_UPGRADES[upgradeId];
  return Math.floor(upg.costBase * Math.pow(upg.costGrowth, meta.getLevel(upgradeId)));
}

class Bestiary {
  constructor() {
    this.entries = {};
    for (const key of Object.keys(ENEMY_TYPES)) { this.entries[key] = { kills: 0, encounters: 0, firstSeen: null }; }
    this._load();
  }
  _load() {
    try { const d = JSON.parse(localStorage.getItem('voidrun_bestiary') || '{}');
      for (const k of Object.keys(this.entries)) { if (d[k]) { this.entries[k].kills = d[k].kills || 0; this.entries[k].encounters = d[k].encounters || 0; this.entries[k].firstSeen = d[k].firstSeen || null; } }
    } catch (e) {}
  }
  _save() { try { localStorage.setItem('voidrun_bestiary', JSON.stringify(this.entries)); } catch (e) {} }
  encounter(typeKey) { if (!this.entries[typeKey]) return; this.entries[typeKey].encounters++; if (this.entries[typeKey].firstSeen === null) this.entries[typeKey].firstSeen = Date.now(); this._save(); }
  kill(typeKey) { if (!this.entries[typeKey]) return; this.entries[typeKey].kills++; this._save(); }
  getTotalKills() { return Object.values(this.entries).reduce((sum, e) => sum + e.kills, 0); }
  getEntries() { return Object.entries(this.entries).map(([k, d]) => ({ key: k, type: ENEMY_TYPES[k], ...d })); }
}

class Obstacle {
  constructor(x, y, radius, type = 'crystal') {
    this.x = x; this.y = y; this.radius = radius; this.type = type; this.damage = 20;
    this.color = type === 'crystal' ? '#8844ff' : '#ff4444';
  }
  collidesWith(entity) { return distance(this.x, this.y, entity.x, entity.y) < this.radius + entity.size; }
  render(ctx, time) {
    const pulse = 1 + Math.sin(time * 0.003 + this.x * 0.01) * 0.08;
    ctx.save(); ctx.shadowColor = this.color; ctx.shadowBlur = 12;
    if (this.type === 'crystal') {
      ctx.fillStyle = hexToRgba(this.color, 0.6);
      ctx.beginPath();
      const pts = 5;
      for (let i = 0; i < pts; i++) {
        const a = (Math.PI * 2 / pts) * i + time * 0.001;
        const r = this.radius * pulse * (i % 2 === 0 ? 1 : 0.6);
        const px = this.x + Math.cos(a) * r; const py = this.y + Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill();
    } else {
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * pulse);
      grad.addColorStop(0, 'rgba(255,0,0,0.4)'); grad.addColorStop(0.5, 'rgba(100,0,0,0.2)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * pulse, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = hexToRgba(this.color, 0.5); ctx.lineWidth = 2; ctx.stroke();
    }
    ctx.restore();
  }
}

/**
 * DailySeed - Generates a deterministic seed for daily challenge runs.
 * Same seed = same upgrade/enemy patterns for everyone that day.
 */
class DailySeed {
  constructor() {
    this.seed = this._generateDailySeed();
    this._state = this.seed;
  }

  /** Generate a seed based on today's date */
  _generateDailySeed() {
    const now = new Date();
    return now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
  }

  /** Simple seeded PRNG (mulberry32) */
  next() {
    this._state |= 0;
    this._state = this._state + 0x6D2B79F5 | 0;
    let t = Math.imul(this._state ^ this._state >>> 15, 1 | this._state);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }

  /** Get a random integer in range [min, max] */
  nextInt(min, max) {
    return Math.floor(this.next() * (max - min + 1)) + min;
  }

  /** Pick a random element from array */
  pick(arr) {
    return arr[Math.floor(this.next() * arr.length)];
  }
}

/**
 * TutorialStep - A single tutorial instruction.
 */
class TutorialSystem {
  constructor() {
    this.steps = [
      { id: 'movement', text: 'Use WASD or Arrow Keys to move', icon: '🎮', trigger: 'gameStart', delay: 500, duration: 4000 },
      { id: 'weapons', text: 'Weapons auto-fire at the nearest enemy', icon: '🔮', trigger: 'firstKill', delay: 1000, duration: 4000 },
      { id: 'xp', text: 'Collect XP gems to level up and choose upgrades!', icon: '💎', trigger: 'firstGem', delay: 500, duration: 5000 },
      { id: 'levelup', text: 'Level up! Pick an upgrade to grow stronger', icon: '⚡', trigger: 'levelUp', delay: 0, duration: 6000 },
      { id: 'boss', text: 'BOSS APPROACHING! Watch for attack telegraphs (⚠)', icon: '⚠️', trigger: 'bossSpawn', delay: 500, duration: 6000 },
      { id: 'powerups', text: 'Power-ups drop from bosses and elites — collect them!', icon: '🎁', trigger: 'firstPowerup', delay: 500, duration: 5000 },
    ];
    /** @type {Set<string>} Completed tutorial steps */
    this.completed = new Set();
    /** @type {Object|null} Currently active tutorial step */
    this.active = null;
    this._load();
  }

  _load() {
    try {
      this.completed = new Set(JSON.parse(localStorage.getItem('voidrun_tutorial') || '[]'));
    } catch (e) { this.completed = new Set(); }
  }

  _save() {
    try { localStorage.setItem('voidrun_tutorial', JSON.stringify([...this.completed])); } catch (e) {}
  }

  /**
   * Trigger a tutorial step by its trigger name.
   * @param {string} trigger - Trigger identifier
   * @param {Game} game - Game instance
   */
  trigger(triggerName, game) {
    const step = this.steps.find(s => s.trigger === triggerName && !this.completed.has(s.id));
    if (!step || this.active) return;

    setTimeout(() => {
      this.active = { ...step, startTime: game.gameTime };
    }, step.delay);
  }

  /**
   * Update the active tutorial step.
   * @param {Game} game
   */
  update(game) {
    if (!this.active) return;
    if (game.gameTime - this.active.startTime > this.active.duration) {
      this.completed.add(this.active.id);
      this._save();
      this.active = null;
    }
  }

  /**
   * Render the active tutorial tooltip.
   * @param {CanvasRenderingContext2D} ctx
   */
  render(ctx) {
    if (!this.active) return;
    const elapsed = Date.now() - this.active.startTime;
    let alpha = 1;
    if (elapsed < 300) alpha = elapsed / 300;
    else if (elapsed > this.active.duration - 500) alpha = (this.active.duration - elapsed) / 500;

    ctx.save();
    ctx.globalAlpha = alpha;

    const text = `${this.active.icon} ${this.active.text}`;
    ctx.font = "bold 14px 'Rajdhani', sans-serif";
    const metrics = ctx.measureText(text);
    const pw = metrics.width + 30;
    const ph = 30;
    const px = CONFIG.WIDTH / 2 - pw / 2;
    const py = 80;

    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.strokeStyle = CONFIG.COLORS.CYAN;
    ctx.lineWidth = 1;
    roundRect(ctx, px, py, pw, ph, 8);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText(text, CONFIG.WIDTH / 2, py + ph / 2 + 5);

    ctx.restore();
  }

  /** Reset all tutorial progress */
  reset() {
    this.completed.clear();
    this.active = null;
    this._save();
  }
}

/**
 * Difficulty scaler - multipliers that increase with wave and time.
 */
class DifficultyScaler {
  constructor() {
    this.enemyHpMult = 1;
    this.enemySpeedMult = 1;
    this.enemyDamageMult = 1;
    this.enemyCountMult = 1;
  }

  /**
   * Update scaling based on wave and elapsed time.
   * @param {number} wave
   * @param {number} gameTime - in ms
   */
  update(wave, gameTime) {
    const minutes = gameTime / 60000;
    this.enemyHpMult = 1 + (wave - 1) * 0.3 + minutes * 0.05;
    this.enemySpeedMult = 1 + (wave - 1) * 0.05 + minutes * 0.01;
    this.enemyDamageMult = 1 + (wave - 1) * 0.1 + minutes * 0.03;
    this.enemyCountMult = 1 + (wave - 1) * 0.15;
  }

  /** Get enemy cap for current scaling */
  getEnemyCap(baseCap) {
    return Math.floor(baseCap * this.enemyCountMult);
  }
}

    this.maxedUpgrades = new Set();

    /** @type {Object<string, number>} Track upgrade levels */
    this.upgradeLevels = {};

    this.spawnAccum = 0;
