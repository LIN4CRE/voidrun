/**
 * Collision detection utilities beyond basic circle-circle.
 */
const Collision = {
  /**
   * Check if point is inside a rotated rectangle.
   * @param {number} px - Point x
   * @param {number} py - Point y
   * @param {number} rx - Rect center x
   * @param {number} ry - Rect center y
   * @param {number} rw - Rect width
   * @param {number} rh - Rect height
   * @param {number} angle - Rotation in radians
   * @returns {boolean}
   */
  pointInRotatedRect(px, py, rx, ry, rw, rh, angle) {
    const dx = px - rx;
    const dy = py - ry;
    const cos = Math.cos(-angle);
    const sin = Math.sin(-angle);
    const localX = dx * cos - dy * sin;
    const localY = dx * sin + dy * cos;
    return Math.abs(localX) < rw / 2 && Math.abs(localY) < rh / 2;
  },

  /**
   * Check if two circles overlap.
   */
  circleCircle(x1, y1, r1, x2, y2, r2) {
    const d = distance(x1, y1, x2, y2);
    return d < r1 + r2;
  },

  /**
   * Check if point is inside a circle.
   */
  pointInCircle(px, py, cx, cy, r) {
    return distance(px, py, cx, cy) < r;
  },

  /**
   * Get the closest point on a line segment to a point.
   */
  closestPointOnSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return { x: x1, y: y1 };
    let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = clamp(t, 0, 1);
    return { x: x1 + t * dx, y: y1 + t * dy };
  },

  /**
   * Check if a circle overlaps a line segment.
   */
  circleSegment(cx, cy, cr, x1, y1, x2, y2) {
    const closest = this.closestPointOnSegment(cx, cy, x1, y1, x2, y2);
    return distance(cx, cy, closest.x, closest.y) < cr;
  },
};

/**
 * Additional math utilities for game calculations.
 */
const MathX = {
  /**
   * Move a value toward a target by a step.
   */
  moveToward(current, target, step) {
    if (Math.abs(target - current) <= step) return target;
    return current + Math.sign(target - current) * step;
  },

  /**
   * Smoothly interpolate an angle (shortest path).
   */
  lerpAngle(a, b, t) {
    let diff = b - a;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    return a + diff * t;
  },

  /**
   * Get a random point within a circle.
   */
  randomPointInCircle(cx, cy, radius) {
    const angle = rand(0, Math.PI * 2);
    const r = radius * Math.sqrt(Math.random());
    return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
  },

  /**
   * Get a random point on a circle's edge.
   */
  randomPointOnCircle(cx, cy, radius) {
    const angle = rand(0, Math.PI * 2);
    return { x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius };
  },

  /**
   * Ease-in-out quad for smooth transitions.
   */
  easeInOutQuad(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  },

  /**
   * Ease-out elastic for bouncy effects.
   */
  easeOutElastic(t) {
    if (t === 0 || t === 1) return t;
    return Math.pow(2, -10 * t) * Math.sin((t - 1) * Math.PI * 2 / 0.3) + 1;
  },

  /**
   * Ease-out bounce.
   */
  easeOutBounce(t) {
    if (t < 1 / 2.75) return 7.5625 * t * t;
    if (t < 2 / 2.75) return 7.5625 * (t -= 1.5 / 2.75) * t + 0.75;
    if (t < 2.5 / 2.75) return 7.5625 * (t -= 2.25 / 2.75) * t + 0.9375;
    return 7.5625 * (t -= 2.625 / 2.75) * t + 0.984375;
  },
};

/**
 * DevTools - Optional debugging overlay for development.
 * Toggle with F4 key.
 */
class DevTools {
  constructor() {
    this.enabled = false;
    this.showHitboxes = false;
    this.showWeaponRanges = false;
    this.showAIState = false;
    this.showEntityCounts = true;
  }

  /**
   * Render debug overlay.
   * @param {CanvasRenderingContext2D} ctx
   * @param {Game} game
   */
  render(ctx, game) {
    if (!this.enabled) return;

    // Entity counts
    if (this.showEntityCounts) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(CONFIG.WIDTH - 200, 0, 200, 95);
      ctx.fillStyle = '#00ff00';
      ctx.font = '10px monospace';
      ctx.textAlign = 'left';
      let ly = 14;
      ctx.fillText(`Enemies:     ${game.enemies.length}`, CONFIG.WIDTH - 195, ly); ly += 14;
      ctx.fillText(`Projectiles: ${game.projectiles.length + (game.bossProjectiles ? game.bossProjectiles.length : 0)}`, CONFIG.WIDTH - 195, ly); ly += 14;
      ctx.fillText(`Gems:         ${game.gems.length}`, CONFIG.WIDTH - 195, ly); ly += 14;
      ctx.fillText(`Particles:    ${game.particles.particles.length}`, CONFIG.WIDTH - 195, ly); ly += 14;
      ctx.fillText(`State:        ${game.state}`, CONFIG.WIDTH - 195, ly); ly += 14;
      ctx.fillText(`Wave:         ${game.wave}`, CONFIG.WIDTH - 195, ly);
    }

    // Hitboxes
    if (this.showHitboxes) {
      ctx.strokeStyle = 'rgba(0,255,0,0.3)';
      ctx.lineWidth = 0.5;
      for (const enemy of game.enemies) {
        if (!enemy.alive) continue;
        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(0,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(game.player.x, game.player.y, game.player.size, 0, Math.PI * 2);
      ctx.stroke();
    }

    // AI state
    if (this.showAIState) {
      ctx.fillStyle = '#ffffff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      for (const enemy of game.enemies) {
        if (!enemy.alive) continue;
        if (enemy.behavior === 'boss') {
          ctx.fillText(`${enemy.bossAttackType} P${enemy.bossPhase}`, enemy.x, enemy.y - enemy.size - 10);
        } else {
          ctx.fillText(enemy.behavior, enemy.x, enemy.y - enemy.size - 6);
        }
      }
    }
  }

  /**
   * Render weapon ranges.
   */
  renderWeaponRanges(ctx, player) {
    if (!this.showWeaponRanges) return;
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([5, 10]);
    for (const wid of player.ownedWeapons) {
      const def = player.getWeaponDef(wid);
      if (def && def.sweepRadius) {
        ctx.beginPath();
        ctx.arc(player.x, player.y, def.sweepRadius, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    ctx.setLineDash([]);
  }
}

/**
 * Handle window resize events for responsive canvas.
 * Recalculates canvas display size while keeping game resolution.
 */
(function setupResponsiveHandling() {
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      const wrapper = document.getElementById('game-wrapper');
      const maxW = wrapper.clientWidth;
      const maxH = wrapper.clientHeight;
      const aspect = CONFIG.WIDTH / CONFIG.HEIGHT;
      let w, h;
      if (maxW / maxH > aspect) {
        h = Math.min(maxH, 900);
        w = h * aspect;
      } else {
        w = Math.min(maxW, 1200);
        h = w / aspect;
      }
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';

      // Adjust grid items for small screens
      if (w < 600) {
        document.querySelectorAll('.shop-card, .class-card, .mode-card').forEach(el => {
          el.style.width = '100%';
        });
      }
    }, 250);
  });
})();

/**
 * AutoSave - Periodically saves game state to prevent data loss.
 * Saves meta-progression and bestiary every 30 seconds during gameplay.
 */
class AutoSave {
  constructor(game) {
    this.game = game;
    this.interval = 30000;
    this.timer = 0;
  }

  update(dt) {
    if (this.game.state !== 'playing') return;
    this.timer += dt;
    if (this.timer >= this.interval) {
      this.timer = 0;
      this.save();
    }
  }

  save() {
    if (this.game._meta) this.game._meta._save();
    if (this.game._bestiary) this.game._bestiary._save();
  }
}

/**
 * Check browser capabilities and degrade gracefully if needed.
 * Warns if critical features are missing.
 */
function checkBrowserCapabilities() {
  const issues = [];
  if (!window.CanvasRenderingContext2D) issues.push('Canvas 2D not supported');
  if (!window.localStorage) issues.push('localStorage not available — progress won\'t save');
  if (!window.requestAnimationFrame) issues.push('requestAnimationFrame not available');

  if (issues.length > 0) {
    console.warn('⚠ Browser capability issues:', issues.join(', '));
    // Show a warning overlay
    const warn = document.createElement('div');
    warn.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,0,0,0.9);color:#fff;padding:1em;border-radius:8px;z-index:200;text-align:center;max-width:400px;';
    warn.innerHTML = '<strong>⚠ Compatibility Warning</strong><br>' + issues.join('<br>') + '<br><small>Some features may not work.</small>';
    document.getElementById('game-wrapper').appendChild(warn);
  }
  return issues.length === 0;
}

/**
 * InputBuffer - Buffers inputs to handle frame drops gracefully.
 * Ensures no input is lost during frame time spikes.
 */
class InputBuffer {
  constructor() {
    this.buffer = [];
    this.maxSize = 16;
  }

  /** Queue an input event */
  push(action) {
    if (this.buffer.length < this.maxSize) {
      this.buffer.push({ action, timestamp: performance.now() });
    }
  }

  /** Process all buffered inputs */
  flush(handler) {
    while (this.buffer.length > 0) {
      const input = this.buffer.shift();
      handler(input);
    }
  }

  /** Clear buffer */
  clear() {
    this.buffer.length = 0;
  }
}

/**
 * Weapon Processing Pipeline
 * ==========================
 *
 * When a weapon fires, the following pipeline executes:
 *
 * 1. Player.fireWeapon(weaponId, enemies)
 *    - Checks cooldown, ownership, and gets weapon definition
 *    - Calculates effective damage (crit, dmg boost, CD boost)
 *    - Returns an array of result descriptors
 *

 *    - Applies damage to enemies

/**
 * Game Loop Architecture
 * ======================
 *
 * The game runs on requestAnimationFrame with fixed-step logic:
 *
 * Frame Flow:
 *   1. requestAnimationFrame(_loop)
 *   2. Calculate dt (delta time, capped at 100ms)
 *   3. Game.update(dt)
 *      a. Update gameTime
 *      b. Update waveTimer → advance wave if needed
 *      c. Player.update(dt, input) — movement, HP regen, cooldowns
 *      d. Check XP → trigger level up if needed
 *      e. fireWeapons() — auto-fire all owned weapons
 *      f. _handleHolyRings(dt) — passive ring damage
 *      g. spawnEnemies(dt) — spawn new enemies
 *      h. Update all entities (enemies, projectiles, gems, pickups, powerups)
 *      i. Process boss attacks (_processBossAttacks)
 *      j. Update boss lasers, freeze timer, powerup buffs
 *      k. Handle collisions (projectile, boss projectile, player, pickup, powerup)
 *      l. Clean up dead entities
 *      m. Update particles, floating texts, beams, lightning
 *      n. Update screen shake
 *      o. Update background elements (nebula, cosmic rays, space dust)
 *      p. Update combo, elite effects, achievements
 *      q. Update weather, boss death sequences
 *      r. Update poison clouds, clones, meteor telegraphs, sweep arcs
 *      s. Handle passive XP (pacifist mode), timed mode check
 *      t. Handle item effects (executioner, gravity well, time dilation, berserk, void pulse)
 *      u. Update difficulty scaler, tutorial, obstacles
 *   4. Game._render()
 *      a. Biome background
 *      b. Deep space gradient
 *      c. Nebula clouds, cosmic rays, grid, space dust, stars
 *      d. Gems, pickups, enemies, holy rings, projectiles
 *      e. Beams, lightning arcs
 *      f. Player trail, player
 *      g. Particles, boss effects, powerups, floating texts
 *      h. Obstacles, poison clouds, clones, sweep arcs, meteor telegraphs
 *      i. Weather, boss death sequences
 *      j. Post-processing (vignette, scanlines, chromatic fringe, damage vignette, bloom, color grade)
 *      k. HUD (HP, XP, stats panel, weapons panel, boss bar, buff indicators, item bar)
 *      l. Tutorial tooltip, combo display, minimap, achievement notifications
 *      m. FPS counter, dev tools, screen transitions
 */

// ====================================================================
//  SECTION 70: DAMAGE CALCULATION DOCUMENTATION
// ====================================================================

/**
 * Damage Calculation Pipeline
 * ===========================
 *
 * When a weapon hits an enemy, damage is calculated as follows:
 *
 * Base Damage = WeaponDef.damage × WeaponState.damageMult
 *
 * Modifiers (multiplicative, applied in order):
 *   1. Critical Hit:   × critMult (if random < critChance)
 *   2. Damage Boost:   × _dmgBoost (from powerups/items/classes)
 *   3. Berserk:        × (1 + (1 - hpRatio) × 0.4) (if _berserk active)
 *   4. Enemy Armor:    DamageTaken = max(1, ModifiedDamage - enemy.armor)
 *
 * Special Cases:
 *   - Void Pulse:      Sets enemy HP to 50% of current (not damage calc)
 *   - Executioner:     Instant kill if HP < 15% (bypasses damage calc)
 *   - Dodge:           Damage avoided entirely (Shadow Cloak item)
 *   - Shield:          Damage avoided entirely (Void Shield powerup)
 *
 * Damage Types (for color coding only, no gameplay difference):
 *   fire:      #ff6600  (Fireball, Meteor)
 *   ice:       #88ddff  (Frost Nova)
 *   lightning: #ffff44  (Lightning Arc, Chain Storm)
 *   void:      #aa44ff  (Void Beam, Shadow Scythe)
 *   poison:    #66ff33  (Poison Cloud)
 *   physical:  #ffffff  (Magic Bolt, Energy Orb, Holy Ring)
 *   critical:  #ffaa00  (any crit)
 */

/**
 * Render a wave progress bar showing time until next wave.
 */
function renderWaveProgressBar(ctx, game) {
  if (game.state !== 'playing') return;
  const barW = 210;
  const barH = 3;
  const x = 15;
  const y = 170; // below stats panel

  const progress = 1 - (game.waveTimer / (CONFIG.WAVE_DURATION_SEC * 1000));

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(ctx, x, y, barW, barH, 1.5);
  ctx.fill();

  const grad = ctx.createLinearGradient(x, 0, x + barW, 0);
  grad.addColorStop(0, '#ff00e5');
  grad.addColorStop(1, '#ff66ff');
  ctx.fillStyle = grad;
  roundRect(ctx, x, y, barW * progress, barH, 1.5);
  ctx.fill();
}

// Hook into render
(function() {
  const origRenderWave = Game.prototype._renderHUD;
  Game.prototype._renderHUD = function() {
    origRenderWave.call(this);
    renderWaveProgressBar(ctx, this);
  };
})();

/**
 * Memory Management Strategy
 * ==========================
 *
 * 1. Entity Pooling (Manual cleanup):
 *    - Dead entities are removed via splice in _cleanupDead()
 *    - Particles auto-expire based on lifetime
 *    - Floating texts auto-expire
 *    - Visual effects (beams, lightning, sweep arcs) fade and remove
 *
 * 2. Particle Cap:
 *    - CONFIG.MAX_PARTICLES = 800
 *    - When exceeded, oldest particles are removed
 *    - PerformanceBudget enforces entity caps
 *
 * 3. Garbage Collection Hints:
 *    - Arrays are spliced rather than recreated
 *    - setTimeout callbacks reference this via closure (cleared on death)
 *    - Event listeners cleaned up via InputHandler.destroy()
 *
 * 4. localStorage:
 *    - Only saves on significant events (purchase, run end, kill)
 *    - Uses try/catch to handle quota exceeded
 *    - Version-stamped to handle schema migrations
 */

// ====================================================================
//  SECTION 77: SECURITY CONSIDERATIONS
// ====================================================================

/**
 * Security Notes
 * ==============
 *
 * 1. localStorage:
 *    - Client-side only, no server communication
 *    - Player can modify values (no competitive integrity needed)
 *    - Version check prevents stale data issues
 *
 * 2. Input Handling:
 *    - Keyboard events use e.key (not keyCode - deprecated)
 *    - Mouse events calculate position relative to canvas
 *    - No eval() or innerHTML from untrusted sources
 *
 * 3. Web Audio:
 *    - AudioContext created only on user gesture (click)
 *    - No audio files loaded from external sources
 *    - All sounds synthesized client-side
 *
 * 4. Canvas:
 *    - No external images loaded
 *    - All rendering is procedural
 *    - No cross-origin concerns
 */

// ====================================================================
//  SECTION 79: KNOWN ISSUES & EDGE CASES
// ====================================================================

/**
 * Known Limitations
 * =================
 *
 * 1. Boss charge setTimeout uses closure over 'player' which may
 *    reference stale data if player dies during telegraph.
 *    Mitigation: boss checks this.alive before executing.
 *
 * 2. Plasma ball bounce can create infinite chains in dense enemy
 *    groups. Mitigation: _bounceHit Set prevents same-target rebounds.
 *
 * 3. Poison clouds have no visual stacking indicator when multiple
 *    clouds overlap. Intentional: performance over precision.
 *
 * 4. Meteor strike uses setTimeout which doesn't pause with game.
 *    Mitigation: checks game.state before applying damage.
 *
 * 5. localStorage quota may be exceeded on some browsers.
 *    Mitigation: all writes wrapped in try/catch.
 *
 * 6. Clone entity references can become stale if original enemy
 *    dies between clone target selection and projectile impact.
 *    Mitigation: alive check before applying damage.
 *
 * 7. Screen shake can cause entities near edges to render outside
 *    canvas bounds. Mitigation: canvas clear + fill covers entire area.
 */

// ====================================================================
//  SECTION 80: PERFORMANCE OPTIMIZATION NOTES
// ====================================================================

/**
 * Performance Optimizations Applied
 * =================================
 *
 * 1. Spatial: No spatial partitioning (grid/quadtree).
 *    At <200 enemies with O(n²) distance checks, this is acceptable.
 *    If scaling beyond 300 enemies, implement spatial hash grid.
 *
 * 2. Rendering: Single canvas, no offscreen buffers.
 *    All compositing done in draw order (painter's algorithm).
 *    For mobile, consider reducing particle cap and star count.
 *
 * 3. Garbage: Array.splice() creates garbage.
 *    For high-frequency operations (particles), we splice.
 *    Acceptable at current scale. For optimization: use swap-and-pop.
 *
 * 4. String operations: toFixed() and string concatenation in HUD.
 *    Minimal impact. For optimization: pre-compute format strings.
 *
 * 5. Gradient creation: New gradients created each frame.
 *    Caching gradients for static elements could save ~5% GPU time.
 *    Dynamic elements (HP bar, XP bar) must be recalculated.
 *
 * 6. Shadow blur: Expensive on some GPUs.
 *    Shadow effects are used extensively for "neon" aesthetic.
 *    For low-end devices: reduce shadowBlur values or disable.
 */

// ====================================================================
//  90: GAME EVENT BUS (observer pattern for decoupled systems)
// ====================================================================
class EventBus {
  constructor() { this._listeners = {}; }
  on(event, callback) { if (!this._listeners[event]) this._listeners[event] = []; this._listeners[event].push(callback); }
  off(event, callback) { if (!this._listeners[event]) return; this._listeners[event] = this._listeners[event].filter(cb => cb !== callback); }
  emit(event, data) { if (!this._listeners[event]) return; for (const cb of this._listeners[event]) { cb(data); } }
  clear() { this._listeners = {}; }
}

//  112: TOUCH / MOBILE CONTROLS
// ====================================================================
class TouchControls {
  constructor(canvas, game) {
    this.canvas = canvas; this.game = game;
    this.touchId = null; this.startX = 0; this.startY = 0; this.dx = 0; this.dy = 0;
    this._onTouchStart = this._onTouchStart.bind(this);
    this._onTouchMove = this._onTouchMove.bind(this);
    this._onTouchEnd = this._onTouchEnd.bind(this);
    canvas.addEventListener('touchstart', this._onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', this._onTouchMove, { passive: false });
    canvas.addEventListener('touchend', this._onTouchEnd);
    canvas.addEventListener('touchcancel', this._onTouchEnd);
  }
  _onTouchStart(e) {
    e.preventDefault();
    if (this.touchId !== null) return;
    const t = e.changedTouches[0];
    this.touchId = t.identifier;
    this.startX = t.clientX; this.startY = t.clientY;
  }
  _onTouchMove(e) {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === this.touchId) {
        this.dx = t.clientX - this.startX; this.dy = t.clientY - this.startY;
      }
    }
  }
  _onTouchEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === this.touchId) { this.touchId = null; this.dx = 0; this.dy = 0; }
    }
  }
  getMovement() {
    const maxDist = 40;
    return {
      x: clamp(this.dx / maxDist, -1, 1),
      y: clamp(this.dy / maxDist, -1, 1),
    };
  }
  destroy() {
    this.canvas.removeEventListener('touchstart', this._onTouchStart);
    this.canvas.removeEventListener('touchmove', this._onTouchMove);
    this.canvas.removeEventListener('touchend', this._onTouchEnd);
    this.canvas.removeEventListener('touchcancel', this._onTouchEnd);
  }
}

// ====================================================================
//  NIX LOGO GENERATOR (Canvas 2D procedural logo)
// ====================================================================

/**
 * NixLogo — Procedurally renders the Nix brand mark on a canvas.
 * The logo consists of:
 *   1. A rotating void spiral (🌀) — the mark
 *   2. The "NIX" wordmark in Orbitron
 *   3. Optional tagline
 *   4. Signature cyan-to-magenta gradient glow
 */
class NixLogo {
  /**
   * @param {number} size - Logo size in pixels (square)
   */
  constructor(size = 256) {
    this.size = size;
    this.angle = 0;
    this._canvas = null;
    this._ctx = null;
  }

  /** Create offscreen canvas for the logo */
  _ensureCanvas() {
    if (this._canvas) return;
    this._canvas = document.createElement('canvas');
    this._canvas.width = this.size;
    this._canvas.height = this.size;
    this._ctx = this._canvas.getContext('2d');
  }

  /**
   * Render the Nix logo at the current angle.
   * @param {number} [time] - Animation time for rotation effect
   * @returns {HTMLCanvasElement}
   */
  render(time = 0) {
    this._ensureCanvas();
    const ctx = this._ctx;
    const s = this.size;
    const cx = s / 2;
    const cy = s / 2;
    ctx.clearRect(0, 0, s, s);

    // Background circle
    const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, s * 0.5);
    bgGrad.addColorStop(0, NIX_BRAND.colors.nixMid);
    bgGrad.addColorStop(1, NIX_BRAND.colors.nixVoid);
    ctx.fillStyle = bgGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, s * 0.48, 0, Math.PI * 2);
    ctx.fill();

    // Outer ring (animated rotation)
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(time * 0.001);
    ctx.strokeStyle = NIX_BRAND.colors.nixCyan;
    ctx.lineWidth = 2;
    ctx.shadowColor = NIX_BRAND.colors.nixCyan;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.42, 0, Math.PI * 2);
    ctx.stroke();

    // Inner ring (counter-rotating)
    ctx.rotate(time * -0.0015);
    ctx.strokeStyle = NIX_BRAND.colors.nixMagenta;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = NIX_BRAND.colors.nixMagenta;
    ctx.shadowBlur = 8;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Spiral mark (🌀 — procedural spiral)
    const spiralPoints = 80;
    const maxRadius = s * 0.25;
    ctx.strokeStyle = NIX_BRAND.colors.nixWhite;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = NIX_BRAND.colors.nixCyan;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    for (let i = 0; i < spiralPoints; i++) {
      const t = i / spiralPoints;
      const r = t * maxRadius;
      const a = t * Math.PI * 6 + time * 0.002;
      const x = Math.cos(a) * r;
      const y = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    return this._canvas;
  }

  /**
   * Render the logo as a favicon-sized icon.
   * @returns {HTMLCanvasElement} 64×64 icon
   */
  renderIcon() {
    this.size = 64;
    this._canvas = null;
    return this.render(0);
  }

  /** Get data URL for the logo */
  toDataURL(type = 'image/png') {
    return this._canvas.toDataURL(type);
  }
}

/**
 * NixSplashScreen — Animated loading splash with the Nix brand.
 * Shows during game initialization with progress bar.
 */
class NixSplashScreen {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.logo = new NixLogo(120);
    this.progress = 0;
    this.targetProgress = 0;
    this.startTime = performance.now();
    this.visible = false;
    this.onComplete = null;
    this._animId = null;
  }

  /** Start the splash screen animation */
  show(onComplete) {
    this.visible = true;
    this.progress = 0;
    this.targetProgress = 0;
    this.startTime = performance.now();
    this.onComplete = onComplete;
    this._animate();
  }

  /** Set loading progress (0-1) */
  setProgress(pct) {
    this.targetProgress = clamp(pct, 0, 1);
  }

  /** Hide the splash screen */
  hide() {
    this.visible = false;
    if (this._animId) {
      cancelAnimationFrame(this._animId);
      this._animId = null;
    }
    if (this.onComplete) {
      const cb = this.onComplete;
      this.onComplete = null;
      cb();
    }
  }

  /** @private Animation loop */
  _animate() {
    if (!this.visible) return;
    this._animId = requestAnimationFrame(() => this._animate());

    this.progress = lerp(this.progress, this.targetProgress, 0.05);
    const time = performance.now();
    const ctx = this.ctx;
    const w = CONFIG.WIDTH;
    const h = CONFIG.HEIGHT;

    // Background
    ctx.fillStyle = NIX_BRAND.colors.nixVoid;
    ctx.fillRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = 'rgba(0,229,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let x = 80; x < w; x += 80) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = 80; y < h; y += 80) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Logo
    const logoCanvas = this.logo.render(time);
    const lx = w / 2 - 60;
    const ly = h / 2 - 100;
    ctx.drawImage(logoCanvas, lx, ly);

    // Wordmark below logo
    ctx.fillStyle = NIX_BRAND.colors.nixWhite;
    ctx.font = "900 42px 'Orbitron', sans-serif";
    ctx.textAlign = 'center';
    ctx.shadowColor = NIX_BRAND.colors.nixCyan;
    ctx.shadowBlur = 20;
    ctx.fillText('NIX', w / 2, h / 2 + 40);
    ctx.shadowBlur = 0;

    // Tagline
    ctx.fillStyle = NIX_BRAND.colors.nixMagenta;
    ctx.font = "300 14px 'Rajdhani', sans-serif";
    ctx.fillText(NIX_BRAND.assets.logo.tagline, w / 2, h / 2 + 65);

    // Progress bar
    const barW = 260;
    const barH = 4;
    const barX = w / 2 - barW / 2;
    const barY = h / 2 + 95;

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, barX - 2, barY - 2, barW + 4, barH + 4, 2);
    ctx.fill();

    const barGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    barGrad.addColorStop(0, NIX_BRAND.colors.nixCyan);
    barGrad.addColorStop(1, NIX_BRAND.colors.nixMagenta);
    ctx.fillStyle = barGrad;
    roundRect(ctx, barX, barY, barW * this.progress, barH, 2);
    ctx.fill();

    // Version text
    ctx.fillStyle = NIX_BRAND.colors.nixSlate;
    ctx.font = "10px 'Rajdhani', sans-serif";
    ctx.fillText(`v${GAME_VERSION}  •  ${NIX_BRAND.assets.logo.subbrand}`, w / 2, h / 2 + 120);

    // Check if loading is complete
    if (this.progress > 0.99) {
      setTimeout(() => this.hide(), 300);
    }
  }
}

/**
 * NixButton — Branded button renderer.
 * Draws a Nix-styled button directly on canvas.
 */
class NixButton {
  /**
   * @param {string} text - Button text
   * @param {number} x - Center x
   * @param {number} y - Center y
   * @param {number} w - Width
   * @param {number} h - Height
   * @param {string} [variant] - 'primary' | 'secondary' | 'danger'
   */
  static render(ctx, text, x, y, w, h, variant = 'primary', hovered = false) {
    const colors = {
      primary: { border: NIX_BRAND.colors.nixCyan, text: NIX_BRAND.colors.nixCyan, glow: NIX_BRAND.colors.nixCyan },
      secondary: { border: NIX_BRAND.colors.nixMagenta, text: NIX_BRAND.colors.nixMagenta, glow: NIX_BRAND.colors.nixMagenta },
      danger: { border: NIX_BRAND.colors.nixCrimson, text: NIX_BRAND.colors.nixCrimson, glow: NIX_BRAND.colors.nixCrimson },
    };
    const c = colors[variant] || colors.primary;

    ctx.save();
    if (hovered) {
      ctx.shadowColor = c.glow;
      ctx.shadowBlur = 15;
    }

    ctx.strokeStyle = c.border;
    ctx.lineWidth = 2;
    roundRect(ctx, x - w / 2, y - h / 2, w, h, NIX_BRAND.radius.sm);
    ctx.stroke();

    if (hovered) {
      ctx.fillStyle = hexToRgba(c.glow, 0.1);
      roundRect(ctx, x - w / 2, y - h / 2, w, h, NIX_BRAND.radius.sm);
      ctx.fill();
    }

    ctx.fillStyle = c.text;
    ctx.font = `700 13px ${NIX_BRAND.typography.display}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);

    ctx.restore();
  }
}

/**
 * NixPanel — Branded glass-morphism panel.
 */
class NixPanel {
  static render(ctx, x, y, w, h, title = '') {
    // Glass background
    const glassGrad = ctx.createLinearGradient(x, y, x, y + h);
    glassGrad.addColorStop(0, NIX_BRAND.colors.nixMid);
    glassGrad.addColorStop(1, NIX_BRAND.colors.nixDeep);
    ctx.fillStyle = glassGrad;
    roundRect(ctx, x, y, w, h, NIX_BRAND.radius.md);
    ctx.fill();

    // Border
    ctx.strokeStyle = hexToRgba(NIX_BRAND.colors.nixCyan, 0.2);
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, w, h, NIX_BRAND.radius.md);
    ctx.stroke();

    // Top accent line
    const accentGrad = ctx.createLinearGradient(x, 0, x + w, 0);
    accentGrad.addColorStop(0, NIX_BRAND.colors.nixCyan);
    accentGrad.addColorStop(1, NIX_BRAND.colors.nixMagenta);
    ctx.strokeStyle = accentGrad;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + NIX_BRAND.radius.md, y + 1);
    ctx.lineTo(x + w - NIX_BRAND.radius.md, y + 1);
    ctx.stroke();

    // Title
    if (title) {
      ctx.fillStyle = NIX_BRAND.colors.nixCyan;
      ctx.font = `700 11px ${NIX_BRAND.typography.display}`;
      ctx.textAlign = 'left';
      ctx.fillText(title, x + NIX_BRAND.spacing.md, y + NIX_BRAND.spacing.lg);
    }
  }
}

/**
 * NixTitleScreen — Renders a fully branded title screen.
 * Replaces the default start screen with Nix branding.
 */
class NixTitleScreen {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.logo = new NixLogo(100);
    this.floatingParticles = [];
    for (let i = 0; i < 20; i++) {
      this.floatingParticles.push({
        x: rand(0, CONFIG.WIDTH),
        y: rand(0, CONFIG.HEIGHT),
        size: rand(1, 3),
        speed: rand(0.3, 1),
        angle: rand(0, Math.PI * 2),
        color: pick([NIX_BRAND.colors.nixCyan, NIX_BRAND.colors.nixMagenta, NIX_BRAND.colors.nixGold]),
      });
    }
  }

  /** Render the branded title screen background */
  render(time) {
    const ctx = this.ctx;
    const w = CONFIG.WIDTH;
    const h = CONFIG.HEIGHT;

    // Void background
    ctx.fillStyle = NIX_BRAND.colors.nixVoid;
    ctx.fillRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = hexToRgba(NIX_BRAND.colors.nixCyan, 0.025);
    ctx.lineWidth = 0.5;
    for (let x = 80; x < w; x += 80) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = 80; y < h; y += 80) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Floating brand particles
    for (const p of this.floatingParticles) {
      p.angle += 0.005;
      p.y -= p.speed * 0.3;
      if (p.y < -10) { p.y = h + 10; p.x = rand(0, w); }
      ctx.fillStyle = hexToRgba(p.color, 0.3 + Math.sin(time * 0.003 + p.x) * 0.1);
      ctx.beginPath();
      ctx.arc(p.x + Math.cos(p.angle) * 20, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }

    // Nix logo
    const logoCanvas = this.logo.render(time);
    ctx.drawImage(logoCanvas, w / 2 - 50, h / 3 - 80);

    // Wordmark
    ctx.fillStyle = NIX_BRAND.colors.nixWhite;
    ctx.font = `900 52px ${NIX_BRAND.typography.display}`;
    ctx.textAlign = 'center';
    ctx.shadowColor = NIX_BRAND.colors.nixCyan;
    ctx.shadowBlur = 25;
    ctx.fillText('NIX', w / 2, h / 3 + 55);
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.fillStyle = NIX_BRAND.colors.nixCyan;
    ctx.font = `400 16px ${NIX_BRAND.typography.body}`;
    ctx.fillText('VOIDRUN', w / 2, h / 3 + 80);

    // Tagline
    ctx.fillStyle = NIX_BRAND.colors.nixMagenta;
    ctx.font = `300 12px ${NIX_BRAND.typography.body}`;
    ctx.fillText(NIX_BRAND.assets.logo.tagline, w / 2, h / 3 + 105);

    // Version
    ctx.fillStyle = NIX_BRAND.colors.nixSlate;
    ctx.font = `10px ${NIX_BRAND.typography.body}`;
    ctx.fillText(`v${GAME_VERSION}  •  ${NIX_BRAND.assets.logo.subbrand}`, w / 2, h / 3 + 130);

    // Nix brand bar at bottom
    const barY = h - 40;
    ctx.fillStyle = hexToRgba(NIX_BRAND.colors.nixCyan, 0.05);
    ctx.fillRect(0, barY, w, 40);
    const barGrad = ctx.createLinearGradient(0, 0, w, 0);
    barGrad.addColorStop(0, NIX_BRAND.colors.nixCyan);
    barGrad.addColorStop(1, NIX_BRAND.colors.nixMagenta);
    ctx.strokeStyle = barGrad;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, barY);
    ctx.lineTo(w, barY);
    ctx.stroke();

    ctx.fillStyle = NIX_BRAND.colors.nixSlate;
    ctx.font = `9px ${NIX_BRAND.typography.body}`;
    ctx.textAlign = 'center';
    ctx.fillText(`${NIX_BRAND.assets.motto}  |  Built with Canvas 2D + Web Audio  |  ${NIX_BRAND.assets.logo.subbrand} © 2026`, w / 2, barY + 25);
  }
}

/**
 * Integrate Nix brand into the existing Game class.
 * Replaces standard rendering with branded alternatives where applicable.
 */
function integrateNixBrand(GameClass) {
  // Replace start screen with Nix branded version
  const nixTitle = new NixTitleScreen(canvas);

  // Patch the title animation
  const origTitleAnim = window._titleAnimationFn;

  // Override the title screen rendering
  const origStartRender = GameClass.prototype._renderStatic;
  GameClass.prototype._renderStatic = function() {
    if (this.state === 'start') {
      nixTitle.render(performance.now());
    } else {
      origStartRender.call(this);
    }
  };

  // Brand the game over screen
  const origShowUI = GameClass.prototype._showGameOverUI;
  GameClass.prototype._showGameOverUI = function() {
    origShowUI.call(this);
    // Add Nix branding to the game over screen
    const goScreen = document.getElementById('gameover-screen');
    if (goScreen) {
      const brandFooter = goScreen.querySelector('.nix-brand-footer');
      if (!brandFooter) {
        const footer = document.createElement('div');
        footer.className = 'nix-brand-footer';
        footer.style.cssText = 'margin-top:1em;font-size:0.6rem;color:#555;text-align:center;';
        footer.innerHTML = `${NIX_BRAND.assets.logo.subbrand}  •  ${NIX_BRAND.assets.motto}`;
        goScreen.appendChild(footer);
      }
    }
  };

  // Brand the start screen HTML
  const startScreen = document.getElementById('start-screen');
  if (startScreen) {
    const h1 = startScreen.querySelector('h1');
    if (h1) h1.textContent = 'NIX';
    const subtitle = startScreen.querySelector('.subtitle');
    if (subtitle) subtitle.textContent = 'VOIDRUN';
    // Add brand tagline
    const tagline = document.createElement('p');
    tagline.style.cssText = 'font-size:0.7rem;color:#666;margin-bottom:1em;letter-spacing:0.2em;';
    tagline.textContent = NIX_BRAND.assets.logo.tagline;
    if (subtitle) subtitle.after(tagline);
  }

  // Brand the shop screen
  const shopScreen = document.getElementById('shop-screen');
  if (shopScreen) {
    const h2 = shopScreen.querySelector('h2');
    if (h2) {
      h2.innerHTML = `🌀 NIX ${h2.innerHTML}`;
    }
  }

  // Add brand class to body
  document.body.classList.add('nix-branded');
}

/**
 * HitStop — Brief freeze-frame effect on impactful events.
 * Creates that "punchy" feeling when big damage is dealt.
 */
class HitStop {
  constructor() {
    this.active = false;
    this.duration = 0;
    this.remaining = 0;
    this.intensity = 1;
  }

  /** Trigger a hit-stop for the given duration in ms */
  trigger(duration = 50, intensity = 1) {
    this.active = true;
    this.duration = duration;
    this.remaining = duration;
    this.intensity = intensity;
  }

  /** Update hit-stop, returns the time scaling factor (0-1) */
  update(dt) {
    if (!this.active) return 1;
    this.remaining -= dt;
    if (this.remaining <= 0) {
      this.active = false;
      return 1;
    }
    const progress = this.remaining / this.duration;
    return 0.1 + progress * 0.9; // Scale from 0.1 to 1.0
  }

  /** Check if currently in hit-stop */
  isActive() { return this.active; }
}

/**
 * DirectionalShake — Screen shake that follows the direction of impact.
 * More realistic than random shake — shakes AWAY from the damage source.
 */
class DirectionalShake {
  constructor() {
    this.amount = 0;
    this.angle = 0;
    this.decay = 0.88;
    this.threshold = 0.3;
  }

  /** Trigger shake AWAY from a point */
  triggerFrom(sourceX, sourceY, intensity) {
    const cx = CONFIG.WIDTH / 2;
    const cy = CONFIG.HEIGHT / 2;
    this.angle = angleTo(sourceX, sourceY, cx, cy);
    this.amount = Math.max(this.amount, intensity);
  }

  /** Get current camera offset */
  getOffset() {
    if (this.amount < this.threshold) {
      this.amount = 0;
      return { x: 0, y: 0 };
    }
    this.amount *= this.decay;
    return {
      x: Math.cos(this.angle) * this.amount,
      y: Math.sin(this.angle) * this.amount,
    };
  }
}

/**
 * JuiceManager — Central juice controller.
 * Coordinates hit-stop, directional shake, impact particles, and camera effects.
 */
class JuiceManager {
  constructor() {
    this.hitStop = new HitStop();
    this.shake = new DirectionalShake();
    this.cameraZoom = 1;
    this.targetZoom = 1;
    this.zoomDecay = 0.92;
  }

  /** Process a big hit — triggers all juice effects */
  bigHit(x, y, damage, isCrit = false) {
    const intensity = Math.min(1, damage / 50);
    if (isCrit) {
      this.hitStop.trigger(40, intensity);
      this.shake.triggerFrom(x, y, 4 + intensity * 6);
    } else if (damage > 20) {
      this.hitStop.trigger(20, intensity * 0.5);
      this.shake.triggerFrom(x, y, 2 + intensity * 3);
    }
  }

  /** Process a boss hit */
  bossHit(x, y) {
    this.hitStop.trigger(60, 1);
    this.shake.triggerFrom(x, y, 8);
  }

  /** Camera zoom pulse (on level up, boss kill, etc.) */
  zoomPulse(amount = 0.05) {
    this.targetZoom = 1 + amount;
  }

  /** Update all juice systems, returns time scale factor */
  update(dt) {
    const timeScale = this.hitStop.update(dt);
    // Smooth zoom
    this.cameraZoom += (this.targetZoom - this.cameraZoom) * 0.1;
    this.targetZoom += (1 - this.targetZoom) * 0.05;
    return timeScale;
  }

  /** Get camera offset from shake */
  getCameraOffset() {
    return this.shake.getOffset();
  }
}

/**
 * PhysicsFloatingText — Damage number with velocity, gravity, and bounce.
 * More dynamic than the simple float-up approach.
 */
class PhysicsFloatingText {
  constructor(x, y, text, color, fontSize = 12, isCrit = false) {
    this.x = x;
    this.y = y;
    this.text = text;
    this.color = color;
    this.fontSize = fontSize;
    this.isCrit = isCrit;

    // Physics
    this.vx = rand(-0.8, 0.8);
    this.vy = rand(-3, -1.5);
    this.gravity = 0.05;
    this.friction = 0.98;
    this.life = isCrit ? 1200 : 800;
    this.maxLife = this.life;
    this.alive = true;
    this.scale = isCrit ? 1.4 : 1;
    this.rotation = rand(-0.15, 0.15);
    this.rotVelocity = rand(-0.01, 0.01);
  }

  update(dt) {
    this.vy += this.gravity * (dt / 16);
    this.vx *= this.friction;
    this.x += this.vx * (dt / 16);
    this.y += this.vy * (dt / 16);
    this.life -= dt;
    this.rotation += this.rotVelocity * (dt / 16);
    if (this.isCrit) this.scale += 0.002 * (dt / 16);
    if (this.life <= 0) this.alive = false;
  }

  getAlpha() {
    const t = this.life / this.maxLife;
    if (t > 0.7) return 1;
    return t / 0.7;
  }

  render(ctx) {
    const alpha = this.getAlpha();
    if (alpha <= 0.01) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.scale(this.scale, this.scale);

    // Shadow for depth
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = this.isCrit ? 10 : 5;
    ctx.font = `bold ${this.fontSize}px 'Rajdhani', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Outline for readability
    if (this.isCrit) {
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 3;
      ctx.strokeText(this.text, 0, 0);
    }

    ctx.fillText(this.text, 0, 0);
    ctx.restore();
  }
}

/**
 * PhysicsTextManager — Pool of physics-based damage numbers.
 */
class PhysicsTextManager {
  constructor() {
    this.texts = [];
  }

  add(x, y, text, color, fontSize = 12, isCrit = false) {
    this.texts.push(new PhysicsFloatingText(x, y, text, color, fontSize, isCrit));
  }

  addDamage(x, y, dmg, isCrit = false) {
    const color = isCrit ? CONFIG.COLORS.GOLD : CONFIG.COLORS.WHITE;
    const fontSize = Math.min(22, 10 + Math.log10(Math.max(1, dmg)) * 3);
    this.add(x + rand(-6, 6), y + rand(-3, 3), Math.round(dmg).toString(), color, fontSize, isCrit);
  }

  update(dt) {
    for (let i = this.texts.length - 1; i >= 0; i--) {
      this.texts[i].update(dt);
      if (!this.texts[i].alive) this.texts.splice(i, 1);
    }
  }

  render(ctx) {
    for (const t of this.texts) t.render(ctx);
  }

  clear() { this.texts.length = 0; }
}

/**
 * ImpactEffect — Visual effect spawned at the point of weapon impact.
 * Different per weapon type.
 */
class ImpactEffect {
  /**
   * @param {number} x
   * @param {number} y
   * @param {string} weaponId
   * @param {boolean} isCrit
   */
  static spawn(ps, x, y, weaponId, isCrit) {
    const count = isCrit ? 12 : 5;
    const speed = isCrit ? 5 : 3;
    const life = isCrit ? 400 : 250;
    let color = '#ffffff';

    switch (weaponId) {
      case 'fireball':
      case 'meteor':
        color = '#ff6600';
        ps.emit(x, y, color, count * 2, speed * 1.5, life * 1.2, 2.5);
        ps.emit(x, y, '#ffaa00', count, speed, life, 1.5);
        break;
      case 'frostNova':
        color = '#88ddff';
        ps.emit(x, y, color, count * 1.5, speed * 0.7, life * 1.5, 2);
        ps.emit(x, y, '#ffffff', count / 2, speed * 0.5, life, 1);
        break;
      case 'lightning':
      case 'chainStorm':
        color = '#ffff44';
        ps.emit(x, y, color, count, speed * 1.2, life, 1.5);
        ps.emitDirectional(x, y, Math.random() * Math.PI * 2, '#ffffff', 3, speed, life * 0.7);
        break;
      case 'voidBeam':
      case 'shadowScythe':
        color = '#aa44ff';
        ps.emit(x, y, color, count, speed, life, 2);
        ps.emit(x, y, '#000000', count / 2, speed * 0.5, life * 0.7, 1.5);
        break;
      case 'poisonCloud':
        color = '#66ff33';
        ps.emit(x, y, color, count * 0.7, speed * 0.5, life * 2, 2);
        break;
      case 'plasmaBall':
        color = '#44ddff';
        ps.emit(x, y, color, count * 1.2, speed, life, 2);
        ps.emit(x, y, '#ffffff', count * 0.5, speed * 0.7, life, 1);
        break;
      case 'magicBolt':
      case 'energyOrb':
      default:
        color = WEAPON_DEFS[weaponId] ? WEAPON_DEFS[weaponId].color : '#00e5ff';
        ps.emit(x, y, color, count, speed, life, 1.5);
        if (isCrit) ps.emit(x, y, CONFIG.COLORS.GOLD, 5, speed * 1.5, life, 2);
        break;
    }
  }
}

/**
 * CameraEffects — Zoom, sway, and positional effects.
 */
class CameraEffects {
  constructor() {
    this.zoom = 1;
    this.targetZoom = 1;
    this.swayX = 0;
    this.swayY = 0;
    this.swaySpeed = 0.0005;
    this.swayAmount = 3;
  }

  /** Pulse zoom on level up or major event */
  pulse(amount = 0.06) {
    this.targetZoom = 1 + amount;
  }

  /** Update camera effects */
  update(dt, playerVx, playerVy) {
    // Smooth zoom return
    this.zoom += (this.targetZoom - this.zoom) * 0.08;
    this.targetZoom += (1 - this.targetZoom) * 0.03;

    // Subtle sway based on movement
    this.swayX += (-playerVx * 0.3 - this.swayX) * 0.05;
    this.swayY += (-playerVy * 0.3 - this.swayY) * 0.05;
  }

  /** Apply camera transform to canvas context */
  apply(ctx) {
    if (this.zoom !== 1) {
      ctx.translate(CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2);
      ctx.scale(this.zoom, this.zoom);
      ctx.translate(-CONFIG.WIDTH / 2, -CONFIG.HEIGHT / 2);
    }
  }
}

// ====================================================================
//  SOUND PRIORITY / MIXING SYSTEM
// ====================================================================

/**
 * SoundPriority — Prevents audio overload by limiting concurrent sounds.
 * Gives priority to important sounds (boss, level up) over spam (rapid fire).
 */
class SoundPriority {
  constructor() {
    this.playing = {};
    this.cooldowns = {};
    this.maxConcurrent = 8;
    this.priorities = {
      bossKill: 10, levelUp: 9, bossHit: 8, playerHit: 7,
      synergy: 6, powerup: 5, bossAttack: 5,
      enemyKill: 2, weaponFire: 1, gemPickup: 1, enemyHit: 1,
    };
  }

  /** Check if a sound can play based on priority and concurrency */
  canPlay(soundId) {
    const now = performance.now();
    const priority = this.priorities[soundId] || 0;

    // High priority always plays
    if (priority >= 7) return true;

    // Check cooldown
    if (this.cooldowns[soundId] && now - this.cooldowns[soundId] < 50) return false;

    // Count active sounds
    const active = Object.values(this.playing).filter(t => now - t < 100).length;
    if (active >= this.maxConcurrent && priority < 3) return false;

    this.playing[soundId] = now;
    this.cooldowns[soundId] = now;
    return true;
  }
}

(function integrateJuice() {
  // Extend Game with juice systems
  const origStartGJ = Game.prototype.startGame;
  Game.prototype.startGame = function() {
    origStartGJ.call(this);
    this._juice = new JuiceManager();
    this._cameraFx = new CameraEffects();
    this._physicsTexts = new PhysicsTextManager();
    this._soundPriority = new SoundPriority();
  };

  // Override update to use juice
  const origUpdateJ = Game.prototype.update;
  Game.prototype.update = function(dt) {
    // Apply hit-stop time scaling
    const timeScale = this._juice ? this._juice.update(dt) : 1;
    if (timeScale < 1) dt *= timeScale;

    origUpdateJ.call(this, dt);

    // Update physics texts
    if (this._physicsTexts) this._physicsTexts.update(dt);

    // Update camera effects
    if (this._cameraFx) this._cameraFx.update(dt, this.player ? this.player.vx : 0, this.player ? this.player.vy : 0);
  };

  // Override render to use juice
  const origRenderJ = Game.prototype._render;
  Game.prototype._render = function() {
    ctx.save();

    // Apply directional shake
    if (this._juice) {
      const shakeOffset = this._juice.getCameraOffset();
      ctx.translate(shakeOffset.x, shakeOffset.y);
    }

    // Apply camera zoom + sway
    if (this._cameraFx) {
      this._cameraFx.apply(ctx);
      ctx.translate(this._cameraFx.swayX, this._cameraFx.swayY);
    }

    origRenderJ.call(this);

    // Render physics texts on top
    if (this._physicsTexts) this._physicsTexts.render(ctx);

    ctx.restore();
  };

  // Hook enemy damage for juice
  const origEnemyTD = Enemy.prototype.takeDamage;
  Enemy.prototype.takeDamage = function(amount, isCrit) {
    const died = origEnemyTD.call(this, amount, isCrit);
    if (window.game && window.game._juice) {
      window.game._juice.bigHit(this.x, this.y, amount, isCrit);
    }
    if (window.game && window.game._physicsTexts) {
      window.game._physicsTexts.addDamage(this.x, this.y - 10, amount, isCrit);
    }
    return died;
  };

  // Hook enemy kill for impact effects
  const origOnKilledJ = Game.prototype._onEnemyKilled;
  Game.prototype._onEnemyKilled = function(enemy) {
    // Spawn impact effect based on last weapon
    const wid = this._lastWeaponFired || 'magicBolt';
    ImpactEffect.spawn(this.particles, enemy.x, enemy.y, wid, false);

    // Boss kill pulsing
    if (enemy.behavior === 'boss') {
      if (this._cameraFx) this._cameraFx.pulse(0.1);
      if (this._juice) this._juice.bossHit(enemy.x, enemy.y);

}

// Extend SoundSystem with higher-quality synthesized sounds
SoundSystem.prototype.sfxShoot = function(freq = 800, type = 'square') {
  if (!this.initialized || !this.ctx) return;
  try {
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(freq * 3, now);
    filter.frequency.exponentialRampToValueAtTime(freq * 0.5, now + 0.08);

    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, now + 0.12);

    gain.gain.setValueAtTime(0.12 * this.volume, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 0.15);
  } catch (e) {}
};

SoundSystem.prototype.sfxExplosion = function(intensity = 1) {
  if (!this.initialized || !this.ctx) return;
  try {
    const now = this.ctx.currentTime;
    // Low rumble
    const osc1 = this.ctx.createOscillator();
    const gain1 = this.ctx.createGain();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(80, now);
    osc1.frequency.exponentialRampToValueAtTime(20, now + 0.4 * intensity);
    gain1.gain.setValueAtTime(0.2 * intensity * this.volume, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.5 * intensity);
    osc1.connect(gain1); gain1.connect(this.masterGain);
    osc1.start(now); osc1.stop(now + 0.5);

    // Crackle
    const bufferSize = this.ctx.sampleRate * 0.3;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
    }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const noiseGain = this.ctx.createGain();
    noiseGain.gain.setValueAtTime(0.15 * intensity * this.volume, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    noise.connect(noiseGain); noiseGain.connect(this.masterGain);
    noise.start(now);
  } catch (e) {}
};

// Enhanced music - layered drone with subtle rhythm
SoundSystem.prototype.startMusic = function() {
  if (!this.initialized || !this.ctx) return;
  try {
    const now = this.ctx.currentTime;
    this._musicNodes = [];

    // Deep drone
    const drone = this.ctx.createOscillator();
    const droneGain = this.ctx.createGain();
    drone.type = 'sine';
    drone.frequency.value = 55;
    droneGain.gain.setValueAtTime(0.03 * this.volume, now);
    drone.connect(droneGain); droneGain.connect(this.masterGain);
    drone.start(now);
    this._musicNodes.push({ osc: drone });

    // Sub drone with LFO
    const sub = this.ctx.createOscillator();
    const subGain = this.ctx.createGain();
    const lfo = this.ctx.createOscillator();
    const lfoGain = this.ctx.createGain();
    sub.type = 'sine';
    sub.frequency.value = 27.5;
    lfo.type = 'sine';
    lfo.frequency.value = 0.15;
    lfoGain.gain.value = 5;
    lfo.connect(lfoGain);
    lfoGain.connect(sub.frequency);
    subGain.gain.setValueAtTime(0.02 * this.volume, now);
    sub.connect(subGain); subGain.connect(this.masterGain);
    sub.start(now); lfo.start(now);
    this._musicNodes.push({ osc: sub }, { osc: lfo });

    // Subtle pulse (rhythm layer)
    const pulse = this.ctx.createOscillator();
    const pulseGain = this.ctx.createGain();
    const pulseLfo = this.ctx.createOscillator();
    const pulseLfoGain = this.ctx.createGain();
    pulse.type = 'sine';
    pulse.frequency.value = 110;
    pulseLfo.type = 'square';
    pulseLfo.frequency.value = 2;
    pulseLfoGain.gain.value = 0.015 * this.volume;
    pulseLfo.connect(pulseLfoGain);
    pulseLfoGain.connect(pulseGain.gain);
    pulseGain.gain.value = 0;
    pulse.connect(pulseGain); pulseGain.connect(this.masterGain);
    pulse.start(now); pulseLfo.start(now);
    this._musicNodes.push({ osc: pulse }, { osc: pulseLfo });
  } catch (e) {}
};

SoundSystem.prototype.stopMusic = function() {
  if (this._musicNodes) {
    try {
      this._musicNodes.forEach(n => {
        try { n.osc.stop(); } catch (e) {}
      });
    } catch (e) {}
    this._musicNodes = null;
  }
};

/**
 * ScreenFlash — Full-screen colored flash on major events.
 */
class ScreenFlash {
  constructor() {
    this.color = '#ffffff';
    this.alpha = 0;
    this.decay = 0.06;
  }

  trigger(color = '#ffffff', intensity = 0.4) {
    this.color = color;
    this.alpha = Math.max(this.alpha, intensity);
  }

  update(dt) {
    if (this.alpha > 0.001) {
      this.alpha *= Math.pow(this.decay, dt / 16);
    } else {
      this.alpha = 0;
    }
  }

  render(ctx) {
    if (this.alpha < 0.005) return;
    ctx.fillStyle = hexToRgba(this.color, this.alpha);
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
  }
}

/**
 * Enhanced glass panel with gradient border and subtle animation.
 */
function drawEnhancedPanel(ctx, x, y, w, h, r = 8, accent = CONFIG.COLORS.CYAN, time = 0) {
  // Shadow
  ctx.shadowColor = hexToRgba(accent, 0.15);
  ctx.shadowBlur = 10;

  // Background
  const bgGrad = ctx.createLinearGradient(x, y, x, y + h);
  bgGrad.addColorStop(0, 'rgba(10,10,40,0.82)');
  bgGrad.addColorStop(1, 'rgba(6,6,24,0.9)');
  ctx.fillStyle = bgGrad;
  roundRect(ctx, x, y, w, h, r);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Animated border shimmer
  const shimmerPos = (Math.sin(time * 0.002) * 0.5 + 0.5);
  ctx.strokeStyle = hexToRgba(accent, 0.3);
  ctx.lineWidth = 1;
  roundRect(ctx, x, y, w, h, r);
  ctx.stroke();

  // Top accent line
  const accGrad = ctx.createLinearGradient(x, 0, x + w, 0);
  accGrad.addColorStop(0, accent);
  accGrad.addColorStop(0.5, CONFIG.COLORS.MAGENTA);
  accGrad.addColorStop(1, accent);
  ctx.strokeStyle = accGrad;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x + r, y + 1);
  ctx.lineTo(x + w - r, y + 1);
  ctx.stroke();

  // Shimmer highlight
  const shX = x + shimmerPos * w;
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  roundRect(ctx, shX - 30, y, 60, h, r);
  ctx.fill();
}

/**
 * Render weapon upgrade level dots.
 */
function drawUpgradeDots(ctx, x, y, current, max, color = CONFIG.COLORS.CYAN) {
  const dotSize = 3;
  const gap = 7;
  const startX = x - ((max - 1) * gap) / 2;
  for (let i = 0; i < max; i++) {
    ctx.fillStyle = i < current ? color : 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(startX + i * gap, y, dotSize, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Override render to handle color fade
const origTransRender = ScreenTransition.prototype.render;
ScreenTransition.prototype.render = function(ctx) {
  if (!this.active) return;
  const progress = this.timer / this.duration;
  let alpha = 0;
  if (this.type === 'colorFade') {
    alpha = progress < 0.5 ? progress * 2 : (1 - progress) * 2;
    ctx.fillStyle = hexToRgba(this.color || '#000000', alpha * 0.7);
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    return;
  }
  origTransRender.call(this, ctx);
};

/**
 * Check if a weapon can evolve (all upgrades at max level).
 */
function canEvolveWeapon(weaponId, upgradeLevels) {
  const evo = WEAPON_EVOLUTIONS[weaponId];
  if (!evo) return false;
  // Check if all upgrades for this weapon are maxed
  const weaponUpgrades = UPGRADE_POOL.filter(u => u.weaponId === weaponId);
  if (weaponUpgrades.length === 0) return true; // No upgrades needed = can evolve
  return weaponUpgrades.every(u => (upgradeLevels[u.id] || 0) >= u.maxLevel);
}

/**
 * Apply weapon evolution.
 */
function evolveWeapon(weaponId, player) {
  const evo = WEAPON_EVOLUTIONS[weaponId];
  if (!evo) return false;
  const state = player.weaponState[weaponId] || {};
  state.evolved = true;

// ====================================================================
//  DROP POD SYSTEM — Periodic supply drops during gameplay
// ====================================================================

class DropPod {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.landed = false;
    this.timer = 0;
    this.landTime = 2000;
    this.targetY = y;
    this.startY = -50;
    this.currentY = this.startY;
    this.color = '#ffaa00';
    this.size = 14;
    this.contents = [];
  }

  update(dt, game) {
    this.timer += dt;
    if (!this.landed) {
      const progress = Math.min(1, this.timer / this.landTime);
      this.currentY = this.startY + (this.targetY - this.startY) * MathX.easeOutBounce(progress);
      if (progress >= 1) {
        this.landed = true;
        this._spawnContents(game);
        game.particles.emit(this.x, this.y, this.color, 15, 3, 400, 2);
        game.addScreenShake(3);
        if (game._screenFlash) game._screenFlash.trigger(this.color, 0.25);
      }
    }
  }

  _spawnContents(game) {
    // Drop 2-4 random powerups and some XP gems
    const types = ['speedBoost', 'damageBoost', 'shield', 'magnetBoost', 'rapidFire', 'xpVacuum'];
    const count = randInt(2, 4);
    for (let i = 0; i < count; i++) {
      game.powerups.push(new PowerUp(this.x + rand(-20, 20), this.y + rand(-10, 10), pick(types)));
    }
    for (let i = 0; i < 10; i++) {
      game.gems.push(new XPGem(this.x + rand(-25, 25), this.y + rand(-15, 15), 1));
    }
    // Chance of item
    if (Math.random() < 0.3) {
      const itemId = rollItemDrop(game.player.luck);
      if (itemId && game._itemManager) {
        game._itemManager.addItem(itemId, game.player);
        game.floatingTexts.add(this.x, this.y - 20, ITEM_DEFS[itemId].icon + ' ' + ITEM_DEFS[itemId].name + '!', CONFIG.COLORS.CYAN);
      }
    }
  }

  render(ctx) {
    const alpha = this.landed ? Math.max(0, 1 - (this.timer - this.landTime) / 2000) : 1;
    if (alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    // Pod body
    ctx.fillStyle = this.color;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(this.x, this.currentY, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Beacon light
    if (!this.landed) {
      ctx.strokeStyle = hexToRgba(this.color, 0.3);
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(this.x, this.currentY - this.size);
      ctx.lineTo(this.x, -10);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();
  }
}

// ====================================================================
//  RAGE MODE — Temporary power surge when HP is critically low
// ====================================================================

class RageMode {
  constructor() {
    this.active = false;
    this.timer = 0;
    this.cooldown = 30000;
    this.duration = 8000;
    this.lastTriggered = 0;
    this.damageMult = 2.0;
    this.speedMult = 1.3;
    this.shieldActive = false;
  }

  check(player, gameTime) {
    if (this.active) return false;
    if (gameTime - this.lastTriggered < this.cooldown) return false;
    if (player.hp < player.maxHp * 0.2 && player.hp > 0) {
      this.activate(player, gameTime);
      return true;
    }
    return false;
  }

  activate(player, time) {
    this.active = true;
    this.timer = this.duration;
    this.lastTriggered = time;
    player._dmgBoost = (player._dmgBoost || 1) * this.damageMult;
    player.speedMult *= this.speedMult;
    this.shieldActive = true;
    player._shielded = true;
  }

  update(dt, player, game) {
    if (!this.active) return;
    this.timer -= dt;
    // Visual pulse
    if (game && Math.floor(this.timer / 500) % 2 === 0) {
      game.particles.emit(player.x, player.y, '#ff4400', 2, 1.5, 200, 2);
    }
    if (this.timer <= 0) {
      this.deactivate(player);
    }
  }

  deactivate(player) {
    this.active = false;
    player._dmgBoost = (player._dmgBoost || 1) / this.damageMult;
    player.speedMult /= this.speedMult;
    this.shieldActive = false;
    player._shielded = false;
    player.hp = Math.max(1, player.hp); // Don't die when rage ends
  }

  getCooldownRemaining(gameTime) {
    return Math.max(0, this.cooldown - (gameTime - this.lastTriggered));
  }
}

      ctx.beginPath();
      ctx.arc(enemy.x + Math.cos(a) * dr, enemy.y + Math.sin(a) * dr, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  },

  frenzied: (ctx, enemy, time) => {
    // Rapid orange pulse with afterimage
    const pulse = 0.4 + Math.sin(time * 0.02) * 0.3;
    ctx.strokeStyle = `rgba(255,136,0,${pulse})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([3, 2]);
    ctx.beginPath();
    ctx.arc(enemy.x, enemy.y, enemy.size * 1.6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    // Speed lines
    ctx.strokeStyle = `rgba(255,136,0,0.3)`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const a = time * 0.01 + i * 2.1;
      ctx.beginPath();
      ctx.moveTo(enemy.x, enemy.y);
      ctx.lineTo(enemy.x + Math.cos(a) * enemy.size * 2, enemy.y + Math.sin(a) * enemy.size * 2);
      ctx.stroke();
    }
  },

  armored: (ctx, enemy, time) => {
    // Hexagonal shield with slow rotation
    const rot = time * 0.0005;
    ctx.strokeStyle = 'rgba(136,136,204,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    const sides = 6;
    for (let i = 0; i < sides; i++) {
      const a = (Math.PI * 2 / sides) * i + rot;
      const r = enemy.size * 1.8;
      const px = enemy.x + Math.cos(a) * r;
      const py = enemy.y + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
    // Shield plates
    ctx.fillStyle = 'rgba(136,136,204,0.15)';
    ctx.fill();
  },

    // Pulsing heat glow with particle sparks
    const pulse = 0.5 + Math.sin(time * 0.01) * 0.3;
    const grad = ctx.createRadialGradient(enemy.x, enemy.y, enemy.size * 0.5, enemy.x, enemy.y, enemy.size * 2);
    grad.addColorStop(0, `rgba(255,100,0,${pulse * 0.4})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(enemy.x, enemy.y, enemy.size * 2, 0, Math.PI * 2);
    ctx.fill();
    // Sparks
    for (let i = 0; i < 3; i++) {
      const a = time * 0.015 + i * 2.1;
      const sr = enemy.size * (1 + Math.sin(time * 0.02 + i) * 0.5);
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(enemy.x + Math.cos(a) * sr, enemy.y + Math.sin(a) * sr, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  },

  spectral: (ctx, enemy, time) => {
    // Ghostly shimmer with phase effect
    const pulse = 0.2 + Math.sin(time * 0.006) * 0.1;
    ctx.strokeStyle = `rgba(68,221,255,${pulse})`;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 8]);
    ctx.beginPath();
    ctx.arc(enemy.x, enemy.y, enemy.size * 1.5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    // Ghost wisps
    for (let i = 0; i < 2; i++) {
      const a = time * 0.004 + i * Math.PI;
      const wr = enemy.size * 1.2;
      ctx.fillStyle = `rgba(68,221,255,${pulse * 0.5})`;
      ctx.beginPath();
      ctx.arc(enemy.x + Math.cos(a) * wr, enemy.y + Math.sin(a) * wr, enemy.size * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  },
};

// ====================================================================
//  CHROMATIC ABERRATION EFFECT — RGB split on screen edges
// ====================================================================
class ChromaticAberration {
  constructor() { this.intensity = 0; this.targetIntensity = 0; }

  /** Trigger chromatic aberration (on damage, boss spawn, etc.) */
  trigger(intensity = 0.5) { this.targetIntensity = Math.max(this.targetIntensity, intensity); }

  update(dt) {
    this.intensity += (this.targetIntensity - this.intensity) * 0.1;
    this.targetIntensity *= Math.pow(0.95, dt / 16);
  }

  /** Apply RGB channel split to an offscreen canvas (simulated) */
  render(ctx) {
    if (this.intensity < 0.02) return;
    const shift = this.intensity * 4;
    // Red channel shift (simulated by drawing semi-transparent red copies)
    ctx.save();
    ctx.globalAlpha = this.intensity * 0.05;
    ctx.globalCompositeOperation = 'lighter';
    // This is a lightweight approximation - true CA requires offscreen canvases
    ctx.fillStyle = `rgba(255,0,0,${this.intensity * 0.02})`;
    ctx.fillRect(shift, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    ctx.fillStyle = `rgba(0,255,255,${this.intensity * 0.02})`;
    ctx.fillRect(-shift, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    ctx.restore();
  }
}

// ====================================================================
//  KILL FEED — Recent kills displayed as scrolling text
// ====================================================================
class KillFeed {
  constructor() { this.entries = []; this.maxEntries = 5; }

  /** Add a kill to the feed */
  add(enemyName, weaponName, isElite = false) {
    this.entries.unshift({ enemyName, weaponName, isElite, time: performance.now() });
    if (this.entries.length > this.maxEntries) this.entries.length = this.maxEntries;
  }

  /** Render the kill feed */
  render(ctx) {
    const now = performance.now();
    let y = CONFIG.HEIGHT - 100;
    for (let i = this.entries.length - 1; i >= 0; i--) {
      const entry = this.entries[i];
      const age = now - entry.time;
      if (age > 4000) { this.entries.splice(i, 1); continue; }
      const alpha = age < 300 ? age / 300 : (age > 3500 ? 1 - (age - 3500) / 500 : 1);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = entry.isElite ? CONFIG.COLORS.GOLD : '#aaaaaa';
      ctx.font = "10px 'Rajdhani', sans-serif";
      ctx.textAlign = 'right';
      ctx.fillText(`${entry.weaponName} → ${entry.enemyName}`, CONFIG.WIDTH - 15, y);
      ctx.restore();
      y -= 16;
    }
  }
}

// ====================================================================
//  ENHANCED DAMAGE VIGNETTE — Pulsing red at low HP
// ====================================================================
function renderEnhancedDamageVignette(ctx, game) {
  const player = game.player;
  if (!player || player.hp > player.maxHp * 0.4) return;
  const hpRatio = player.hp / player.maxHp;
  const alpha = (0.4 - hpRatio) * 1.5;
  const pulse = 0.7 + 0.3 * Math.sin(game.gameTime * 0.008);

  // Pulsing red corners
  const corners = [
    [0, 0, CONFIG.WIDTH * 0.3, CONFIG.HEIGHT * 0.3],
    [CONFIG.WIDTH * 0.7, 0, CONFIG.WIDTH, CONFIG.HEIGHT * 0.3],
    [0, CONFIG.HEIGHT * 0.7, CONFIG.WIDTH * 0.3, CONFIG.HEIGHT],
    [CONFIG.WIDTH * 0.7, CONFIG.HEIGHT * 0.7, CONFIG.WIDTH, CONFIG.HEIGHT],
  ];

  for (const [x1, y1, x2, y2] of corners) {
    const grad = ctx.createRadialGradient(
      (x1 + x2) / 2, (y1 + y2) / 2, 0,
      (x1 + x2) / 2, (y1 + y2) / 2, Math.max(x2 - x1, y2 - y1) * 0.7
    );
    grad.addColorStop(0, `rgba(255,0,0,${alpha * pulse * 0.5})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
  }
}

    origOnKillFeed.call(this, enemy);
    if (this._killFeed) {
      const weaponName = this._lastWeaponFired
        ? (WEAPON_DEFS[this._lastWeaponFired] ? WEAPON_DEFS[this._lastWeaponFired].icon + ' ' + WEAPON_DEFS[this._lastWeaponFired].name : this._lastWeaponFired)
        : '🔮 Magic Bolt';
      this._killFeed.add(enemy.name, weaponName, enemy.isElite);
    }
  };

  // Trigger aberration on player hit and boss spawn
  const origPlayerHit22b = Player.prototype.takeDamage;
  Player.prototype.takeDamage = function(amount) {
    const result = origPlayerHit22b.call(this, amount);
    if (result && window.game && window.game._chromaticAberration) {
      window.game._chromaticAberration.trigger(amount / 30);
    }
    return result;
  };
})();

// ====================================================================
//  WAVE ANNOUNCEMENT OVERHAUL
// ====================================================================

// Enhanced wave announcement with boss warnings
(function enhanceWaveAnnouncements() {
  const origUpdateWave = Game.prototype.update;
  Game.prototype.update = function(dt) {
    // Track previous wave
    const prevWave = this._prevWave || 1;
    origUpdateWave.call(this, dt);

    // Check for wave change
    if (this.wave > prevWave) {
      this._prevWave = this.wave;
      const isBossWave = this.wave % 5 === 0;

      if (isBossWave) {
        this.floatingTexts.add(CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 - 20,
          '⚠ BOSS INCOMING ⚠', '#ff4444');
        if (this._screenFlash) this._screenFlash.trigger('#ff4444', 0.3);
        if (this._chromaticAberration) this._chromaticAberration.trigger(0.8);
      } else {
        const waveColors = ['#00e5ff', '#00ff88', '#ffaa00', '#ff6600', '#ff00e5', '#ff0000'];
        const wc = waveColors[Math.min(this.wave - 1, waveColors.length - 1)];
        this.floatingTexts.add(CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, `WAVE ${this.wave}`, wc);
      }
    }
  };
})();

// ====================================================================
//  GOLD PICKUP VISUAL — Floating gold coins
// ====================================================================
function spawnGoldPickupEffect(ps, x, y, amount) {
  for (let i = 0; i < Math.min(amount, 5); i++) {
    const p = new Particle(
      x + rand(-5, 5), y + rand(-5, 5),
      rand(-1, 1), rand(-3, -1),
      CONFIG.COLORS.GOLD, rand(400, 700), rand(2, 3)
    );
    ps.particles.push(p);
  }
}

// Integrate gold pickup visual
(function integrateGoldPickup() {
  const origOnKillGold = Game.prototype._onEnemyKilled;
  Game.prototype._onEnemyKilled = function(enemy) {
    origOnKillGold.call(this, enemy);
    const goldAmount = Math.max(1, Math.floor(enemy.xpDrop * 0.5 * (this._goldMult || 1)));
    if (goldAmount > 0) {
      spawnGoldPickupEffect(this.particles, enemy.x, enemy.y, Math.min(goldAmount, 5));
    }
  };
})();

// ====================================================================
//  FINAL POLISH: SMOOTHER TRANSITIONS & CONSISTENT SPACING
// ====================================================================

// Ensure all panels use consistent styling
(function finalPolishPass() {
  // Add consistent panel rounding to all UI elements
  document.querySelectorAll('.shop-card, .class-card, .mode-card, .upgrade-card').forEach(el => {
    el.style.transition = 'all 0.2s cubic-bezier(0.4, 0, 0.2, 1)';
  });

  // Add hover sound effects to cards
  document.querySelectorAll('.shop-card, .class-card, .mode-card, .upgrade-card').forEach(el => {
    el.addEventListener('mouseenter', () => {
      if (window.game && window.game.sound) {
        window.game.sound.sfxHover();
      }
    });
  });
})();

function init() {
  // Apply all extended features to Game class
  extendGameWithFeatures(Game);
  extendGameAllSystems(Game);

  const game = new Game();

  // Expose game globally for debugging
  window.game = game;

  // Initialize UI manager for shop/class/mode/bestiary
  const uiManager = new UIManager(game);
  window._uiManager = uiManager;

  // FPS counter
  const fpsCounter = new FPSCounter();
  window._fpsCounter = fpsCounter;

  // Post-initialization setup
  postInitSetup(game, uiManager, fpsCounter);

  // Integrate Nix brand
  integrateNixBrand(Game);
  setNixFavicon();

  // Expose Nix brand manifest
  window.NIX = NIX_MANIFEST;

  // Override start button to show shop first
  document.getElementById('btnStart').addEventListener('click', () => {
    uiManager.showShop();
  });

  // Keyboard shortcut: Space to start from title screen
  window.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') {
      if (game.state === 'start') {
        game.startGame();
      } else if (game.state === 'gameover') {
        game.startGame();
      }
    }
  });

  // Initial render (title screen background via canvas)
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

  // Draw animated background stars on title
  function titleAnimation(ts) {
    if (game.state !== 'start') return;

    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    // Nebula clouds
    for (const n of game._nebulas) {
      n.render(ctx, ts);
    }

    // Grid
    ctx.strokeStyle = 'rgba(0,229,255,0.02)';
    ctx.lineWidth = 0.5;
    for (let x = 80; x < CONFIG.WIDTH; x += 80) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, CONFIG.HEIGHT);
      ctx.stroke();
    }
    for (let y = 80; y < CONFIG.HEIGHT; y += 80) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(CONFIG.WIDTH, y);
      ctx.stroke();
    }

    // Space dust
    for (const d of game._spaceDust) {
      d.render(ctx, ts);
    }

    // Stars
    for (const star of game.stars) {
      star.render(ctx, ts);
    }

    // Cosmic rays
    for (const r of game._cosmicRays) {
      r.render(ctx);
    }

    if (game.state === 'start') {
      requestAnimationFrame(titleAnimation);
    }
  }
  requestAnimationFrame(titleAnimation);

  console.log('%c🚀 VOIDRUN %cready.',
    'color: #00e5ff; font-size: 16px;', 'color: #aaa;');
  console.log('%cPress SPACE or click ENTER VOID to start.',
    'color: #ff00e5;');
  console.log('%c~5500 lines of handcrafted game code',
    'color: #666; font-style: italic;');
}

// Start the game when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

// ====================================================================
//  END OF VOIDRUN - NEON VOID
//  Thank you for reading the source! 🎮
// ====================================================================
